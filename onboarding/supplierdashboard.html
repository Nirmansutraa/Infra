<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | NirmanSutra</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="../js/config.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; margin: 0; }
        .top-bar { background: var(--navy); color: white; padding: 40px 20px 70px; border-radius: 0 0 40px 40px; }
        .biz-card { background: white; padding: 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); margin: -45px 20px 20px; position: relative; }
        .tag { background: #f1f5f9; color: #475569; padding: 7px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; margin: 4px; display: inline-block; text-transform: uppercase; }
        .badge { background: #fff7ed; color: #ea580c; padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <header class="top-bar flex justify-between items-center px-6">
        <div>
            <p class="text-orange-500 font-black text-[10px] uppercase tracking-[5px] mb-1">Building Bharat</p>
            <h1 id="userName" class="text-2xl font-black">Syncing...</h1>
        </div>
        <button onclick="auth.signOut().then(()=>window.location.href='../index.html')" class="bg-white/10 px-5 py-2 rounded-xl font-bold text-xs uppercase">Logout</button>
    </header>

    <main>
        <section class="biz-card">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-[10px] uppercase text-slate-400 tracking-widest">Business Intelligence</h3>
                <span class="badge">Registry Live</span>
            </div>

            <div class="space-y-6">
                <div>
                    <p id="shopTitle" class="text-xl font-black text-slate-900 leading-tight">Checking Registry...</p>
                    <p id="shopAddress" class="text-xs text-slate-400 font-medium mt-1">Locating...</p>
                </div>
                <div>
                    <p class="text-[9px] font-black uppercase text-slate-400 mb-3 tracking-widest">Categories</p>
                    <div id="catList" class="flex flex-wrap"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 pt-6 border-t border-slate-50">
                    <div>
                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1">Brands</p>
                        <p id="brandText" class="font-black text-sm text-slate-800">---</p>
                    </div>
                    <div>
                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1">Coverage</p>
                        <p class="font-black text-sm text-slate-800">30 KM</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. WATCH FOR USER
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("Logged in as:", user.uid);
                sync(user.uid);
            } else {
                window.location.href = "../index.html";
            }
        });

        // 2. FETCH DATA LIVE
        function sync(uid) {
            rtdb.ref(`users/${uid}`).on('value', snap => {
                const data = snap.val();
                if (!data) return;

                document.getElementById('userName').innerText = data.name || "Partner";
                document.getElementById('shopTitle').innerText = data.shopName || "Business Profile Pending";
                document.getElementById('shopAddress').innerText = data.address || "Address not registered";
                document.getElementById('brandText').innerText = data.brands || "All Major Brands";
                
                const list = document.getElementById('catList');
                list.innerHTML = "";
                if (data.categories) {
                    data.categories.forEach(cat => {
                        const s = document.createElement('span'); 
                        s.className = "tag"; 
                        s.innerText = cat;
                        list.appendChild(s);
                    });
                }
            });
        }
    </script>
</body>
</html>

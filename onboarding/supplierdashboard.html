<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Dashboard | NirmanSutra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; margin: 0; }
        .top-bar { background: var(--navy); color: white; padding: 40px 20px 60px; border-radius: 0 0 40px 40px; }
        .biz-card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); margin-top: -40px; position: relative; }
        .badge { background: #fff7ed; color: #ea580c; padding: 5px 12px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .tag { background: #f1f5f9; color: #64748b; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; margin-right: 5px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-orange-500 font-black text-[10px] uppercase tracking-[4px] mb-1">Partner Portal</p>
                <h1 id="userName" class="text-2xl font-black">Loading...</h1>
            </div>
            <button onclick="auth.signOut().then(()=>window.location.href='index.html')" class="bg-white/10 p-4 rounded-2xl hover:bg-white/20 transition">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9"/></svg>
            </button>
        </div>
    </header>

    <main class="px-6">
        <section class="biz-card mb-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400">Material Intelligence</h3>
                <span class="badge">Active Registry</span>
            </div>

            <div class="space-y-6">
                <div>
                    <p id="shopTitle" class="text-xl font-black text-slate-900 leading-tight">Business Name Loading...</p>
                    <p id="shopAddress" class="text-xs text-slate-400 font-medium mt-1">Address N/A</p>
                </div>

                <div>
                    <p class="text-[9px] font-black uppercase text-slate-400 mb-2">Inventory Categories</p>
                    <div id="catList" class="flex flex-wrap"></div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-50">
                    <div>
                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1">Key Brands</p>
                        <p id="brandText" class="font-bold text-sm text-slate-800">N/A</p>
                    </div>
                    <div>
                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1">Coverage</p>
                        <p id="radiusText" class="font-bold text-sm text-slate-800">N/A</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[25px] shadow-sm text-center">
                <div class="text-2xl mb-2">📦</div>
                <p class="text-[10px] font-black uppercase tracking-tighter">Inventory</p>
            </div>
            <div class="bg-white p-6 rounded-[25px] shadow-sm text-center">
                <div class="text-2xl mb-2">📊</div>
                <p class="text-[10px] font-black uppercase tracking-tighter">Market Demand</p>
            </div>
        </div>
    </main>

    <script>
        // STABLE AUTH OBSERVER
        auth.onAuthStateChanged(user => {
            if (user) {
                loadDashboard(user.uid);
            } else {
                console.warn("Unauthorized: Sending to login.");
                window.location.href = "index.html";
            }
        });

        async function loadDashboard(uid) {
            try {
                const snap = await rtdb.ref(`users/${uid}`).once('value');
                if(!snap.exists()) return;
                const data = snap.val();

                // 1. User Info
                document.getElementById('userName').innerText = data.name || "User";

                // 2. Intelligence Sync
                document.getElementById('shopTitle').innerText = data.shopName || "Enterprise Registry Pending";
                document.getElementById('shopAddress').innerText = data.address || "No Address Provided";
                document.getElementById('brandText').innerText = data.brands || "Not Specified";
                document.getElementById('radiusText').innerText = data.deliveryRadius ? `${data.deliveryRadius} KM` : "Local Only";

                // 3. Category Chip Loading
                const list = document.getElementById('catList');
                list.innerHTML = "";
                if(data.categories && Array.isArray(data.categories)) {
                    data.categories.forEach(c => {
                        const s = document.createElement('span');
                        s.className = "tag";
                        s.innerText = c;
                        list.appendChild(s);
                    });
                } else {
                    list.innerHTML = "<p class='text-xs text-slate-300'>No categories mapped</p>";
                }

            } catch(e) {
                console.error("Dashboard Load Error:", e);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NirmanSutra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .top { background: var(--navy); color: white; padding: 40px 20px 60px; border-radius: 0 0 40px 40px; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: -40px 20px 20px; }
        .tag { background: #f1f5f9; color: #64748b; padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; margin: 3px; display: inline-block; }
    </style>
</head>
<body>
    <div class="top flex justify-between items-center">
        <h1 id="uName" class="text-2xl font-black">Loading...</h1>
        <button onclick="auth.signOut().then(()=>window.location.href='index.html')" class="bg-white/10 p-3 rounded-xl">Logout</button>
    </div>

    <div class="card">
        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Business Intelligence</h3>
        <p id="sName" class="text-xl font-black text-slate-900 leading-tight">Checking Registry...</p>
        <p id="sAddr" class="text-xs text-slate-400 mt-1">Locating...</p>
        
        <div class="mt-6 pt-6 border-t border-slate-50">
            <p class="text-[9px] font-black uppercase text-slate-400 mb-2">Categories</p>
            <div id="cats"></div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mt-6">
            <div><p class="text-[9px] font-black text-slate-400 uppercase">Brands</p><p id="sBrands" class="font-bold text-sm">---</p></div>
            <div><p class="text-[9px] font-black text-slate-400 uppercase">Coverage</p><p class="font-bold text-sm">30 KM</p></div>
        </div>
    </div>

    <script>
        auth.onAuthStateChanged(user => {
            if (user) sync(user.uid);
            else window.location.href = "index.html";
        });

        function sync(uid) {
            // Check both possible data nodes
            rtdb.ref(`users/${uid}`).on('value', snap => {
                const d = snap.val();
                if(d) render(d);
            });
        }

        function render(d) {
            document.getElementById('uName').innerText = d.name || "Partner";
            document.getElementById('sName').innerText = d.shopName || "Business Name N/A";
            document.getElementById('sAddr').innerText = d.address || "Address N/A";
            document.getElementById('sBrands').innerText = d.brands || "N/A";
            
            const box = document.getElementById('cats');
            box.innerHTML = "";
            if(d.categories) {
                d.categories.forEach(c => {
                    const span = document.createElement('span'); span.className = "tag"; span.innerText = c;
                    box.appendChild(span);
                });
            }
        }
    </script>
</body>
</html>

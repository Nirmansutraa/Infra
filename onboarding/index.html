<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nirmansutra | Supplier Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0f172a] flex items-center justify-center h-screen text-white font-sans">

    <div id="gate" class="text-center p-10 bg-[#1e293b] rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-black italic mb-2">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-10">Supplier Registry Terminal</p>
        
        <button onclick="login()" id="gBtn" class="bg-white text-slate-900 w-full p-5 rounded-2xl font-bold flex items-center justify-center gap-3">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Verify Google ID
        </button>

        <div id="otpBox" class="hidden mt-8">
            <input type="number" id="otp" placeholder="Enter 123456" class="w-full p-4 rounded-xl text-slate-900 mb-4">
            <button onclick="verify()" class="bg-orange-500 w-full p-4 rounded-xl font-bold">Unlock Form</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // THE LOOP BREAKER: Force logout as soon as this page starts
        window.onload = async () => {
            await auth.signOut();
            localStorage.clear();
            sessionStorage.clear();
        };

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('gBtn').classList.add('hidden');
                document.getElementById('otpBox').classList.remove('hidden');
            }
        });

        function verify() {
            if(document.getElementById('otp').value === "123456") {
                alert("Identity Unlocked. Form loading...");
                // You can add your form logic here
            }
        }
    </script>
</body>
</html>

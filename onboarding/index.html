<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Supplier Onboarding</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #ff7a00; --primary: #0f172a; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 100px; }
        .card { background: white; border-radius: 35px; padding: 40px; margin-bottom: 30px; border: 1px solid #e2e8f0; shadow: 0 1px 3px rgba(0,0,0,0.02); }
        .section-label { font-size: 11px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; display: block; }
        .auth-gate { position: fixed; inset: 0; background: var(--primary); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: #1e293b; padding: 50px; border-radius: 30px; width: 100%; max-width: 450px; text-align: center; border: 1px solid #334155; }
        input, select { width: 100%; background: #f1f5f9; border: 1px solid transparent; padding: 18px 24px; border-radius: 18px; font-size: 15px; font-weight: 600; margin-top: 12px; outline: none; transition: 0.3s; }
        .btn-action { width: 100%; padding: 20px; border-radius: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; margin-top: 20px; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; }
        .step-inactive { opacity: 0.1; pointer-events: none; filter: grayscale(1); }
        #map { height: 300px; border-radius: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div id="authGate" class="auth-gate">
    <div class="gate-card shadow-2xl">
        <h1 class="text-white text-3xl font-black italic mb-2">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[4px] mb-10">Supplier Registry</p>
        
        <button onclick="Auth.login()" id="gBtn" class="bg-white text-slate-900 w-full p-5 rounded-2xl font-bold flex items-center justify-center gap-3">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Verify Google ID
        </button>

        <div id="otpBox" class="hidden mt-8">
            <p class="text-emerald-400 text-[10px] font-bold uppercase mb-4 tracking-widest">● Identity Verified. Enter OTP</p>
            <input type="number" id="otpInput" placeholder="Enter 123456">
            <button onclick="Auth.verify()" class="btn-action btn-primary">Unlock Form</button>
        </div>
    </div>
</div>

<div class="max-w-2xl mx-auto px-8 py-10">
    <h1 class="text-3xl font-black italic uppercase mb-10">Official<span class="text-orange-500">Onboarding</span></h1>

    <div id="mainForm" class="step-inactive">
        <div class="card">
            <span class="section-label">01. Firm Identity</span>
            <select id="type"><option value="Retailer">Retailer (R)</option><option value="Wholesaler">Wholesaler (W)</option></select>
            <input id="firm" placeholder="Registered Firm Name">
        </div>

        <div class="card">
            <span class="section-label">02. Spatial Lock</span>
            <div id="map"></div>
            <button onclick="Geo.capture()" class="btn-action btn-primary">📍 Verify GPS Pin</button>
            <textarea id="address" class="w-full mt-4 bg-transparent border-none text-slate-500 text-sm italic" readonly placeholder="Address Syncing..."></textarea>
        </div>

        <div class="card">
            <span class="section-label">03. Contact Hub</span>
            <input id="owner" placeholder="Owner Legal Name">
            <input id="email" readonly class="bg-slate-100 opacity-60 mt-4">
            <input id="phone" placeholder="WhatsApp Number (+91...)" class="mt-4">
        </div>

        <button onclick="Submission.run()" id="subBtn" class="btn-action btn-primary bg-emerald-600 shadow-xl">🚀 Transmit Registration</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), rtdb = firebase.database();

    window.Auth = {
        user: null,
        login() {
            auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
        },
        verify() {
            if(document.getElementById('otpInput').value === "123456") {
                document.getElementById('authGate').classList.add('hidden');
                document.getElementById('mainForm').classList.remove('step-inactive');
                Geo.init();
            } else { alert("Incorrect OTP"); }
        }
    };

    window.Geo = {
        map: null, marker: null,
        init() {
            if(this.map) return;
            this.map = L.map('map', { zoomControl: false }).setView([24.58, 73.71], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
        },
        capture() {
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude, longitude } = p.coords;
                this.map.setView([latitude, longitude], 16);
                if (this.marker) this.map.removeLayer(this.marker);
                this.marker = L.marker([latitude, longitude]).addTo(this.map);
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                document.getElementById('address').value = data.display_name;
            }, null, { enableHighAccuracy: true });
        }
    };

    window.Submission = {
        async run() {
            const firm = document.getElementById('firm').value;
            if(!firm || !Geo.marker) return alert("Firm & GPS Required.");
            document.getElementById('subBtn').innerText = "TRANSMITTING...";
            
            const data = {
                firm: firm, type: document.getElementById('type').value,
                owner: document.getElementById('owner').value,
                email: Auth.user.email, phone: document.getElementById('phone').value,
                lat: Geo.marker.getLatLng().lat, lng: Geo.marker.getLatLng().lng,
                address: document.getElementById('address').value,
                timestamp: Date.now(), status: 'pending'
            };

            try {
                await rtdb.ref('supplier_onboarding').push(data);
                alert("REGISTRATION SUCCESSFUL.");
                auth.signOut().then(() => { window.location.href = "../index.html"; });
            } catch(e) { alert("Error: " + e.message); }
        }
    };

    auth.onAuthStateChanged(user => {
        if(user) {
            Auth.user = user;
            document.getElementById('gBtn').classList.add('hidden');
            document.getElementById('otpBox').classList.remove('hidden');
            document.getElementById('email').value = user.email;
        }
    });
</script>
</body>
</html>

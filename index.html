<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Field Intel Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #f8fafc; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        .btn-google { background: white; color: #1e293b; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; }
        .btn-google:hover { background: #f1f5f9; transform: translateY(-1px); }
        .btn-google:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="login-card mx-4">
    <div class="mb-10">
        <h1 class="text-3xl font-black tracking-tighter uppercase">
            NIRMAN<span class="text-orange-500">SUTRA</span>
        </h1>
        <p class="text-slate-400 text-[10px] font-bold tracking-[3px] uppercase mt-1">Field Intel Gateway</p>
    </div>

    <div class="mb-10">
        <p class="text-slate-400 text-sm italic">"Precision in every build."</p>
        <p class="text-slate-500 text-xs mt-4 uppercase tracking-widest font-bold">Authorized Personnel Only</p>
    </div>

    <div class="space-y-4">
        <button onclick="loginWithGoogle()" id="loginBtn" class="btn-google w-full p-4 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google">
            Sign In with Google
        </button>

        <p id="statusMsg" class="text-orange-500 text-[10px] font-bold uppercase tracking-widest hidden animate-pulse">
            Verifying Identity...
        </p>
    </div>

    <div class="mt-12 pt-6 border-t border-slate-800">
        <p class="text-slate-600 text-[9px] font-medium uppercase tracking-widest text-center">Secure Session • V2.2.0</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // --- YOUR ACTUAL CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        storageBucket: "infradepo.firebasestorage.app",
        messagingSenderId: "733942710671",
        appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa",
        measurementId: "G-FT60ZNKS6P"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function loginWithGoogle() {
        const btn = document.getElementById('loginBtn');
        const status = document.getElementById('statusMsg');
        
        btn.classList.add('hidden');
        status.classList.remove('hidden');

        const provider = new firebase.auth.GoogleAuthProvider();

        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;

            // Check Role in Firestore (Checks collection 'users' for document matching UID)
            const userDoc = await db.collection('users').doc(user.uid).get();

            if (userDoc.exists) {
                const userData = userDoc.data();
                
                if (userData.role === 'admin') {
                    window.location.href = 'admin/dashboard.html';
                } else if (userData.role === 'agent') {
                    window.location.href = 'field/survey.html';
                } else {
                    alert("Access Denied: You do not have an assigned role. Contact Vijay.");
                    await auth.signOut();
                    location.reload();
                }
            } else {
                alert("Security Error: UID [" + user.uid + "] not found in registry. Please add this UID to Firestore first.");
                await auth.signOut();
                location.reload();
            }

        } catch (error) {
            console.error("Auth Error:", error);
            alert("Connection Error: " + error.message);
            btn.classList.remove('hidden');
            status.classList.add('hidden');
        }
    }
</script>

</body>
</html>

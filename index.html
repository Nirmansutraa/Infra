<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            background-color: #020617; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: #f8fafc; 
        }
        
        .login-card { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(20px); 
            padding: 60px; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 480px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
        }
        
        .btn-universal { 
            background: white; 
            color: #0f172a; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            cursor: pointer; 
            border-radius: 22px; 
            font-weight: 800; 
            width: 100%; 
            padding: 22px; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            box-shadow: 0 10px 25px -5px rgba(255, 255, 255, 0.1);
        }
        
        .btn-universal:hover { 
            transform: translateY(-2px); 
            background: #f8fafc;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.4);
        }

        .status-msg { 
            margin-top: 30px; 
            padding: 16px; 
            border-radius: 18px; 
            font-size: 11px; 
            font-weight: 800; 
            display: none; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .partnership-box {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

        </h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[4px]">Enterprise Unified Gateway</p>
    </div>
    
    <button onclick="unifiedLogin()" id="loginBtn" class="btn-universal">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
        Secure Identity Access
    </button>

    <div id="msg" class="status-msg"></div>

    <div class="partnership-box">
        <p class="text-slate-500 text-[9px] font-bold uppercase mb-4 tracking-widest">New Partnership?</p>
        <div onclick="goToOnboarding()" class="text-orange-500 text-[11px] font-black uppercase tracking-[3px] hover:text-white transition-colors cursor-pointer">

</div>

<script>
    const firebaseConfig = {

        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();

    const ROLE_ROUTES = {
        'super_admin': 'admin/dashboard.html',
        'admin': 'admin/dashboard.html',
        'field_staff': 'field/survey.html',
        'supplier': 'onboarding/index.html'
    };

    function updateUI(text, type) {
        const m = document.getElementById('msg');
        m.innerText = text;
        m.style.display = 'block';
        if(type === 'err') {
            m.className = "status-msg bg-red-500/20 text-red-400";
        } else if(type === 'success') {
            m.className = "status-msg bg-emerald-500/20 text-emerald-400";
        } else {
            m.className = "status-msg bg-orange-500/20 text-orange-400 animate-pulse";
        }
    }

    /**
     * NEW: BYPASS HANDLER
     * Sets an intent flag to stop auto-routing while registering
     */
    function goToOnboarding() {
        sessionStorage.setItem('onboarding_intent', 'true');
        window.location.href = "onboarding/index.html";
    }

    /**
     * MASTER ROUTING ENGINE
     */
    async function executeRouting(user) {
        try {
            updateUI("Verifying Permissions...", "warn");
            const snap = await rtdb.ref(`users/${user.uid}/role`).once('value');
            const role = snap.val();

            if (!role) {
                updateUI("New User: Directing to Onboarding...", "success");
                setTimeout(() => {
                    window.location.replace("onboarding/index.html");
                }, 1000);
                return;
            }

            const cleanRole = role.toLowerCase().trim();
            const target = ROLE_ROUTES[cleanRole];

            if (target) {
                updateUI(`Identity Confirmed: ${cleanRole.toUpperCase()}`, "success");
                setTimeout(() => {
                    window.location.replace(target + "?v=" + Date.now());
                }, 800);
            } else {
                updateUI("Unknown Role Configuration", "err");
            }
        } catch (e) {
            updateUI(e.message, "err");
        }
    }

     * LOGIN TRIGGER

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Unified Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #f8fafc; }
        .login-card { background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(20px); padding: 60px; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 480px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .btn-universal { background: white; color: #0f172a; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; border-radius: 20px; font-weight: 800; width: 100%; padding: 20px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-universal:hover { transform: scale(1.02); }
        .status-msg { margin-top: 25px; padding: 15px; border-radius: 15px; font-size: 11px; font-weight: 700; display: none; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="mb-12">
        <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[4px]">Unified Access Terminal</p>
    </div>
    
    <button onclick="unifiedLogin()" id="loginBtn" class="btn-universal shadow-xl">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
        Secure Access Login
    </button>

    <div id="msg" class="status-msg"></div>

    <div class="mt-10 pt-8 border-t border-white/10">
        <p class="text-slate-500 text-[9px] font-bold uppercase mb-4">New Partnership?</p>
        <a href="onboarding/index.html" class="text-[#ff7a00] text-[11px] font-black uppercase tracking-widest">➜ Register as New Supplier</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), rtdb = firebase.database();

    const ROLE_ROUTES = {
        'super_admin': 'admin/dashboard.html',
        'admin': 'admin/dashboard.html',
        'field_staff': 'field/survey.html',
        'supplier': 'onboarding/index.html'
    };

    function updateUI(text, type) {
        const m = document.getElementById('msg');
        m.innerText = text; m.style.display = 'block';
        m.className = `status-msg ${type === 'err' ? 'bg-red-500/20 text-red-400' : 'bg-orange-500/20 text-orange-400 animate-pulse'}`;
    }

    async function executeRouting(user) {
        console.log("Checking role for UID:", user.uid);
        updateUI("Verifying Permissions...", "warn");
        
        try {
            const snap = await rtdb.ref(`users/${user.uid}/role`).once('value');
            const role = snap.val();

            if (!role) {
                console.error("No role found in DB for this UID.");
                updateUI("Access Denied: No Role Assigned", "err");
                return;
            }

            const cleanRole = role.toLowerCase().trim();
            const target = ROLE_ROUTES[cleanRole];

            if (target) {
                updateUI(`Redirecting to ${cleanRole}...`, "success");
                // Use window.location.replace to prevent back-button loops
                window.location.replace(target + "?v=" + Date.now());
            } else {
                updateUI("Invalid Role Route", "err");
            }
        } catch (e) {
            updateUI(e.message, "err");
        }
    }

    // THE LOGIN TRIGGER
    async function unifiedLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        updateUI("Connecting to Google...", "warn");
        try {
            // Using Popup for testing—it's easier to debug than Redirect
            const result = await auth.signInWithPopup(provider);
            if (result.user) executeRouting(result.user);
        } catch (e) { updateUI(e.message, "err"); }
    }

    // AUTO-RECOVERY (If page is refreshed)
    auth.onAuthStateChanged(user => {
        if (user && !window.location.pathname.includes('onboarding')) {
            executeRouting(user);
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Sovereign Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/roles.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: var(--navy); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; overflow: hidden; }

        .hero-bg { 
            background: radial-gradient(circle at top right, #1e293b, #020617); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
        }

        .identity-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; color: #0f172a;
            border-radius: 45px 45px 0 0; padding: 20px 25px 40px;
            box-shadow: 0 -30px 100px rgba(0,0,0,0.7); z-index: 5000;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            max-height: 92vh; overflow-y: auto;
            transform: translateY(calc(100% - 90px));
        }
        .identity-dock.glide-up { transform: translateY(0); }

        .handle { width: 45px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 25px; cursor: pointer; }

        .btn-rapido {
            width: 100%; padding: 20px; border-radius: 22px; 
            font-weight: 800; text-transform: uppercase; font-size: 11px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 12px; cursor: pointer; border: 1px solid #f1f5f9; transition: 0.3s;
            letter-spacing: 2px;
        }
        
        .btn-main { background: var(--accent); color: white; border: none; font-size: 13px; margin-top: 10px; box-shadow: 0 15px 30px rgba(255,122,0,0.25); }

        .u-input { 
            width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; 
            padding: 20px; border-radius: 22px; color: #0f172a; 
            font-weight: 700; outline: none; margin-bottom: 12px;
        }

        .hidden { display: none !important; }
        .legal-box { font-size: 11px; color: #64748b; font-weight: 600; margin-top: 15px; display: flex; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <main class="hero-bg" onclick="toggleDock(false)">
        <div class="text-center px-8">
            <h1 class="text-7xl font-black italic tracking-tighter mb-4">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
            <p class="text-slate-500 font-bold uppercase tracking-[10px] text-[11px]">Building Bharat</p>
        </div>
    </main>

    <div id="mainDock" class="identity-dock">
        <div class="handle" onclick="toggleDock()"></div>
        
        <div id="miniTitle" class="text-center cursor-pointer pb-6" onclick="toggleDock()">
            <span class="text-[10px] font-black uppercase tracking-[5px] text-slate-400">Tap to Start</span>
        </div>

        <div id="dockContent" class="opacity-0 transition-opacity duration-500">
            <div id="startView">
                <h3 class="text-xl font-black mb-8 text-center">Ready to Start?</h3>
                <div onclick="initFlow('mobile')" class="btn-rapido bg-slate-50">📱 Mobile OTP Link</div>
                <div onclick="initFlow('whatsapp')" class="btn-rapido bg-[#e7f5ee] text-[#075e54]">💬 WhatsApp Link</div>
                <div onclick="handleGoogle()" class="btn-rapido bg-white border-slate-200">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Account
                </div>
            </div>

            <div id="flowView" class="hidden">
                <h3 id="flowTitle" class="text-xl font-black mb-6 italic">Identity Verification</h3>
                
                <div id="inputBox">
                    <div id="signupFields" class="hidden">
                        <input type="text" id="regName" class="u-input" placeholder="Full Legal Name *">
                        <input type="email" id="regEmail" class="u-input" placeholder="Professional Email *">
                        <select id="regRole" class="u-input"></select>
                    </div>
                    <input type="tel" id="userPhone" class="u-input" placeholder="Mobile Number *">
                    <input type="tel" id="userWa" class="u-input" placeholder="WhatsApp Number *">
                </div>

                <div id="otpBox" class="hidden mb-6">
                    <p class="text-center text-[10px] font-black text-slate-400 mb-4">Enter 6-digit code</p>
                    <input type="text" id="otpValue" class="u-input text-center tracking-[15px] text-2xl font-black border-orange-500" maxlength="6">
                </div>

                <div class="legal-box" onclick="document.getElementById('legalCheck').click()">
                    <input type="checkbox" id="legalCheck" class="w-5 h-5 accent-orange-500 rounded">
                    <span>Accept <span class="text-orange-500 underline">Terms</span> & <span class="text-orange-500 underline">Privacy Policy</span> *</span>
                </div>

                <button id="actionBtn" onclick="executeStep()" class="btn-rapido btn-main">Proceed Securely</button>
            </div>
        </div>
    </div>

    <script>
        let step = 1;

        window.addEventListener('DOMContentLoaded', () => { 
            NS_UI.loadRoles('regRole'); 
        });

        function toggleDock(open = true) {
            const dock = document.getElementById('mainDock');
            const content = document.getElementById('dockContent');
            if(open) { 
                dock.classList.add('glide-up'); 
                setTimeout(() => content.classList.remove('opacity-0'), 200); 
            } else { 
                dock.classList.remove('glide-up'); 
                content.classList.add('opacity-0'); 
            }
        }

        function initFlow(mode) {
            document.getElementById('startView').classList.add('hidden');
            document.getElementById('flowView').classList.remove('hidden');
            document.getElementById('flowTitle').innerText = mode === 'mobile' ? 'Mobile Registry' : 'WhatsApp Registry';
        }

        async function executeStep() {
            if(!document.getElementById('legalCheck').checked) return alert("Accept terms to proceed.");
            if(step === 1) {
                if(document.getElementById('userPhone').value.length < 10) return alert("Enter valid number.");
                document.getElementById('inputBox').classList.add('hidden');
                document.getElementById('otpBox').classList.remove('hidden');
                document.getElementById('actionBtn').innerText = 'Verify Identity';
                alert("TEST OTP: 123456"); step = 2;
            } else {
                if(document.getElementById('otpValue').value === "123456") handleAuth();
                else alert("Invalid Code");
            }
        }

        async function handleAuth() {
            const ph = document.getElementById('userPhone').value;
            const email = `${ph.slice(-10)}@nirmansutra.in`;
            try {
                const user = await auth.signInWithEmailAndPassword(email, "NsSecure2026!").catch(() => null);
                if(user) route(user.user);
                else {
                    document.getElementById('otpBox').classList.add('hidden');
                    document.getElementById('signupFields').classList.remove('hidden');
                    document.getElementById('inputBox').classList.remove('hidden');
                    document.getElementById('actionBtn').innerText = 'Finalize Profile';
                    document.getElementById('actionBtn').onclick = finalize;
                }
            } catch(e) { alert(e.message); }
        }

        async function finalize() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const role = document.getElementById('regRole').value;
            const phone = document.getElementById('userPhone').value;
            const wa = document.getElementById('userWa').value;

            if(!name || !email || !wa) return alert("All fields required.");

            try {
                const res = await auth.createUserWithEmailAndPassword(`${phone.slice(-10)}@nirmansutra.in`, "NsSecure2026!");
                await rtdb.ref(`users/${res.user.uid}`).set({ name, email, role, phone, whatsapp: wa, timestamp: Date.now() });
                window.location.href = NS_ROLES[role].path;
            } catch(e) { alert(e.message); }
        }

        async function route(u) {
            const snap = await rtdb.ref(`users/${u.uid}/role`).once('value');
            const role = snap.val();
            if(role) window.location.href = NS_ROLES[role].path;
            else toggleDock();
        }

        function handleGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => route(res.user));
        }

        auth.onAuthStateChanged(u => { if(u) route(u); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Building Bharat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/auth-router.js"></script>
    <script src="js/comm-hub.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: var(--navy); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; overflow: hidden; }

        /* March 2026 Mesh Background */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(255, 122, 0, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 0.5) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(15, 23, 42, 1) 0px, transparent 100%);
            z-index: -1;
        }

        .hero-gate { 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
            padding-bottom: 120px;
        }

        .brand-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px 20px;
            border-radius: 45px;
            width: 90%; max-width: 420px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        }

        .brand-text { font-size: 3.5rem; font-weight: 900; letter-spacing: -3px; line-height: 0.9; }
        .bharat-tag { 
            display: inline-block; background: var(--accent); color: white;
            padding: 6px 16px; border-radius: 10px; font-weight: 900;
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px;
            margin-top: 20px;
        }

        /* The Interactive Dock */
        .identity-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(25px);
            color: #0f172a;
            border-radius: 45px 45px 0 0; padding: 20px 30px 45px;
            box-shadow: 0 -25px 80px rgba(0,0,0,0.7); z-index: 5000;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            max-height: 85vh; overflow-y: auto;
            transform: translateY(calc(100% - 90px)); 
        }
        .identity-dock.expanded { transform: translateY(0); }

        .handle-bar { width: 45px; height: 5px; background: #cbd5e1; border-radius: 10px; margin: 0 auto 25px; cursor: pointer; }

        /* UI Elements */
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; color: #0f172a; font-weight: 700; outline: none; margin-bottom: 12px; }
        .btn-main { width: 100%; padding: 20px; border-radius: 22px; background: var(--navy); color: white; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; letter-spacing: 1px; }
        
        .channel-btn { 
            width: 100%; padding: 16px; border-radius: 22px; border: 1px solid #f1f5f9; 
            margin-bottom: 12px; font-weight: 800; font-size: 11px; text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; 
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .hidden { display: none !important; }
        .trend-icon { width: 24px; height: 24px; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <main class="hero-gate">
        <div class="brand-card">
            <h1 class="brand-text">NIRMAN<br><span class="text-orange-500">SUTRA</span></h1>
            <div class="bharat-tag">Building Bharat</div>
            <p class="text-slate-400 font-bold uppercase tracking-[4px] text-[9px] mt-10">Infrastructure Intelligence</p>
        </div>
    </main>

    <div id="mainDock" class="identity-dock">
        <div class="handle-bar" onclick="toggleDock()"></div>
        
        <div id="miniBar" class="text-center cursor-pointer pb-6" onclick="toggleDock()">
            <span class="text-[11px] font-black uppercase tracking-[3px] text-slate-900">Partner Login & Sign Up</span>
        </div>

        <div id="dockContent" class="opacity-0 transition-opacity duration-500">
            
            <div id="loginView">
                <h3 class="text-2xl font-black mb-8 text-center text-slate-900 leading-tight">Welcome Partner</h3>
                
                <div onclick="initFlow('login_otp')" class="channel-btn shadow-lg">
                    <img src="https://img.icons8.com/fluency/48/phone.png" class="trend-icon"> Login via OTP
                </div>
                
                <div class="relative my-8"><div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div><div class="relative flex justify-center text-[9px] uppercase font-black"><span class="bg-white px-5 text-slate-300">Identity Check</span></div></div>
                
                <input type="email" id="logEmail" class="u-input" placeholder="Email Address">
                <input type="password" id="logPass" class="u-input" placeholder="Password">
                <button onclick="handleEmailLogin()" class="btn-main mb-6 bg-orange-500">Login</button>
                
                <div onclick="loginGoogle()" class="channel-btn border-none bg-slate-50">
                    <img src="https://img.icons8.com/color/48/google-logo.png" class="trend-icon"> Google Account
                </div>
                
                <p onclick="toggleView('regChoice')" class="text-center mt-8 text-slate-400 font-black text-[10px] cursor-pointer uppercase tracking-widest">New to the network? <span class="text-orange-500 underline">Sign Up</span></p>
            </div>

            <div id="regChoiceView" class="hidden">
                <h3 class="text-2xl font-black mb-8 text-center text-slate-900">Join Building Bharat</h3>
                <div onclick="initFlow('mobile')" class="channel-btn">
                    <img src="https://img.icons8.com/fluency/48/smartphone.png" class="trend-icon"> Sign Up by Mobile
                </div>
                <div onclick="initFlow('whatsapp')" class="channel-btn">
                    <img src="https://img.icons8.com/color/48/whatsapp.png" class="trend-icon"> Sign Up by WhatsApp
                </div>
                <p onclick="toggleView('login')" class="text-center mt-10 text-slate-400 font-black text-xs cursor-pointer uppercase underline underline-offset-4">Back to Login</p>
            </div>

            <div id="dynamicFormView" class="hidden">
                <h3 id="flowTitle" class="text-xl font-black mb-6 text-slate-900">Verification</h3>
                <div id="otpBox" class="hidden mb-6">
                    <input type="text" id="otpValue" class="u-input text-center tracking-[12px] text-2xl border-orange-500" placeholder="000000" maxlength="6">
                </div>
                <div id="inputBox">
                    <div id="regOnlyFields" class="hidden">
                        <input type="text" id="regName" class="u-input" placeholder="Full Legal Name">
                        <select id="regRole" class="u-input"></select>
                    </div>
                    <input type="tel" id="userPhone" class="u-input" placeholder="10-Digit Mobile Number">
                </div>
                <button id="flowActionBtn" onclick="executeFlow()" class="btn-main bg-orange-500 mt-4 shadow-xl shadow-orange-200">Send OTP</button>
                <p onclick="toggleDock()" class="text-center mt-10 text-slate-400 font-black text-xs cursor-pointer uppercase">Cancel & Minimize</p>
            </div>
        </div>
    </div>

    <script>
        let currentMode = ""; let otpSent = false;
        const TEST_OTP = "123456";
        const SECURE_PASS = "Ns_Otp_Secure_2026!"; 

        window.addEventListener('DOMContentLoaded', () => { NS_UI.loadRoles('regRole'); });

        function toggleDock() {
            const dock = document.getElementById('mainDock');
            const content = document.getElementById('dockContent');
            const mini = document.getElementById('miniBar');
            dock.classList.toggle('expanded');
            if(dock.classList.contains('expanded')) {
                setTimeout(() => content.classList.remove('opacity-0'), 150);
                mini.classList.add('hidden');
            } else {
                content.classList.add('opacity-0');
                mini.classList.remove('hidden');
            }
        }

        function toggleView(v) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('regChoiceView').classList.add('hidden');
            document.getElementById('dynamicFormView').classList.add('hidden');
            if(v === 'login') document.getElementById('loginView').classList.remove('hidden');
            if(v === 'regChoice') document.getElementById('regChoiceView').classList.remove('hidden');
            if(v === 'dynamic') document.getElementById('dynamicFormView').classList.remove('hidden');
        }

        function initFlow(mode) {
            currentMode = mode; otpSent = false;
            document.getElementById('otpBox').classList.add('hidden');
            document.getElementById('inputBox').classList.remove('hidden');
            document.getElementById('flowActionBtn').innerText = 'Send OTP Code';
            const isReg = (mode === 'mobile' || mode === 'whatsapp');
            document.getElementById('regOnlyFields').classList.toggle('hidden', !isReg);
            toggleView('dynamic');
        }

        function getMappingEmail(phone) {
            let clean = phone.replace(/\D/g, ''); 
            return `${clean.slice(-10)}@nirmansutra.in`; 
        }

        async function executeFlow() {
            if(!otpSent) {
                const phone = document.getElementById('userPhone').value;
                if(!phone || phone.replace(/\D/g, '').length < 10) return alert("Please enter 10 digits");
                otpSent = true;
                document.getElementById('otpBox').classList.remove('hidden');
                document.getElementById('inputBox').classList.add('hidden');
                document.getElementById('flowActionBtn').innerText = 'Verify Identity';
                alert("Authkey.io Simulation - OTP is: " + TEST_OTP);
            } else {
                if(document.getElementById('otpValue').value === TEST_OTP) {
                    if(currentMode === 'login_otp') handleOTPLogin();
                    else handleOTPRegister();
                } else alert("Invalid Code");
            }
        }

        // --- UPDATED SMART ROUTER LOGIC ---
        async function handleOTPRegister() {
            const ph = document.getElementById('userPhone').value;
            const email = getMappingEmail(ph);
            const name = document.getElementById('regName').value;
            const role = document.getElementById('regRole').value;
            try {
                const res = await auth.createUserWithEmailAndPassword(email, SECURE_PASS);
                await rtdb.ref(`users/${res.user.uid}`).set({
                    name: name, phone: ph, role: role, email: email, loginMethod: 'OTP', timestamp: Date.now()
                });
                
                // ROUTING FIX: Direct to the single Power File
                if(role === "Supplier") {
                    window.location.href = "field/supplier/dashboard.html";
                } else {
                    AuthRouter.redirect(res.user);
                }
            } catch(e) {
                if(e.code === "auth/email-already-in-use") handleOTPLogin();
                else alert(e.message);
            }
        }

        async function handleOTPLogin() {
            const email = getMappingEmail(document.getElementById('userPhone').value);
            try {
                const res = await auth.signInWithEmailAndPassword(email, SECURE_PASS);
                const snap = await rtdb.ref(`users/${res.user.uid}`).once('value');
                const data = snap.val();
                
                // ROUTING FIX: Direct to the single Power File
                if(data && data.role === "Supplier") {
                    window.location.href = "field/supplier/dashboard.html";
                } else {
                    AuthRouter.redirect(res.user);
                }
            } catch(e) { alert("Identity not found. Please Sign Up."); }
        }

        async function handleEmailLogin() {
            try {
                const res = await auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value);
                const snap = await rtdb.ref(`users/${res.user.uid}`).once('value');
                const data = snap.val();
                
                if(data && data.role === "Supplier") {
                    window.location.href = "field/supplier/dashboard.html";
                } else {
                    AuthRouter.redirect(res.user);
                }
            } catch(e) { alert("Invalid credentials."); }
        }

        async function loginGoogle() {
            try {
                const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                const snap = await rtdb.ref(`users/${res.user.uid}`).once('value');
                const data = snap.val();
                
                if(data && data.role === "Supplier") {
                    window.location.href = "field/supplier/dashboard.html";
                } else {
                    AuthRouter.redirect(res.user);
                }
            } catch(e) { alert("Google connection failed."); }
        }
    </script>
</body>
</html>

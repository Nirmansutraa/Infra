<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Login</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/roles.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: var(--navy); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; overflow: hidden; }
        .hero-bg { background: radial-gradient(circle at top right, #1e293b, #020617); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .brand-text { font-size: 11vw; @media (min-width: 768px) { font-size: 85px; } line-height: 1; letter-spacing: -0.05em; }
        .auth-dock { position: fixed; bottom: 0; left: 0; right: 0; background: white; color: #0f172a; border-radius: 40px 40px 0 0; padding: 30px 25px 45px; box-shadow: 0 -20px 60px rgba(0,0,0,0.5); z-index: 5000; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); transform: translateY(calc(100% - 95px)); }
        .auth-dock.active { transform: translateY(0); }
        .handle { width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 25px; cursor: pointer; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 20px; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 12px; cursor: pointer; border: 1px solid #f1f5f9; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; border: none; }
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 18px; border-radius: 18px; color: #0f172a; font-weight: 700; margin-bottom: 12px; outline: none; }
        .label-text { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; display: block; padding-left: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <main class="hero-bg" onclick="toggleDock(false)">
        <div class="w-full max-w-[90vw]">
            <h1 class="brand-text font-black italic text-white">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
            <p class="text-slate-500 font-bold uppercase tracking-[8px] text-[10px] mt-2">Building Bharat</p>
        </div>
    </main>

    <div id="mainDock" class="auth-dock">
        <div class="handle" onclick="toggleDock()"></div>
        
        <div id="startView">
            <p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Login to continue</p>
            <div onclick="initFlow('Mobile')" class="btn-auth bg-slate-50">📱 Mobile Login</div>
            <div onclick="initFlow('WhatsApp')" class="btn-auth bg-[#e7f5ee] text-[#075e54]">💬 WhatsApp Login</div>
            <div onclick="handleGoogle()" class="btn-auth bg-white border-slate-200">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Account
            </div>
        </div>

        <div id="flowView" class="hidden text-center">
            <h3 id="flowTitle" class="text-lg font-black mb-6 uppercase italic">Authentication</h3>
            
            <div id="inputBox" class="text-left">
                <div id="phoneArea">
                    <span class="label-text">Mobile Number *</span>
                    <input type="tel" id="userPhone" class="u-input" placeholder="10-digit mobile">
                </div>

                <div id="otpBox" class="hidden">
                    <span class="label-text text-center">Verify OTP (123456)</span>
                    <input type="text" id="otpValue" class="u-input text-center tracking-[10px] text-xl font-black border-orange-500" placeholder="••••••" maxlength="6">
                </div>

                <div id="signupFields" class="hidden">
                    <span class="label-text">Full Name *</span>
                    <input type="text" id="regName" class="u-input" placeholder="Enter Name">
                    <span class="label-text">Personal Email *</span>
                    <input type="email" id="regEmail" class="u-input" placeholder="example@gmail.com">
                    <span class="label-text">Role *</span>
                    <select id="regRole" class="u-input">
                        <option value="Supplier">Supplier / Material Provider</option>
                        <option value="Builder">Builder / Real Estate</option>
                        <option value="Contractor">Civil Contractor</option>
                        <option value="FleetOwner">Fleet Owner / Logistics</option>
                        <option value="HomeOwner">Individual Home Owner</option>
                    </select>
                </div>
            </div>

            <button id="actionBtn" onclick="executeStep()" class="btn-auth btn-primary">Continue</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentStep = 1;
        let globalPhone = "";

        function toggleDock(open = true) {
            const dock = document.getElementById('mainDock');
            if(open) dock.classList.add('active');
            else dock.classList.remove('active');
        }

        function initFlow(mode) {
            document.getElementById('startView').classList.add('hidden');
            document.getElementById('flowView').classList.remove('hidden');
            document.getElementById('flowTitle').innerText = mode.toUpperCase() + " LOGIN";
            currentStep = 1;
        }

        async function executeStep() {
            if(currentStep === 1) {
                const phInput = document.getElementById('userPhone').value.trim();
                if(phInput.length < 10) return alert("Enter valid 10-digit mobile number");
                
                globalPhone = phInput; // LOCK THE PHONE NUMBER
                document.getElementById('phoneArea').classList.add('hidden');
                document.getElementById('otpBox').classList.remove('hidden');
                currentStep = 2;
            } else if(currentStep === 2) {
                if(document.getElementById('otpValue').value === "123456") {
                    handleAuthSuccess();
                } else {
                    alert("Invalid OTP");
                }
            } else if(currentStep === 3) {
                finalizeSignup();
            }
        }

        async function handleAuthSuccess() {
            if(!globalPhone) return alert("System Error: Phone number lost.");
            
            const sysEmail = `${globalPhone.slice(-10)}@nirmansutra.in`;
            const sysPass = "NsSecure2026!";

            try {
                // TRY LOGIN
                auth.signInWithEmailAndPassword(sysEmail, sysPass)
                .then(res => {
                    checkDatabaseProfile(res.user);
                })
                .catch(err => {
                    if(err.code === 'auth/user-not-found') {
                        // TRY SIGNUP
                        auth.createUserWithEmailAndPassword(sysEmail, sysPass)
                        .then(res => showSignupForm())
                        .catch(err2 => alert("Auth Error: " + err2.message));
                    } else {
                        alert("Login Error: " + err.message);
                    }
                });
            } catch(e) { console.error(e); }
        }

        async function checkDatabaseProfile(user) {
            const snap = await rtdb.ref(`users/${user.uid}/role`).once('value');
            if(snap.exists()) routeUser(user);
            else showSignupForm();
        }

        function showSignupForm() {
            document.getElementById('otpBox').classList.add('hidden');
            document.getElementById('signupFields').classList.remove('hidden');
            document.getElementById('actionBtn').innerText = "Create Account";
            currentStep = 3;
        }

        async function finalizeSignup() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const role = document.getElementById('regRole').value;

            if(!name || !email || !role) return alert("Fill all details.");

            try {
                await rtdb.ref(`users/${auth.currentUser.uid}`).set({
                    name, email, role, phone: globalPhone, status: 'active', timestamp: Date.now()
                });
                routeUser(auth.currentUser);
            } catch(e) { alert("Save Error: " + e.message); }
        }

        async function handleGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => routeUser(res.user));
        }

        async function routeUser(u) {
            if(u.email === "nirmansutraa@gmail.com") {
                window.location.href = "/admin/super_admin.html";
                return;
            }
            const snap = await rtdb.ref(`users/${u.uid}/role`).once('value');
            const role = snap.val();
            const paths = {
                'Supplier': '/field/supplier/dashboard.html',
                'Builder': '/field/builder/dashboard.html',
                'Contractor': '/field/contractor/dashboard.html',
                'FleetOwner': '/field/fleet/dashboard.html',
                'HomeOwner': '/field/homeowner/dashboard.html'
            };
            if(role && paths[role]) window.location.href = paths[role];
            else toggleDock(true); 
        }
    </script>
</body>
</html>

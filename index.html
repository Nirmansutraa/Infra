<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Unified Access Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020617; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: #f8fafc; 
        }
        
        .login-card { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(20px); 
            padding: 60px; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 480px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; 
        }
        
        .btn-universal { 
            background: white; 
            color: #0f172a; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            cursor: pointer; 
            border-radius: 22px; 
            font-weight: 800; 
            width: 100%; 
            padding: 22px; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        .btn-universal:hover { transform: translateY(-2px); background: #f8fafc; }

        .status-msg { 
            margin-top: 30px; 
            padding: 16px; 
            border-radius: 18px; 
            font-size: 11px; 
            font-weight: 800; 
            display: none; 
            text-transform: uppercase; 
        }

        .partnership-box {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-reg {
            color: #ff7a00;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-reg:hover { color: white; letter-spacing: 4px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="mb-12">
        <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">
            NIRMAN<span class="text-orange-500">SUTRA</span>
        </h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[4px]">Unified Access Terminal</p>
    </div>
    
    <button onclick="unifiedLogin()" id="loginBtn" class="btn-universal">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
        Secure Identity Access
    </button>

    <div id="msg" class="status-msg"></div>

    <div class="partnership-box">
        <p class="text-slate-500 text-[9px] font-bold uppercase mb-4 tracking-widest">New Partnership?</p>
        <div onclick="cleanExitToRegistration()" class="btn-reg">
            ➜ New Supplier Registration
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();

    const ROLE_ROUTES = {
        'super_admin': 'admin/dashboard.html',
        'admin': 'admin/dashboard.html',
        'field_staff': 'field/survey.html',
        'supplier': 'onboarding/index.html'
    };

    function updateUI(text, type) {
        const m = document.getElementById('msg');
        m.innerText = text;
        m.style.display = 'block';
        m.className = `status-msg ${type === 'err' ? 'bg-red-500/20 text-red-400' : 'bg-orange-500/20 text-orange-400 animate-pulse'}`;
    }

    /**
     * ENHANCED: CLEAN EXIT
     * This function "kills" the current session before moving to the onboarding folder.
     * This prevents the "Staff Redirect" loop.
     */
    async function cleanExitToRegistration() {
        updateUI("Wiping Session Data...", "warn");
        
        // 1. Clear Browser Memory
        localStorage.clear();
        sessionStorage.clear();
        
        // 2. Clear Firebase Auth
        await auth.signOut();
        
        // 3. Move to onboarding after a tiny delay
        setTimeout(() => {
            window.location.href = "onboarding/index.html?v=" + Date.now();
        }, 800);
    }

    async function executeRouting(user) {
        try {
            updateUI("Verifying Permissions...", "warn");
            const snap = await rtdb.ref(`users/${user.uid}/role`).once('value');
            const role = snap.val();

            if (!role) {
                updateUI("New User: Directing to Onboarding...", "success");
                setTimeout(() => { window.location.replace("onboarding/index.html"); }, 1000);
                return;
            }

            const cleanRole = role.toLowerCase().trim();
            const target = ROLE_ROUTES[cleanRole];

            if (target) {
                updateUI(`Identity Confirmed: ${cleanRole.toUpperCase()}`, "success");
                setTimeout(() => { window.location.replace(target + "?v=" + Date.now()); }, 800);
            } else {
                updateUI("Unknown Role Configuration", "err");
            }
        } catch (e) { updateUI(e.message, "err"); }
    }

    async function unifiedLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        updateUI("Opening Terminal...", "warn");
        try {
            const result = await auth.signInWithPopup(provider);
            if (result.user) await executeRouting(result.user);
        } catch (e) { updateUI(e.message, "err"); }
    }

    /**
     * AUTO-RECOVERY LISTENER
     */
    auth.onAuthStateChanged(user => {
        const isRoot = window.location.pathname === '/' || window.location.pathname.endsWith('index.html');
        // If they are logged in and at the root, move them to their dashboard
        if (user && isRoot) {
            executeRouting(user);
        }
    });
</script>

</body>
</html>

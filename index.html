<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Sovereign Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script src="js/config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/auth-router.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: var(--navy); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        
        /* CLEAN HERO DESIGN */
        .hero-gate { 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding-top: 80px; text-align: center;
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 70%);
        }

        /* RAPIDO STYLE BOTTOM DOCK */
        .identity-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #ffffff; color: #0f172a;
            border-radius: 40px 40px 0 0; padding: 40px 30px;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.8); z-index: 5000;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .handle { width: 50px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 25px; }

        /* FORM STYLING */
        .u-input { width: 100%; background: #f1f5f9; border: 2px solid transparent; padding: 18px; border-radius: 20px; color: #0f172a; font-weight: 700; outline: none; margin-bottom: 12px; }
        .u-input:focus { border-color: var(--accent); background: white; }
        .btn-main { width: 100%; padding: 18px; border-radius: 20px; background: var(--accent); color: white; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; }
        
        .channel-btn { width: 100%; padding: 15px; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 10px; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <main class="hero-gate">
        <h1 class="text-5xl font-black italic tracking-tighter">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <p class="text-slate-500 font-bold uppercase tracking-[10px] text-[10px] mt-4">Infrastructure Intelligence</p>
        <h2 class="text-4xl font-black mt-16 px-10">Building The Spine<br>Of Modern India.</h2>
    </main>

    <div class="identity-dock">
        <div class="handle"></div>
        
        <div id="loginView">
            <h3 class="text-xl font-black mb-6">Authorize Entry</h3>
            <input type="email" id="logEmail" class="u-input" placeholder="Email Address">
            <div class="relative">
                <input type="password" id="logPass" class="u-input" placeholder="Password">
                <span class="absolute right-6 top-4 cursor-pointer opacity-40" onclick="NS_UI.toggleEye('logPass')">👁️</span>
            </div>
            <button onclick="handleLogin()" class="btn-main mb-6">Sign In</button>
            
            <div class="flex items-center gap-4 py-4 opacity-20"><div class="h-px bg-slate-900 flex-1"></div><span class="text-[9px] font-black uppercase">Or Connect Via</span><div class="h-px bg-slate-900 flex-1"></div></div>
            
            <div onclick="loginGoogle()" class="channel-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Account</div>
            <p onclick="toggleView('reg')" class="text-center mt-6 text-orange-600 font-black text-xs cursor-pointer uppercase tracking-widest">New Partner? Register</p>
        </div>

        <div id="regView" class="hidden">
            <h3 class="text-xl font-black mb-6">Join The Network</h3>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="regName" class="u-input" placeholder="Full Name">
                <input type="tel" id="regPhone" class="u-input" placeholder="Mobile">
            </div>
            <div class="relative">
                <input type="password" id="regPass" class="u-input" placeholder="Set Password">
                <span class="absolute right-6 top-4 cursor-pointer opacity-40" onclick="NS_UI.toggleEye('regPass')">👁️</span>
            </div>
            
            <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-2 block">Choose Your Role</label>
            <select id="regRole" class="u-input">
                <option value="Supplier">Supplier (Material Shop)</option>
                <option value="Builders">Builder / Developer</option>
                <option value="Contractor">Contractor</option>
                <option value="HomeOwner">Home Owner</option>
                <option value="FleetOwner">Fleet / Truck Owner</option>
                <option value="Labour Contractor">Labour Contractor</option>
                <option value="field_survey_staff">Field Survey Staff</option>
            </select>

            <button onclick="handleRegister()" class="btn-main mt-4">Create Account</button>
            <p onclick="toggleView('login')" class="text-center mt-6 text-slate-400 font-black text-xs cursor-pointer uppercase">Back to Login</p>
        </div>
    </div>

    <script>
        function toggleView(v) {
            document.getElementById('loginView').classList.toggle('hidden', v === 'reg');
            document.getElementById('regView').classList.toggle('hidden', v === 'login');
        }

        async function loginGoogle() {
            try {
                const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                AuthRouter.redirect(res.user);
            } catch(e) { NS_UI.notify("Google Login Failed"); }
        }

        async function handleLogin() {
            const e = document.getElementById('logEmail').value;
            const p = document.getElementById('logPass').value;
            try {
                const res = await auth.signInWithEmailAndPassword(e, p);
                AuthRouter.redirect(res.user);
            } catch(err) { NS_UI.notify("Invalid Email or Password"); }
        }

        async function handleRegister() {
            const n = document.getElementById('regName').value, ph = document.getElementById('regPhone').value, 
                  p = document.getElementById('regPass').value, r = document.getElementById('regRole').value;
            if(!n || !ph || !p) return NS_UI.notify("Please fill all details");
            
            const tempMail = "node_" + Date.now() + "@nirmansutra.in";
            try {
                const res = await auth.createUserWithEmailAndPassword(tempMail, p);
                await rtdb.ref(`users/${res.user.uid}`).set({
                    name: n, phone: ph, role: r, timestamp: Date.now(), accessStatus: r + ' Verified Access'
                });
                window.location.href = MASTER_ROUTES[r];
            } catch(err) { NS_UI.notify(err.message); }
        }
    </script>
</body>
</html>

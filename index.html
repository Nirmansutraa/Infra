<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Field Intel Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #f8fafc;
        }
        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        .input-field {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #ff7a00;
            box-shadow: 0 0 0 2px rgba(255, 122, 0, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff7a00 0%, #ff5c00 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="login-card mx-4">
    <div class="text-center mb-10">
        <h1 class="text-3xl font-black tracking-tighter uppercase">
            NIRMAN<span class="text-orange-500">SUTRA</span>
        </h1>
        <p class="text-slate-400 text-[10px] font-bold tracking-[3px] uppercase mt-1">Field Intel Gateway</p>
    </div>

    <div class="space-y-6">
        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Work Email</label>
            <input type="email" id="email" class="input-field w-full p-4 rounded-xl outline-none" placeholder="name@nirmansutra.com">
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Security Key</label>
            <input type="password" id="password" class="input-field w-full p-4 rounded-xl outline-none" placeholder="••••••••">
        </div>

        <button onclick="handleLogin()" id="loginBtn" class="btn-primary w-full p-4 rounded-xl font-bold text-sm uppercase tracking-widest shadow-lg shadow-orange-500/20">
            Authorize Access
        </button>

        <p id="errorMessage" class="text-red-400 text-xs text-center font-medium hidden">Login Failed: Check your credentials.</p>
    </div>

    <div class="mt-8 text-center">
        <p class="text-slate-600 text-[9px] font-medium uppercase tracking-widest">Secure Encrypted Session</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

<script>
    // 1. YOUR FIREBASE CONFIGURATION
    // Replace these placeholders with your actual keys from Firebase Console
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 2. LOGIN LOGIC
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMessage');

        if (!email || !password) {
            alert("Please enter both email and security key.");
            return;
        }

        // Show loading state
        btn.innerText = "Verifying...";
        btn.disabled = true;
        errorMsg.classList.add('hidden');

        try {
            // Sign in to Firebase
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // Check Role in Firestore (Look for lowercase 'admin')
            const userDoc = await db.collection('users').doc(user.uid).get();

            if (userDoc.exists) {
                const userData = userDoc.data();
                
                // --- ROLE REDIRECTION LOGIC ---
                if (userData.role === 'admin') {
                    window.location.href = 'admin/dashboard.html';
                } else if (userData.role === 'agent') {
                    window.location.href = 'field/survey.html';
                } else {
                    btn.innerText = "Authorize Access";
                    btn.disabled = false;
                    alert("Access Denied: You do not have an assigned role.");
                }
            } else {
                btn.innerText = "Authorize Access";
                btn.disabled = false;
                alert("Error: User profile not found in database.");
            }

        } catch (error) {
            console.error("Login Error:", error);
            btn.innerText = "Authorize Access";
            btn.disabled = false;
            errorMsg.classList.remove('hidden');
        }
    }

    // Allow "Enter" key to trigger login
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Security Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617; /* Matches dashboard theme */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 60px;
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>
<body>

<div class="login-card shadow-2xl">
    <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">
        NIRMAN<span class="text-orange-500">SUTRA</span>
    </h1>
    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[4px] mb-12">Access Control System</p>

    <button onclick="login()" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-bold py-4 px-8 rounded-2xl flex items-center justify-center gap-4 transition-all shadow-lg">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa-apple/1x/google.png" class="w-6 h-6" alt="Google">
        SIGN IN WITH GOOGLE
    </button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(async (result) => {
            const user = result.user;
            
            // Register user in the Security Matrix if they don't exist
            await rtdb.ref('users/' + user.uid).update({
                email: user.email,
                name: user.displayName,
                lastLogin: Date.now()
            });

            // Check role and redirect
            rtdb.ref('users/' + user.uid + '/role').once('value').then(snap => {
                const role = snap.val();
                if (role === 'admin' || role === 'super_admin') {
                    window.location.href = "dashboard.html";
                } else {
                    window.location.href = "survey.html";
                }
            });
        }).catch(error => {
            console.error("Auth Error:", error);
            alert("Access Denied: Please use a registered Nirmansutra account.");
        });
    }

    // Auto-redirect if already logged in
    auth.onAuthStateChanged(user => {
        if (user) {
            rtdb.ref('users/' + user.uid + '/role').once('value').then(snap => {
                if (snap.val()) window.location.href = snap.val().includes('admin') ? "dashboard.html" : "survey.html";
            });
        }
    });
</script>

</body>
</html>

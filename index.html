<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Security Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020617; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: #f8fafc; 
        }
        
        /* Gold Standard Glassmorphism Container */
        .login-card { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(16px); 
            padding: 60px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
            width: 100%; 
            max-width: 450px; 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            text-align: center; 
        }
        
        .btn-google { 
            background: white; 
            color: #0f172a; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            cursor: pointer; 
            border-radius: 20px; 
            font-weight: 800; 
            width: 100%; 
            padding: 18px; 
            font-size: 14px; 
            text-transform: uppercase; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        /* Public Registration Styling */
        .reg-container {
            margin-top: 45px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        .btn-reg {
            display: inline-block;
            color: #ff7a00;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-reg:hover { color: white; letter-spacing: 4px; }

        .status-box { 
            margin-top: 25px; 
            padding: 14px; 
            border-radius: 16px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            display: none; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card shadow-2xl mx-4">
    <div class="mb-12">
        <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">
            NIRMAN<span class="text-orange-500">SUTRA</span>
        </h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[4px]">Executive Access Control</p>
    </div>
    
    <div id="authSection">
        <button onclick="loginWithGoogle()" id="loginBtn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
            Staff Secure Login
        </button>
    </div>

    <div class="reg-container">
        <p class="text-slate-500 text-[9px] font-bold uppercase mb-4 tracking-widest">Business Partnership?</p>
        <a href="registration.html" class="btn-reg">
            ➜ New Supplier Registration
        </a>
    </div>

    <div id="statusBox" class="status-box"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    /**
     * SECURITY GATEWAY CORE (v15.0)
     * Matches InfraBV01R01 Gold Standard
     */
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();

    function showStatus(msg, type) {
        const box = document.getElementById('statusBox');
        box.innerText = msg;
        box.style.display = 'block';
        box.className = `status-box ${type === 'err' ? 'bg-red-500/20 text-red-500' : 'bg-orange-500/20 text-orange-500 animate-pulse'}`;
    }

    async function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            showStatus("Checking Authorization...", "warn");
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            
            const snapshot = await rtdb.ref('users/' + user.uid).once('value');
            const userData = snapshot.val();

            if (userData) {
                const role = userData.role;
                /**
                 * RESTORED SUBFOLDER REDIRECTION
                 * Correctly points to folders: /admin/ and /field/
                 */
                if (['admin', 'super_admin', 'admin_staff'].includes(role)) {
                    window.location.href = 'admin/dashboard.html';
                } else if (role === 'field_staff') {
                    window.location.href = 'field/survey.html';
                } else {
                    showStatus(`Access Denied: Role is ${role.toUpperCase()}`, "err");
                    await auth.signOut();
                }
            } else {
                // New Staff Registration Request
                await rtdb.ref('users/' + user.uid).set({ 
                    name: user.displayName, 
                    email: user.email, 
                    role: 'pending',
                    registeredAt: Date.now() 
                });
                showStatus("Registration Sent. Contact Admin.", "warn");
                await auth.signOut();
            }
        } catch (error) {
            showStatus(error.message, "err");
        }
    }

    /**
     * PERSISTENT SESSION AUTO-ROUTER
     */
    auth.onAuthStateChanged(user => {
        if (user) {
            rtdb.ref('users/' + user.uid + '/role').once('value').then(snap => {
                const role = snap.val();
                if (role) {
                    if (role.includes('admin')) window.location.href = "admin/dashboard.html";
                    else if (role === 'field_staff') window.location.href = "field/survey.html";
                }
            });
        }
    });
</script>

<br><br><br><br><br>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Building Bharat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/roles.js"></script>

    <style>
        :root { --teal: #00667a; --bg: #f4f7f8; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #1a1a1a; margin: 0; overflow-x: hidden; }

        .splash-screen {
            background: var(--teal); height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; top: 0; left: 0; z-index: 9999; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .auth-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-radius: 45px 45px 0 0;
            padding: 35px 25px 50px; box-shadow: 0 -15px 50px rgba(0,0,0,0.06);
            transform: translateY(100%); transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 5000;
        }
        .auth-dock.active { transform: translateY(0); }

        .r-input {
            width: 100%; background: #f9fbfc; border: 1px solid #eef2f3;
            padding: 20px; border-radius: 18px; font-weight: 700; outline: none; transition: 0.3s;
        }
        .r-input:focus { border-color: var(--teal); background: white; box-shadow: 0 0 0 4px rgba(0,102,122,0.05); }

        .btn-teal {
            width: 100%; background: var(--teal); color: white;
            padding: 20px; border-radius: 18px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; font-size: 13px;
        }

        .method-circle {
            width: 60px; height: 60px; border-radius: 20px;
            border: 1px solid #eef2f3; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            background: white; transition: 0.3s;
        }
        .method-circle:active { transform: scale(0.9); background: #f9fbfc; }

        .otp-box {
            width: 65px; height: 65px; background: #f9fbfc;
            border: 1px solid #eef2f3; border-radius: 15px;
            text-align: center; font-size: 24px; font-weight: 800; color: var(--teal);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="splash" class="splash-screen">
        <div class="bg-white p-10 rounded-[40px] mb-6 shadow-2xl">
            <h1 class="text-5xl font-black italic text-[#00667a] tracking-tighter">NS</h1>
        </div>
        <h2 class="text-white text-3xl font-black tracking-tighter italic">NIRMANSUTRA</h2>
        <p class="text-teal-200 text-[10px] font-black tracking-[8px] mt-3 uppercase opacity-60">Building Bharat</p>
    </div>

    <div id="authDock" class="auth-dock">
        <div id="loginView">
            <div class="text-center mb-10">
                <h3 class="text-3xl font-black text-slate-800 tracking-tight italic">Welcome Back!</h3>
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-widest mt-2">Sign in to your node</p>
            </div>

            <div class="mb-6">
                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-4 mb-2 block">Identity Link</span>
                <input type="tel" id="userPhone" class="r-input" placeholder="Enter Mobile Number">
            </div>

            <button onclick="handleOTPFlow()" class="btn-teal shadow-xl shadow-teal-100">Send Verification</button>

            <div class="relative my-10 text-center">
                <hr class="border-slate-100">
                <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-6 text-[9px] font-black text-slate-300 uppercase tracking-[3px]">Or access via</span>
            </div>

            <div class="flex justify-center gap-6">
                <div onclick="handleGoogle()" class="method-circle"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"></div>
                <div onclick="alert('WhatsApp Link Coming Soon')" class="method-circle text-2xl">💬</div>
            </div>
        </div>

        <div id="otpView" class="hidden">
            <button onclick="toggleView('login')" class="mb-8 text-slate-300"><i data-lucide="arrow-left"></i></button>
            <div class="text-center mb-10">
                <h3 class="text-3xl font-black text-slate-800 italic">Verify Code</h3>
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-widest mt-2">Enter the 4-digit code</p>
            </div>

            <div class="flex justify-between px-2 mb-10">
                <input type="text" maxlength="1" class="otp-box border-teal-500 border-2" id="o1">
                <input type="text" maxlength="1" class="otp-box" id="o2">
                <input type="text" maxlength="1" class="otp-box" id="o3">
                <input type="text" maxlength="1" class="otp-box" id="o4">
            </div>

            <button onclick="verifyAndRoute()" class="btn-teal">Confirm Identity</button>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        // 1. Splash Sequence
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.transform = 'translateY(-100%)';
                document.getElementById('authDock').classList.add('active');
            }, 2000);
        });

        // 2. View Management
        function toggleView(view) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('otpView').classList.add('hidden');
            document.getElementById(view + 'View').classList.remove('hidden');
        }

        // 3. OTP Flow Logic
        function handleOTPFlow() {
            const ph = document.getElementById('userPhone').value;
            if(ph.length < 10) return alert("Enter valid 10-digit number");
            toggleView('otp');
            alert("Sovereign Link: Code is 1234");
        }

        // 4. Centralized Routing Logic
        async function verifyAndRoute() {
            const code = document.getElementById('o1').value + document.getElementById('o2').value + document.getElementById('o3').value + document.getElementById('o4').value;
            if(code === "1234") {
                const phone = document.getElementById('userPhone').value;
                const email = `${phone.slice(-10)}@nirmansutra.in`;
                
                // Try logging in
                try {
                    const res = await auth.signInWithEmailAndPassword(email, "NsSecure2026!").catch(() => null);
                    if(res) {
                        routeUser(res.user);
                    } else {
                        // For new users, we route to Supplier by default or show role selection
                        window.location.href = "/field/supplier/dashboard.html";
                    }
                } catch(e) { alert(e.message); }
            } else { alert("Invalid Code"); }
        }

        async function handleGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => routeUser(res.user));
        }

        async function routeUser(u) {
            const snap = await rtdb.ref(`users/${u.uid}/role`).once('value');
            const role = snap.val();
            // Pull from roles.js matrix
            if(role && NS_ROLES[role]) {
                window.location.href = NS_ROLES[role].path;
            } else {
                window.location.href = "/field/supplier/dashboard.html";
            }
        }

        // Auto-Session Recovery
        auth.onAuthStateChanged(u => { if(u) routeUser(u); });
    </script>
</body>
</html>

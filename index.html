<div class="reg-container">
    <p class="text-slate-500 text-[9px] font-bold uppercase mb-4 tracking-widest">New Partnership?</p>
    <div onclick="cleanExitToRegistration()" class="btn-reg" style="cursor: pointer;">
        ➜ NEW SUPPLIER REGISTRATION
    </div>
</div>

<script>
    // This function must be inside your <script> tag
    async function cleanExitToRegistration() {
        // 1. Visual feedback
        const btn = document.querySelector('.btn-reg');
        btn.innerText = "WIPING SESSION... PLEASE WAIT";
        
        // 2. Clear all local browser memory
        localStorage.clear();
        sessionStorage.clear();
        
        // 3. Force Firebase to log out
        await auth.signOut();
        
        // 4. Move to the Bridge Page
        setTimeout(() => {
            window.location.href = "join.html";
        }, 1000);
    }
</script>

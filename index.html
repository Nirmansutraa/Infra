<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Building Bharat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/auth-router.js"></script>
    <script src="js/comm-hub.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: var(--navy); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        
        /* Hero Section - Clean & Geometric */
        .hero-gate { 
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; background: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 70%);
            padding-bottom: 120px;
        }

        /* AUTO-HIDE DOCK */
        .identity-dock {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #ffffff; color: #0f172a;
            border-radius: 40px 40px 0 0; padding: 20px 30px 40px;
            box-shadow: 0 -20px 60px rgba(0,0,0,0.5); z-index: 5000;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh; overflow-y: auto;
            transform: translateY(calc(100% - 80px)); 
        }

        .identity-dock.expanded { transform: translateY(0); }

        .handle-bar { 
            width: 50px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 0 auto 15px; cursor: pointer;
        }

        /* 2026 Trend Inputs */
        .u-input { width: 100%; background: #f1f5f9; border: 2px solid transparent; padding: 18px; border-radius: 20px; color: #0f172a; font-weight: 700; outline: none; margin-bottom: 12px; font-size: 14px; }
        .u-input:focus { border-color: var(--accent); background: white; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 20px; background: var(--accent); color: white; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; letter-spacing: 1px; }
        
        /* Icon Buttons */
        .channel-btn { 
            width: 100%; padding: 16px; border-radius: 22px; border: 1px solid #e2e8f0; 
            margin-bottom: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; 
            transition: all 0.2s ease;
        }
        .channel-btn:active { transform: scale(0.98); }
        
        .hidden { display: none !important; }
        .trend-icon { width: 22px; height: 22px; }
    </style>
</head>
<body>

    <main class="hero-gate">
        <h1 class="text-5xl font-black tracking-tighter">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <h2 class="text-4xl font-black mt-8 px-10 leading-tight tracking-tight">Building Bharat</h2>
        <p class="text-orange-500 font-bold uppercase tracking-[4px] text-[10px] mt-4 opacity-70">Infrastructure Intelligence</p>
    </main>

    <div id="mainDock" class="identity-dock">
        <div class="handle-bar" onclick="toggleDock()"></div>
        
        <div id="miniBar" class="text-center cursor-pointer pb-5" onclick="toggleDock()">
            <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Already a Partner? Login</span>
        </div>

        <div id="dockContent" class="opacity-0 transition-opacity duration-500">
            
            <div id="loginView">
                <h3 class="text-xl font-black mb-6 text-center">Login</h3>
                
                <div onclick="initFlow('login_otp')" class="channel-btn bg-slate-950 text-white border-none shadow-xl shadow-slate-200">
                    <img src="https://img.icons8.com/fluency/48/phone.png" class="trend-icon"> Login via Mobile / OTP
                </div>
                
                <div class="flex items-center gap-4 py-4 opacity-20"><div class="h-px bg-slate-900 flex-1"></div><span class="text-[8px] font-black uppercase">Secure</span><div class="h-px bg-slate-900 flex-1"></div></div>
                
                <input type="email" id="logEmail" class="u-input" placeholder="Registered Email">
                <input type="password" id="logPass" class="u-input" placeholder="Password">
                <button onclick="handleEmailLogin()" class="btn-main mb-6 shadow-lg shadow-orange-200">Login</button>
                
                <div onclick="loginGoogle()" class="channel-btn bg-white">
                    <img src="https://img.icons8.com/color/48/google-logo.png" class="trend-icon"> Login with Google
                </div>
                
                <p onclick="toggleView('regChoice')" class="text-center mt-6 text-orange-600 font-black text-[11px] cursor-pointer uppercase tracking-widest underline decoration-2 underline-offset-4">New Partner Sign Up</p>
            </div>

            <div id="regChoiceView" class="hidden">
                <h3 class="text-xl font-black mb-8 text-center">Join The Network</h3>
                
                <div onclick="initFlow('mobile')" class="channel-btn bg-slate-950 text-white border-none">
                    <img src="https://img.icons8.com/fluency/48/smartphone.png" class="trend-icon"> Sign Up by Mobile
                </div>
                
                <div onclick="initFlow('whatsapp')" class="channel-btn border-emerald-200 text-emerald-700 bg-emerald-50">
                    <img src="https://img.icons8.com/color/48/whatsapp.png" class="trend-icon"> Sign Up by WhatsApp
                </div>
                
                <p onclick="toggleView('login')" class="text-center mt-8 text-slate-400 font-black text-xs cursor-pointer uppercase">Back to Login</p>
            </div>

            <div id="dynamicFormView" class="hidden">
                <h3 id="flowTitle" class="text-xl font-black mb-6">Verification</h3>
                <div id="otpBox" class="hidden mb-6">
                    <input type="text" id="otpValue" class="u-input text-center tracking-[15px] text-2xl border-orange-500 bg-orange-50" placeholder="000000" maxlength="6">
                </div>
                <div id="inputBox">
                    <div id="regOnlyFields" class="hidden">
                        <input type="text" id="regName" class="u-input" placeholder="Full Name">
                        <select id="regRole" class="u-input">
                            <option value="Supplier">Supplier</option><option value="Builders">Builder</option>
                            <option value="Contractor">Contractor</option><option value="field_survey_staff">Field Agent</option>
                        </select>
                    </div>
                    <input type="tel" id="userPhone" class="u-input" placeholder="10-Digit Mobile Number">
                </div>
                <button id="flowActionBtn" onclick="executeFlow()" class="btn-main mt-4">Get Verification Code</button>
                <p onclick="toggleDock()" class="text-center mt-6 text-slate-400 font-black text-xs cursor-pointer uppercase">Minimize</p>
            </div>
        </div>
    </div>

    <script>
        let currentMode = ""; let otpSent = false;
        const TEST_OTP = "123456";
        const SECURE_PASS = "Ns_Otp_Secure_2026!"; 

        function toggleDock() {
            const dock = document.getElementById('mainDock');
            const content = document.getElementById('dockContent');
            const mini = document.getElementById('miniBar');
            dock.classList.toggle('expanded');
            if(dock.classList.contains('expanded')) {
                content.classList.remove('opacity-0');
                mini.classList.add('hidden');
            } else {
                content.classList.add('opacity-0');
                mini.classList.remove('hidden');
            }
        }

        function toggleView(v) {
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('regChoiceView').classList.add('hidden');
            document.getElementById('dynamicFormView').classList.add('hidden');
            if(v === 'login') document.getElementById('loginView').classList.remove('hidden');
            if(v === 'regChoice') document.getElementById('regChoiceView').classList.remove('hidden');
            if(v === 'dynamic') document.getElementById('dynamicFormView').classList.remove('hidden');
        }

        function initFlow(mode) {
            currentMode = mode; otpSent = false;
            document.getElementById('otpBox').classList.add('hidden');
            document.getElementById('inputBox').classList.remove('hidden');
            document.getElementById('flowActionBtn').innerText = 'Get Verification Code';
            const isReg = (mode === 'mobile' || mode === 'whatsapp');
            document.getElementById('regOnlyFields').classList.toggle('hidden', !isReg);
            toggleView('dynamic');
        }

        function getMappingEmail(phone) {
            let clean = phone.replace(/\D/g, ''); 
            return `${clean.slice(-10)}@nirmansutra.in`; 
        }

        async function executeFlow() {
            if(!otpSent) {
                const phone = document.getElementById('userPhone').value;
                if(!phone || phone.replace(/\D/g, '').length < 10) return alert("Enter 10 digits");
                otpSent = true;
                document.getElementById('otpBox').classList.remove('hidden');
                document.getElementById('inputBox').classList.add('hidden');
                document.getElementById('flowActionBtn').innerText = 'Verify & Access';
                alert("OTP: " + TEST_OTP);
            } else {
                if(document.getElementById('otpValue').value === TEST_OTP) {
                    if(currentMode === 'login_otp') handleOTPLogin();
                    else handleOTPRegister();
                } else alert("Invalid Code");
            }
        }

        async function handleOTPRegister() {
            const ph = document.getElementById('userPhone').value;
            const email = getMappingEmail(ph);
            try {
                const res = await auth.createUserWithEmailAndPassword(email, SECURE_PASS);
                await rtdb.ref(`users/${res.user.uid}`).set({
                    name: document.getElementById('regName').value, 
                    phone: ph, role: document.getElementById('regRole').value, 
                    email: email, loginMethod: 'OTP', timestamp: Date.now()
                });
                AuthRouter.redirect(res.user);
            } catch(e) {
                if(e.code === "auth/email-already-in-use") handleOTPLogin();
                else alert(e.message);
            }
        }

        async function handleOTPLogin() {
            const email = getMappingEmail(document.getElementById('userPhone').value);
            try {
                const res = await auth.signInWithEmailAndPassword(email, SECURE_PASS);
                AuthRouter.redirect(res.user);
            } catch(e) { alert("Please Sign Up First."); }
        }

        async function handleEmailLogin() {
            try {
                const res = await auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value);
                AuthRouter.redirect(res.user);
            } catch(e) { alert("Invalid Credentials"); }
        }

        async function loginGoogle() {
            try {
                const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                AuthRouter.redirect(res.user);
            } catch(e) { alert("Google Error"); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Security Gateway</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617; /* Matches dashboard theme */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #f8fafc;
        }

        /* Gold Standard Glassmorphism */
        .login-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 60px;
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        .btn-google {
            width: 100%;
            background: white;
            color: #0f172a;
            font-weight: 800;
            padding: 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.3); background: #f8fafc; }

        /* REGISTRATION LINK STYLING */
        .reg-container {
            margin-top: 45px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        .btn-reg {
            display: inline-block;
            color: #ff7a00;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-reg:hover { color: white; letter-spacing: 4px; }

        .status-box { 
            margin-top: 25px; 
            padding: 14px; 
            border-radius: 16px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            display: none; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="login-card shadow-2xl mx-4">
    <div class="mb-12">
        <h1 class="text-4xl font-black text-white italic tracking-tighter mb-2">
            NIRMAN<span class="text-orange-500">SUTRA</span>
        </h1>
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[4px]">Executive Access Control</p>
    </div>
    
    <div id="authSection">
        <button onclick="login()" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6" alt="Google">
            Staff Secure Login
        </button>
    </div>

    <div class="reg-container">
        <p class="text-slate-500 text-[9px] font-bold uppercase mb-4 tracking-widest">Joining the Global Network?</p>
        <a href="registration.html" class="btn-reg">
            ➜ New Supplier Registration
        </a>
    </div>

    <div id="statusBox" class="status-box"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    /**
     * GATEWAY LOGIC (v12.0)
     * Strictly manages redirection for internal staff and public registration.
     */
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();

    function showStatus(msg, type) {
        const box = document.getElementById('statusBox');
        box.innerText = msg;
        box.style.display = 'block';
        box.className = `status-box ${type === 'err' ? 'bg-red-500/20 text-red-500' : 'bg-orange-500/20 text-orange-500 animate-pulse'}`;
    }

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        showStatus("Opening Auth Proxy...", "warn");
        
        auth.signInWithPopup(provider).then(async (result) => {
            const user = result.user;
            showStatus("Verifying Permissions...", "warn");
            
            // Sync user details with the Security Matrix
            await rtdb.ref('users/' + user.uid).update({
                email: user.email,
                name: user.displayName,
                lastLogin: Date.now()
            });

            // Redirect based on role protocol
            rtdb.ref('users/' + user.uid + '/role').once('value').then(snap => {
                const role = snap.val();
                if (['admin', 'super_admin', 'admin_staff'].includes(role)) {
                    window.location.href = "dashboard.html";
                } else if (role === 'field_staff') {
                    window.location.href = "survey.html";
                } else {
                    showStatus("Registration Pending Approval.", "warn");
                    setTimeout(() => auth.signOut(), 3000);
                }
            });
        }).catch(error => {
            showStatus(error.message, "err");
        });
    }

    // Persistent Session Checker
    auth.onAuthStateChanged(user => {
        if (user) {
            rtdb.ref('users/' + user.uid + '/role').once('value').then(snap => {
                const role = snap.val();
                if (role) {
                    window.location.href = role.includes('admin') ? "dashboard.html" : "survey.html";
                }
            });
        }
    });
</script>

<br><br><br><br><br>

</body>
</html>

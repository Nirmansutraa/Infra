<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Security Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #f8fafc; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        .btn-google { background: white; color: #1e293b; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; border-radius: 12px; font-weight: 700; width: 100%; padding: 16px; font-size: 14px; text-transform: uppercase; }
        .status-box { margin-top: 20px; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; display: none; }
    </style>
</head>
<body>
<div class="login-card mx-4">
    <div class="mb-10">
        <h1 class="text-3xl font-black tracking-tighter uppercase text-white">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <p class="text-slate-400 text-[10px] font-bold tracking-[3px] uppercase mt-1">Access Control System</p>
    </div>
    
    <div id="authSection">
        <button onclick="loginWithGoogle()" id="loginBtn" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Sign In with Google
        </button>
    </div>

    <div id="statusBox" class="status-box"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        storageBucket: "infradepo.firebasestorage.app",
        messagingSenderId: "733942710671",
        appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();

    function showStatus(msg, type) {
        const box = document.getElementById('statusBox');
        box.innerText = msg;
        box.style.display = 'block';
        box.className = `status-box ${type === 'err' ? 'bg-red-500/20 text-red-500' : 'bg-orange-500/20 text-orange-500 animate-pulse'}`;
    }

    async function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            
            showStatus("Checking Authorization...", "warn");
            
            const snapshot = await rtdb.ref('users/' + user.uid).once('value');
            const userData = snapshot.val();

            if (userData) {
                const role = userData.role;
                // STRICT REDIRECTION LOGIC
                if (['admin', 'super_admin', 'admin_staff'].includes(role)) {
                    window.location.href = 'admin/dashboard.html';
                } else if (role === 'field_staff') {
                    window.location.href = 'field/survey.html';
                } else {
                    // This catches 'pending' or 'deactivated'
                    showStatus(`Access Denied: Role is ${role.toUpperCase()}`, "err");
                    await auth.signOut();
                }
            } else {
                // First time user registration
                await rtdb.ref('users/' + user.uid).set({ 
                    name: user.displayName, 
                    email: user.email, 
                    role: 'pending',
                    registeredAt: Date.now() 
                });
                showStatus("Registration Sent. Wait for Vijay's Approval.", "warn");
                await auth.signOut();
            }
        } catch (error) {
            showStatus(error.message, "err");
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Infrastructure Intelligence Matrix</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script src="/js/config.js"></script>

    <style>
        :root { 
            --accent: #ff7a00; 
            --bg-deep: #020617; 
            --transition-main: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { 
            background-color: var(--bg-deep); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #f8fafc; 
            margin: 0;
            overflow-x: hidden;
        }

        .hero-matrix { 
            background: radial-gradient(circle at 80% 20%, #1e293b 0%, #020617 60%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            padding: 0 8%; 
        }

        .identity-dock {
            position: fixed; 
            bottom: 35px; 
            right: 35px; 
            width: 380px;
            background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(60px);
            padding: 45px; 
            border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 60px 120px rgba(0,0,0,0.9); 
            z-index: 5000;
            transition: var(--transition-main);
        }

        .dock-minimized { transform: translateY(calc(100% - 85px)); opacity: 0.95; }

        .auth-input {
            width: 100%; 
            background: #0f172a; 
            border: 2px solid #1e293b; 
            padding: 20px; 
            border-radius: 22px; 
            color: white; 
            font-weight: 600; 
            outline: none; 
            margin-bottom: 15px;
        }

        .btn-orange {
            background: var(--accent);
            width: 100%;
            padding: 20px;
            border-radius: 22px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <main class="hero-matrix">
        <div class="max-w-6xl">
            <h1 class="text-7xl font-black italic mb-6 tracking-tighter leading-none">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
            <p class="text-slate-400 text-3xl font-medium max-w-3xl">Infrastructure Intelligence Matrix. Deciphering field data into strategic material clarity.</p>
        </div>
    </main>

    <div id="terminalDock" class="identity-dock dock-minimized">
        <div class="cursor-pointer text-center pb-6 text-[10px] font-black uppercase tracking-[5px] text-orange-500" onclick="toggleDock()">
            ▲ Access Gateway
        </div>
        
        <div id="loginView">
            <input type="email" id="logEmail" class="auth-input" placeholder="Email Address">
            <input type="password" id="logPass" class="auth-input" placeholder="Password">
            <button onclick="AuthEngine.login()" class="btn-orange shadow-lg hover:scale-105">Authorize Entry</button>
            
            <div class="flex items-center gap-4 my-8 opacity-20">
                <div class="h-[1px] bg-white flex-1"></div>
                <span class="text-[9px] font-black uppercase">OR</span>
                <div class="h-[1px] bg-white flex-1"></div>
            </div>

            <button onclick="AuthEngine.googleLogin()" class="w-full py-4 bg-white text-black rounded-2xl font-black flex items-center justify-center gap-3 text-xs uppercase">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google ID
            </button>
        </div>
    </div>

    <script>
        // MASTER ROUTING TABLE
        const MASTER_ROUTES = {
            'super_admin': '/admin/super_admin.html',
            'admin': '/admin/dashboard.html',
            'field_survey_staff': '/field/dashboard.html',
            'Supplier': '/field/supplier/dashboard.html',
            'Builders': '/field/builder/dashboard.html'
        };

        window.AuthEngine = {
            async login() {
                const email = document.getElementById('logEmail').value;
                const pass = document.getElementById('logPass').value;
                try {
                    const res = await auth.signInWithEmailAndPassword(email, pass);
                    this.route(res.user);
                } catch(e) { alert("Invalid Credentials"); }
            },
            async googleLogin() {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    const res = await auth.signInWithPopup(provider);
                    this.route(res.user);
                } catch(e) { console.error(e.message); }
            },
            async route(user) {
                const snap = await rtdb.ref(`users/${user.uid}/role`).once('value');
                const role = snap.val();
                if(role && MASTER_ROUTES[role]) {
                    window.location.href = MASTER_ROUTES[role];
                } else {
                    // Default to Supplier Dashboard if role is unassigned
                    window.location.href = MASTER_ROUTES['Supplier'];
                }
            }
        };

        function toggleDock() { document.getElementById('terminalDock').classList.toggle('dock-minimized'); }

        // Auto-route if already logged in
        auth.onAuthStateChanged(user => {
            if (user) AuthEngine.route(user);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NS | Super Admin Export Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #ff7a00; --bg: #020617; --glass: rgba(30, 41, 59, 0.45); }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; margin: 0; min-height: 100vh; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; }
        .btn-export { transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Loading Overlay for Security Check */
        #securityGate { position: fixed; inset: 0; background: #020617; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gate-loader { width: 50px; height: 50px; border: 5px solid rgba(255,122,0,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Content hidden until authorized */
        #mainTerminal { display: none; }
    </style>
</head>
<body class="p-8 md:p-20">

    <div id="securityGate">
        <div class="gate-loader mb-6"></div>
        <p class="text-orange-500 font-black uppercase tracking-[5px] text-[10px]">Verifying Executive Credentials...</p>
    </div>

    <div id="mainTerminal" class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-16">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-[6px] mt-2">Executive Export Terminal</p>
            </div>
            <div class="flex gap-6 items-center">
                <span id="adminId" class="text-[10px] font-black text-orange-400 bg-orange-400/10 px-4 py-2 rounded-full uppercase">Super Admin</span>
                <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase border border-red-500/20 px-4 py-2 rounded-full hover:bg-red-500 hover:text-white transition">Terminate Session</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="glass-card p-10 border-l-8 border-orange-500">
                <div class="flex items-center gap-4 mb-8">
                    <div class="text-3xl">📋</div>
                    <div>
                        <h2 class="text-xl font-black uppercase">Survey Matrix</h2>
                        <p class="text-slate-500 text-[10px] font-black uppercase">Complete Field Intel</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <button onclick="exportData('surveys', 'excel')" class="btn-export w-full bg-emerald-600 hover:bg-emerald-500 py-5 text-xs text-white">📥 Extract Excel Ledger</button>
                    <button onclick="exportData('surveys', 'pdf')" class="btn-export w-full bg-white text-black hover:bg-slate-200 py-5 text-xs">📄 Generate PDF Document</button>
                </div>
            </div>

            <div class="glass-card p-10 border-l-8 border-blue-500">
                <div class="flex items-center gap-4 mb-8">
                    <div class="text-3xl">🤝</div>
                    <div>
                        <h2 class="text-xl font-black uppercase">Partner Registry</h2>
                        <p class="text-slate-500 text-[10px] font-black uppercase">Supplier Onboarding Data</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <button onclick="exportData('supplier_onboarding', 'excel')" class="btn-export w-full bg-blue-600 hover:bg-blue-500 py-5 text-xs text-white">📥 Extract Excel Ledger</button>
                    <button onclick="exportData('supplier_onboarding', 'pdf')" class="btn-export w-full bg-white text-black hover:bg-slate-200 py-5 text-xs">📄 Generate PDF Document</button>
                </div>
            </div>
        </div>

        <div class="mt-10 glass-card p-8 bg-slate-900/30">
            <h3 class="text-[10px] font-black text-slate-600 uppercase tracking-[4px] mb-4">Handshake Status</h3>
            <div id="log" class="text-[10px] font-mono text-slate-500 space-y-1">> Authenticated. Handshake Active.</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database(), auth = firebase.auth();

        /**
         * SECURITY GATEKEEPER (SUPER ADMIN ONLY)
         */
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await rtdb.ref(`users/${user.uid}/role`).once('value');
                const role = snap.val();

                if (role === 'super_admin') {
                    // Access Granted
                    document.getElementById('securityGate').style.display = 'none';
                    document.getElementById('mainTerminal').style.display = 'block';
                    document.getElementById('adminId').innerText = user.email.toUpperCase();
                } else {
                    // Access Denied (Unauthorized Role)
                    alert("SECURITY ALERT: This terminal requires SUPER_ADMIN clearance.");
                    window.location.href = "../index.html";
                }
            } else {
                // Access Denied (No Session)
                window.location.href = "../index.html";
            }
        });

        function addLog(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${msg}</div>`;
        }

        async function exportData(path, format) {
            addLog(`Initializing extraction for [${path}]...`);
            try {
                const snapshot = await rtdb.ref(path).once('value');
                const rawData = snapshot.val();
                if (!rawData) return alert("Zero records found.");

                const processedRows = Object.keys(rawData).map(id => {
                    const item = rawData[id];
                    let flattened = { NODE_ID: id };
                    for (let key in item) {
                        if (typeof item[key] === 'object' && item[key] !== null) {
                            flattened[key] = JSON.stringify(item[key]);
                        } else {
                            flattened[key] = item[key];
                        }
                    }
                    return flattened;
                });

                if (format === 'excel') generateExcel(processedRows, path);
                else generatePDF(processedRows, path);
            } catch (e) {
                addLog(`FAILURE: ${e.message}`);
            }
        }

        function generateExcel(data, filename) {
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "DATA_LEDGER");
            XLSX.writeFile(wb, `NS_EXTRACT_${filename.toUpperCase()}_${Date.now()}.xlsx`);
            addLog(`SUCCESS: ${filename} Excel ready.`);
        }

        function generatePDF(data, filename) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            doc.setFontSize(14);
            doc.text(`NIRMANSUTRA MASTER REPORT: ${filename.toUpperCase()}`, 14, 20);
            const headers = Object.keys(data[0]);
            const body = data.map(row => headers.map(h => row[h] || ''));
            doc.autoTable({
                head: [headers],
                body: body,
                startY: 30,
                styles: { fontSize: 6 },
                headStyles: { fillColor: [255, 122, 0] }
            });
            doc.save(`NS_EXTRACT_${filename.toUpperCase()}_${Date.now()}.pdf`);
            addLog(`SUCCESS: ${filename} PDF ready.`);
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infra V2 | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; overflow: hidden; }
        .sidebar { width: 260px; height: 100vh; background: #0f172a; border-right: 1px solid #1e293b; position: fixed; z-index: 50; }
        .main-content { margin-left: 260px; height: 100vh; overflow-y: auto; padding: 40px; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid #334155; border-radius: 16px; transition: 0.3s; }
        .glass-card.archived { opacity: 0.4; border-style: dashed; }
        .glass-card:hover { border-color: #ff7a00; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; width: 100%; transition: 0.2s; text-align: left;}
        .nav-link.active { background: #ff7a00; color: white; font-weight: 700; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        #adminMap { height: 500px; border-radius: 16px; border: 1px solid #334155; width: 100%; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 16px; background: rgba(30, 41, 59, 0.4); border-radius: 12px; }
        input { background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: white; outline: none; }
    </style>
</head>
<body class="flex">

<nav class="sidebar p-6 flex flex-col">
    <div class="mb-10 px-2 text-center">
        <h1 class="text-2xl font-black text-white uppercase">INFRA<span class="text-orange-500">V2</span></h1>
        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Command Center</p>
    </div>
    <div class="space-y-2 flex-1">
        <button onclick="switchTab('dash')" id="btn-dash" class="nav-link active"><span>📊</span> Analytics</button>
        <button onclick="switchTab('map')" id="btn-map" class="nav-link"><span>📍</span> Live Map</button>
        <button onclick="switchTab('intel')" id="btn-intel" class="nav-link"><span>⚒️</span> Registry</button>
        <button onclick="switchTab('rbac')" id="btn-rbac" class="nav-link"><span>🛡️</span> RBAC Control</button>
    </div>
    <button onclick="logout()" class="nav-link text-red-400 mt-auto font-bold text-[10px] uppercase">🔒 Logout</button>
</nav>

<main class="main-content w-full">
    <section id="tab-dash" class="tab-panel active">
        <h2 class="text-3xl font-extrabold mb-8">Intelligence Overview</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-6 border-l-4 border-orange-500"><p class="text-[10px] font-bold text-slate-400 uppercase">Surveys</p><h3 id="stat-surveys" class="text-4xl font-black mt-2">0</h3></div>
            <div class="glass-card p-6 border-l-4 border-blue-500"><p class="text-[10px] font-bold text-slate-400 uppercase">Total Users</p><h3 id="stat-users" class="text-4xl font-black mt-2">0</h3></div>
            <div class="glass-card p-6 border-l-4 border-emerald-500"><p class="text-[10px] font-bold text-slate-400 uppercase">Materials</p><h3 id="stat-varieties" class="text-4xl font-black mt-2">0</h3></div>
        </div>
    </section>

    <section id="tab-map" class="tab-panel">
        <h2 class="text-3xl font-extrabold mb-8">Live Field Feed</h2>
        <div class="glass-card p-2"><div id="adminMap"></div></div>
    </section>

    <section id="tab-intel" class="tab-panel">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-3xl font-extrabold">Material Registry</h2>
                <input type="text" id="regSearch" placeholder="Search materials..." class="mt-2 text-xs w-64" onkeyup="filterRegistry()">
            </div>
            <button onclick="startWizard()" class="bg-orange-500 px-6 py-2 rounded-xl font-bold text-sm text-white hover:bg-orange-600">Add Material</button>
        </div>
        <div id="registryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <section id="tab-rbac" class="tab-panel">
        <h2 class="text-3xl font-extrabold mb-8 text-white">Access Control (RBAC)</h2>
        <div class="glass-card p-6 overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[10px] text-slate-500 uppercase font-black">
                        <th class="pb-4 px-4">User Name & Email</th>
                        <th class="pb-4 px-4">Access Level</th>
                        <th class="pb-4 px-4">Action</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        storageBucket: "infradepo.firebasestorage.app",
        messagingSenderId: "733942710671",
        appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    const auth = firebase.auth();
    let adminMap, markersLayer;

    function switchTab(id) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'map') setTimeout(initMap, 400);
    }

    // --- RBAC MANAGEMENT ---
    async function manageAccess(uid, name) {
        const choice = prompt(
            `Set access for: ${name}\n\n` +
            `Type the number:\n` +
            `1. field_staff (Survey Staff)\n` +
            `2. admin_staff (Admin Staff)\n` +
            `3. admin (Admin)\n` +
            `4. super_admin (Super Admin)`
        );

        let role = "";
        if (choice === "1") role = "field_staff";
        else if (choice === "2") role = "admin_staff";
        else if (choice === "3") role = "admin";
        else if (choice === "4") role = "super_admin";
        else return;

        if (confirm(`Are you sure you want to grant ${role.toUpperCase()} access to ${name}?`)) {
            await rtdb.ref(`users/${uid}/role`).set(role);
            alert("Access Approved.");
        }
    }

    async function deactivateUser(uid, name) {
        if (confirm(`DANGER:\nAre you sure you want to block all access for ${name}?`)) {
            await rtdb.ref(`users/${uid}/role`).set('deactivated');
            alert(`${name} has been deactivated.`);
        }
    }

    // --- MATERIAL ACTIONS ---
    function toggleArchive(cat, variety, currentStatus) {
        const newStatus = (currentStatus === 'archived') ? 'live' : 'archived';
        rtdb.ref(`registry/materials/${cat}/${variety}/status`).set(newStatus);
    }

    function deleteMaterial(cat, variety) {
        if(confirm(`Permanently delete ${variety}?`)) {
            rtdb.ref(`registry/materials/${cat}/${variety}`).remove();
        }
    }

    function editBrands(cat, variety, currentBrands) {
        const newBrands = prompt(`Edit Brands for ${variety}:`, currentBrands.join(', '));
        if (newBrands) {
            const brandArray = newBrands.split(',').map(b => b.trim());
            rtdb.ref(`registry/materials/${cat}/${variety}/brands`).set(brandArray);
        }
    }

    function startWizard() {
        const cat = prompt("Material Category?"); if(!cat) return;
        const variety = prompt("Variety?"); if(!variety) return;
        const brands = prompt("Brands (comma separated)").split(',').map(b => b.trim());
        rtdb.ref(`registry/materials/${cat}/${variety}`).set({ brands: brands, status: 'live' });
    }

    // --- MAP ---
    function initMap() {
        if (!adminMap) {
            adminMap = L.map('adminMap').setView([20.5937, 78.9629], 5);
            L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(adminMap);
            markersLayer = L.layerGroup().addTo(adminMap);
        }
        syncMarkers();
    }

    function syncMarkers() {
        rtdb.ref('surveys').on('value', snap => {
            markersLayer.clearLayers();
            snap.forEach(child => {
                const d = child.val();
                if (d.location) {
                    L.marker([d.location.lat, d.location.lng]).addTo(markersLayer)
                    .bindPopup(`<b style="color:#ff7a00">${d.firm}</b><br><small>${d.cat}: ${d.var}</small>`);
                }
            });
        });
    }

    // --- DATA SYNC ---
    auth.onAuthStateChanged(user => {
        if (user) {
            rtdb.ref('users/' + user.uid).once('value', snap => {
                const role = snap.val()?.role;
                if (!['admin', 'super_admin', 'admin_staff'].includes(role)) window.location.href = "index.html";
                else startSync();
            });
        } else window.location.href = "index.html";
    });

    function startSync() {
        rtdb.ref('surveys').on('value', s => document.getElementById('stat-surveys').innerText = s.numChildren() || 0);
        
        // UPGRADED RBAC SYNC: Show user details, access level, and manage buttons
        rtdb.ref('users').on('value', s => {
            document.getElementById('stat-users').innerText = s.numChildren() || 0;
            const body = document.getElementById('userTableBody'); body.innerHTML = "";
            s.forEach(u => {
                const data = u.val();
                const uid = u.key;
                body.innerHTML += `
                    <tr class="border-b border-slate-800">
                        <td class="py-4 px-4">
                            <div class="font-bold text-white">${data.name || 'User'}</div>
                            <div class="text-[10px] text-slate-500">${data.email}</div>
                        </td>
                        <td class="py-4 px-4">
                            <span class="bg-slate-800 text-[10px] px-2 py-1 rounded-md font-bold text-orange-400 uppercase">
                                ${data.role}
                            </span>
                        </td>
                        <td class="py-4 px-4 flex gap-2">
                            <button onclick="manageAccess('${uid}', '${data.name}')" class="bg-orange-500 hover:bg-orange-600 text-white text-[10px] font-bold px-3 py-2 rounded-lg transition">
                                MANAGE ACCESS
                            </button>
                            <button onclick="deactivateUser('${uid}', '${data.name}')" class="bg-red-500/20 text-red-500 hover:bg-red-500 hover:text-white text-[10px] font-bold px-3 py-2 rounded-lg transition">
                                DEACTIVATE
                            </button>
                        </td>
                    </tr>`;
            });
        });

        rtdb.ref('registry/materials').on('value', snap => renderRegistry(snap));
    }

    function renderRegistry(snap) {
        const list = document.getElementById('registryList'); list.innerHTML = "";
        let count = 0;
        snap.forEach(cat => {
            cat.forEach(vn => {
                count++; const d = vn.val();
                const bList = d.brands || [];
                const status = d.status || 'live';
                list.innerHTML += `
                    <div class="glass-card p-5 border-t-2 border-orange-500 relative group ${status === 'archived' ? 'archived' : ''}">
                        <div class="absolute top-4 right-4 flex gap-3 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="toggleArchive('${cat.key}', '${vn.key}', '${status}')" class="text-orange-400 text-[10px] font-bold uppercase">${status === 'archived' ? 'Unarchive' : 'Archive'}</button>
                            <button onclick="editBrands('${cat.key}', '${vn.key}', ${JSON.stringify(bList).replace(/"/g, '&quot;')})" class="text-blue-400 text-[10px] font-bold uppercase">Edit</button>
                            <button onclick="deleteMaterial('${cat.key}', '${vn.key}')" class="text-red-500 text-[10px] font-bold uppercase">Delete</button>
                        </div>
                        <p class="text-orange-500 font-bold text-[9px] uppercase">${cat.key}</p>
                        <h4 class="text-xl font-bold">${vn.key} ${status === 'archived' ? '<span class="text-[10px] text-slate-500">(Archived)</span>' : ''}</h4>
                        <div class="mt-2 flex flex-wrap gap-2">
                            ${bList.map(b => `<span class="bg-slate-800 text-[10px] px-2 py-1 rounded border border-slate-700">${b}</span>`).join('')}
                        </div>
                    </div>`;
            });
        });
        document.getElementById('stat-varieties').innerText = count;
    }

    function filterRegistry() {
        const val = document.getElementById('regSearch').value.toLowerCase();
        document.querySelectorAll('#registryList > div').forEach(card => {
            const text = card.innerText.toLowerCase();
            card.style.display = text.includes(val) ? 'block' : 'none';
        });
    }

    function logout() { auth.signOut(); }
</script>
</body>
</html>

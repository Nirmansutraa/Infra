<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NS | Governance Terminal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script src="/js/config.js"></script>

    <style>
        :root { --accent: #ff7a00; --primary: #0f172a; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); }
        .sidebar { background: var(--primary); width: 280px; height: 100vh; position: fixed; left: 0; top: 0; color: white; padding: 40px 20px; }
        .main-content { margin-left: 280px; padding: 40px; }
        .card { background: white; border-radius: 30px; padding: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .tab-btn { width: 100%; padding: 18px; border-radius: 15px; text-align: left; font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; margin-bottom: 10px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(255, 122, 0, 0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1 class="text-2xl font-black italic mb-12 tracking-tighter">NS <span class="text-orange-500">ADMIN</span></h1>
        <nav>
            <button onclick="switchTab('overview')" id="btn-overview" class="tab-btn active">📊 System Overview</button>
            <button onclick="switchTab('suppliers')" id="btn-suppliers" class="tab-btn">🚚 Supplier Nodes</button>
            <button onclick="switchTab('surveys')" id="btn-surveys" class="tab-btn">📋 Field Audits</button>
        </nav>
        <button onclick="auth.signOut()" class="absolute bottom-10 left-10 text-[10px] font-black uppercase opacity-50">Logout</button>
    </aside>

    <main class="main-content">
        <div id="overview" class="tab-content">
            <div class="grid grid-cols-3 gap-8 mb-10">
                <div class="card">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Total Partners</p>
                    <h2 id="countSuppliers" class="text-4xl font-black italic">0</h2>
                </div>
                <div class="card">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Audit Nodes</p>
                    <h2 id="countAudits" class="text-4xl font-black italic">0</h2>
                </div>
                <div class="card">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Registry Nodes</p>
                    <h2 id="countSurveys" class="text-4xl font-black italic">0</h2>
                </div>
            </div>
            <div class="card h-[500px]" id="adminMap"></div>
        </div>

        <div id="suppliers" class="tab-content hidden">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic">Supplier Partner Matrix</h2>
                <button onclick="ExportEngine.toExcel('supplierTable')" class="bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase">Export XLS</button>
            </div>
            <div class="card overflow-x-auto">
                <table class="w-full text-left" id="supplierTable">
                    <thead>
                        <tr class="text-[10px] font-black uppercase text-slate-400 border-b border-slate-100">
                            <th class="pb-4">Firm Name</th>
                            <th class="pb-4">Address</th>
                            <th class="pb-4">Status</th>
                            <th class="pb-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="supplierBody" class="text-sm font-bold"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let map;

        // RBAC Security Check
        auth.onAuthStateChanged(async u => {
            if (u) {
                const snap = await rtdb.ref(`users/${u.uid}/role`).once('value');
                const role = snap.val();
                if (role !== 'admin' && role !== 'super_admin') {
                    alert("Unauthorized Access.");
                    location.href = "/index.html";
                } else {
                    initAdmin();
                }
            } else { location.href = "/index.html"; }
        });

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active');
        }

        function initAdmin() {
            map = L.map('adminMap', { zoomControl: false }).setView([24.58, 73.71], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Sync Supplier Matrix
            rtdb.ref('supplier_onboarding').on('value', snap => {
                const data = snap.val() || {};
                const body = document.getElementById('supplierBody');
                body.innerHTML = "";
                document.getElementById('countSuppliers').innerText = Object.keys(data).length;

                Object.keys(data).forEach(uid => {
                    const node = data[uid];
                    const row = `
                        <tr class="border-b border-slate-50">
                            <td class="py-4">${node.firm}</td>
                            <td class="py-4 text-xs text-slate-400 italic">${node.address.substring(0, 30)}...</td>
                            <td class="py-4"><span class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-[9px] uppercase">${node.status || 'Active'}</span></td>
                            <td class="py-4"><button onclick="zoomTo(${node.location?.lat}, ${node.location?.lng})" class="text-orange-500">Map</button></td>
                        </tr>
                    `;
                    body.innerHTML += row;
                    if(node.location) L.marker([node.location.lat, node.location.lng]).addTo(map).bindPopup(node.firm);
                });
            });

            // Sync Field Audits
            rtdb.ref('site_audits').on('value', snap => {
                document.getElementById('countAudits').innerText = snap.numChildren();
            });
        }

        function zoomTo(lat, lng) {
            if(!lat || !lng) return;
            switchTab('overview');
            map.setView([lat, lng], 18);
        }

        window.ExportEngine = {
            toExcel(tableId) {
                const table = document.getElementById(tableId);
                const wb = XLSX.utils.table_to_book(table);
                XLSX.writeFile(wb, `NS_Report_${Date.now()}.xlsx`);
            }
        };
    </script>
</body>
</html>

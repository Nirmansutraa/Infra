<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeOwner Hub | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/roles.js"></script>
    <script src="/js/map.js"></script>

    <style>
        :root { --bg: #f8fafc; --accent: #f59e0b; --primary: #0f172a; --orange: #ff7a00; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 40px; }
        .hidden { display: none !important; }
        
        .card { background: white; border-radius: 40px; padding: 30px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; color: #0f172a; font-weight: 700; outline: none; margin-bottom: 10px; font-size: 14px; }
        .u-input:focus { border-color: var(--accent); }

        .chip { background: #f1f5f9; padding: 12px 18px; border-radius: 18px; font-size: 11px; font-weight: 800; color: #475569; cursor: pointer; transition: 0.3s; text-align: center; border: 2px solid transparent; text-transform: uppercase; }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 20px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: white; font-size: 7px; padding: 5px; font-weight: 800; text-align: center; }

        .btn-main { width: 100%; padding: 22px; border-radius: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
    </style>
</head>
<body class="p-4">

    <div id="loader" class="flex flex-col items-center justify-center min-h-screen">
        <p class="font-black text-slate-400 animate-pulse uppercase tracking-[5px]">Syncing My Dream Home...</p>
    </div>

    <main id="app" class="max-w-2xl mx-auto hidden">
        <div id="regView" class="hidden">
            <header class="mb-8 text-center">
                <h1 class="text-4xl font-black italic tracking-tighter uppercase">Home<span class="text-amber-500">Registry</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[4px] mt-2 italic">Connect Your Construction Node</p>
            </header>

            <div class="card">
                <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-4 block">Identity Signature</span>
                <input id="userName" placeholder="Full Legal Name *" class="u-input">
                <input id="mobileNo" type="tel" placeholder="Mobile Number *" class="u-input">
            </div>

            <div class="card">
                <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-4 block">Plot Spatial Lock</span>
                <div id="map" class="h-60 rounded-3xl border mb-4"></div>
                <button onclick="GeoEngine.lock()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase flex items-center justify-center gap-3">
                    <i data-lucide="map-pin"></i> Lock Home Location
                </button>
                <textarea id="address" class="u-input h-24 bg-transparent text-xs text-slate-400 italic" readonly placeholder="Reverse-geocoding..."></textarea>
            </div>

            <div class="card">
                <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-4 block">Current Site Evidence</span>
                <div class="grid grid-cols-3 gap-3" id="photoGrid">
                    <button onclick="document.getElementById('camInput').click()" class="photo-slot text-slate-300 text-5xl">+</button>
                </div>
                <input type="file" id="camInput" accept="image/*" capture="environment" hidden onchange="EvidenceEngine.handle(this)">
            </div>

            <button onclick="RegistryAction.transmit()" id="sBtn" class="btn-main bg-amber-500 text-white mt-6 shadow-xl">🚀 Initialize My Home Node</button>
        </div>

        <div id="dashView" class="hidden">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="homeownerName" class="text-3xl font-black italic tracking-tighter uppercase">---</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[4px] mt-1">Residential Intelligence</p>
                </div>
                <button onclick="auth.signOut()" class="bg-slate-200 p-3 rounded-2xl"><i data-lucide="log-out"></i></button>
            </header>

            <div class="card bg-amber-50 border-amber-200">
                <h4 class="font-black uppercase text-[10px] text-amber-600 tracking-widest mb-4">Construction Journey</h4>
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 rounded-full bg-amber-500 flex items-center justify-center text-white font-black text-xs">1</div>
                        <p class="text-sm font-bold">Plot Registry Completed</p>
                    </div>
                    <div class="flex items-center gap-4 opacity-40">
                        <div class="w-8 h-8 rounded-full bg-slate-300 flex items-center justify-center text-white font-black text-xs">2</div>
                        <p class="text-sm font-bold">Foundation Analysis</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="card text-center flex flex-col items-center">
                    <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="package"></i>
                    </div>
                    <p class="font-black uppercase text-[9px] tracking-widest">Material Needs</p>
                </div>
                <div class="card text-center flex flex-col items-center">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="shield-check"></i>
                    </div>
                    <p class="font-black uppercase text-[9px] tracking-widest">Quality Audit</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let state = { photos: [], location: null };

        auth.onAuthStateChanged(user => {
            if (user) checkStatus(user.uid);
            else window.location.href = "/";
        });

        function checkStatus(uid) {
            rtdb.ref('homeowner_onboarding/' + uid).on('value', snap => {
                const data = snap.val();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                if (data) {
                    document.getElementById('dashView').classList.remove('hidden');
                    document.getElementById('homeownerName').innerText = data.name;
                } else {
                    document.getElementById('regView').classList.remove('hidden');
                    NS_Geo.init('map'); //
                }
            });
        }

        window.GeoEngine = {
            async lock() {
                const res = await NS_Geo.captureLock('address');
                state.location = res.location;
            }
        };

        window.EvidenceEngine = {
            handle(input) {
                if(!state.location) return alert("❌ Capture Plot Location first.");
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 800; canvas.height = 600;
                        ctx.drawImage(img, 0, 0, 800, 600);
                        
                        // Resident Site Stamping
                        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 540, 800, 60);
                        ctx.fillStyle = "#f59e0b"; ctx.font = "bold 14px monospace";
                        const stamp = `MY HOME: ${new Date().toLocaleString()} | LAT: ${state.location.lat.toFixed(5)}`;
                        ctx.fillText(stamp, 20, 575);

                        state.photos.push({ src: canvas.toDataURL('image/jpeg', 0.6) });
                        this.render();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            },
            render() {
                const grid = document.getElementById('photoGrid');
                grid.innerHTML = `<button onclick="document.getElementById('camInput').click()" class="photo-slot text-slate-300 text-5xl">+</button>`;
                state.photos.forEach((p, i) => {
                    grid.innerHTML += `<div class="photo-slot" onclick="state.photos.splice(${i},1); EvidenceEngine.render();"><img src="${p.src}" class="w-full h-full object-cover"><div class="stamp-overlay">DELETE</div></div>`;
                });
            }
        };

        window.RegistryAction = {
            async transmit() {
                const name = document.getElementById('userName').value;
                const addr = document.getElementById('address').value;
                if(!name || !state.location || !addr) return alert("❌ All fields and Location Lock required.");
                
                document.getElementById('sBtn').innerText = "TRANSMITTING PLOT...";
                await rtdb.ref('homeowner_onboarding/' + auth.currentUser.uid).set({
                    name: name,
                    phone: document.getElementById('mobileNo').value,
                    address: addr,
                    location: state.location,
                    photos: state.photos,
                    timestamp: Date.now(),
                    status: 'active'
                });
                alert("🚀 Dream Home Node Initialized!");
            }
        };
    </script>
</body>
</html>

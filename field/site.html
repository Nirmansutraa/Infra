<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Site Intelligence | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/geo-engine.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #0f172a; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; }
        .card { background: white; border-radius: 35px; padding: 30px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .section-label { font-size: 11px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; display: block; }
        input, select, textarea { width: 100%; background: #f1f5f9; padding: 18px; border-radius: 18px; font-weight: 600; outline: none; margin-top: 8px; }
        input:focus { border-color: var(--accent); background: white; }
        .mat-row { background: #f8fafc; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; margin-bottom: 12px; }
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 20px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .stamp { position: absolute; bottom: 0; background: rgba(0,0,0,0.8); color: white; font-size: 8px; width: 100%; padding: 6px; font-weight: 800; }
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        #map { height: 250px; border-radius: 25px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="max-w-2xl mx-auto px-6 py-8">
    <header class="mb-8">
        <h1 class="text-3xl font-black italic">SITE <span class="text-orange-500">INTEL</span></h1>
        <p id="agentID" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Authenticating...</p>
    </header>

    <div class="card">
        <span class="section-label">01. Project Info</span>
        <input id="projectName" placeholder="Site Name (e.g. Sharma Villa)">
        <input id="clientName" placeholder="Owner Name">
        <div class="grid grid-cols-2 gap-4">
            <input id="phone" type="tel" placeholder="Mobile">
            <input id="whatsapp" type="tel" placeholder="WhatsApp">
        </div>
    </div>

    <div class="card">
        <span class="section-label">02. Demand Forecast</span>
        <div class="mat-row">
            <div class="flex justify-between text-[10px] font-black uppercase mb-2"><span>Cement</span><span id="c_cem">0 Bags</span></div>
            <div class="grid grid-cols-2 gap-3">
                <select id="u_cem" onchange="calc('cem')"><option value="1">Bags</option><option value="40">Tempo (40)</option></select>
                <input id="v_cem" type="number" placeholder="Qty" oninput="calc('cem')">
            </div>
        </div>
        <div class="mat-row">
            <div class="flex justify-between text-[10px] font-black uppercase mb-2"><span>Steel (TMT)</span><span id="c_stl">0 kg</span></div>
            <div class="grid grid-cols-2 gap-3">
                <select id="u_stl" onchange="calc('stl')"><option value="47">8mm (47kg)</option><option value="52">12mm (52kg)</option></select>
                <input id="v_stl" type="number" placeholder="Bundles" oninput="calc('stl')">
            </div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">03. Spatial Trace</span>
        <div id="map"></div>
        <button onclick="capturePos()" class="w-full py-4 bg-navy text-white rounded-xl font-bold text-xs mb-3">📍 Lock Site Location</button>
        <textarea id="address" class="text-[11px] text-slate-500 bg-transparent border-none" readonly placeholder="Waiting for GPS..."></textarea>
    </div>

    <div class="card">
        <span class="section-label">04. Visual Audit</span>
        <div id="photoGrid" class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-5xl">+</button>
        </div>
        <input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="handlePhoto(this)">
    </div>
</div>

<div class="action-bar">
    <button onclick="syncSite()" id="sBtn" class="w-full py-5 bg-orange-500 text-white rounded-2xl font-black uppercase shadow-lg">Finalize Site Sync</button>
</div>

<script>
    let state = { location: null, photos: [], forecast: {} };

    window.onload = () => {
        NS_Geo.init('map');
        auth.onAuthStateChanged(u => {
            if(!u) window.location.href = "../index.html";
            document.getElementById('agentID').innerText = "AUDITOR: " + u.email.toUpperCase();
        });
    };

    function calc(item) {
        const val = parseFloat(document.getElementById(`v_${item}`).value) || 0;
        const unit = parseFloat(document.getElementById(`u_${item}`).value);
        const res = val * unit;
        document.getElementById(`c_${item}`).innerText = (item === 'cem' ? res.toFixed(0) + " Bags" : res.toFixed(1) + " kg");
        state.forecast[item] = res;
    }

    async function capturePos() {
        const res = await NS_Geo.captureLocation('address');
        state.location = { lat: res.lat, lng: res.lng };
    }

    function handlePhoto(input) {
        if(state.photos.length >= 10) return NS_UI.notify("Max 10 photos");
        const reader = new FileReader();
        reader.onload = (e) => {
            state.photos.push({ src: e.target.result, time: new Date().toLocaleString() });
            renderPhotos();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function renderPhotos() {
        const grid = document.getElementById('photoGrid');
        const btn = grid.firstElementChild;
        grid.innerHTML = ""; grid.appendChild(btn);
        state.photos.forEach(p => {
            grid.innerHTML += `<div class="photo-slot"><img src="${p.src}" class="w-full h-full object-cover"><div class="stamp">${p.time}</div></div>`;
        });
    }

    async function syncSite() {
        const name = document.getElementById('projectName').value;
        if(!name || !state.location) return NS_UI.notify("Name and GPS Lock required.");
        
        const btn = document.getElementById('sBtn');
        btn.innerText = "SYNCING..."; btn.disabled = true;

        const payload = {
            ...state,
            project: name,
            client: document.getElementById('clientName').value,
            phone: document.getElementById('phone').value,
            agent: auth.currentUser.email,
            timestamp: Date.now(),
            status: 'construction_audit'
        };

        try {
            await rtdb.ref('site_audits_v4').push(payload);
            NS_UI.notify("Site Synced Successfully!");
            window.location.reload();
        } catch(e) { NS_UI.notify("Error: " + e.message); btn.innerText = "Finalize Site Sync"; btn.disabled = false; }
    }
</script>
</body>
</html>

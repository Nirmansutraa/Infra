<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra | Site Intelligence Node</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/config.js"></script>

    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --accent: #ff7a00; --primary: #0f172a; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 120px; }
        
        .card { background: var(--card); border-radius: 35px; padding: 40px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .section-label { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 25px; display: block; }
        
        .u-input { width: 100%; background: #f1f5f9; border: 2px solid transparent; padding: 22px; border-radius: 20px; font-weight: 700; margin-bottom: 15px; outline: none; }
        .u-input:focus { border-color: var(--accent); background: white; }

        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 25px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: white; font-size: 8px; padding: 10px; font-weight: 800; line-height: 1.5; }
        
        .btn-main { width: 100%; padding: 22px; border-radius: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">

    <header class="mb-10 max-w-2xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Site<span class="text-orange-500">Intel</span></h1>
            <p id="agentIdentity" class="text-[10px] font-bold text-slate-400 uppercase tracking-[4px] mt-1 italic">Initializing Agent...</p>
        </div>
        <button onclick="location.href='/field/dashboard.html'" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <i data-lucide="arrow-left" class="w-5 h-5 text-slate-400"></i>
        </button>
    </header>

    <main class="max-w-2xl mx-auto">
        <div class="card">
            <span class="section-label">01. Spatial Audit Trace</span>
            <div id="map" class="h-64 rounded-3xl border mb-6 shadow-inner"></div>
            <button onclick="Geo.capture()" class="btn-main bg-slate-900 text-white flex items-center justify-center gap-3">
                <i data-lucide="crosshair"></i> Secure GPS Lock
            </button>
            <textarea id="address" class="w-full mt-4 bg-transparent text-xs text-slate-400 font-bold border-none outline-none italic" placeholder="Waiting for GPS telemetry..." readonly></textarea>
        </div>

        <div class="card">
            <span class="section-label">02. Site Identity</span>
            <input id="siteName" placeholder="Project / Site Name" class="u-input">
            <select id="siteStatus" class="u-input">
                <option value="Foundation">Foundation Stage</option>
                <option value="Structure">Slab / Structure</option>
                <option value="Finishing">Finishing / Interior</option>
                <option value="Completed">Completed Node</option>
            </select>
            <textarea id="siteNotes" placeholder="Operational Remarks" class="u-input h-32"></textarea>
        </div>

        <div class="card">
            <span class="section-label">03. Visual Evidence Matrix</span>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="photoGrid">
                <button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-5xl hover:bg-slate-50 transition-all">+</button>
            </div>
            <input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="Evidence.handle(this)">
        </div>

        <button onclick="AuditEngine.submit()" id="sBtn" class="btn-main bg-orange-500 text-white shadow-xl shadow-orange-100">
            🚀 Synchronize Audit Node
        </button>
    </main>

    <script>
        lucide.createIcons();

        // State derived from backup Site Intel
        window.SiteIntel = {
            state: { location: null, photos: [], agent: "" }
        };

        auth.onAuthStateChanged(u => {
            if (u) {
                document.getElementById('agentIdentity').innerText = "AUDITOR: " + u.email.toUpperCase();
                SiteIntel.state.agent = u.email;
                Geo.init();
            } else { location.href = "/index.html"; }
        });

        // Spatial Module
        window.Geo = {
            map: null, marker: null,
            init() {
                this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([24.58, 73.71], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
            },
            capture() {
                navigator.geolocation.getCurrentPosition(async p => {
                    const { latitude, longitude } = p.coords;
                    SiteIntel.state.location = { lat: latitude, lng: longitude };
                    this.map.setView([latitude, longitude], 17);
                    if (this.marker) this.map.removeLayer(this.marker);
                    this.marker = L.marker([latitude, longitude]).addTo(this.map);
                    
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await res.json();
                    document.getElementById('address').value = data.display_name;
                }, null, { enableHighAccuracy: true });
            }
        };

        // Evidence Module
        window.Evidence = {
            handle(input) {
                if(!SiteIntel.state.location) return alert("❌ GPS Lock Required.");
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 1000; canvas.height = 750;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 1000, 750);
                        
                        // Timestamp Stamping
                        ctx.fillStyle = "rgba(0,0,0,0.6)";
                        ctx.fillRect(0, 680, 1000, 70);
                        ctx.fillStyle = "#ff7a00";
                        ctx.font = "bold 20px monospace";
                        const stamp = `${new Date().toLocaleString()} | GPS: ${SiteIntel.state.location.lat.toFixed(5)}, ${SiteIntel.state.location.lng.toFixed(5)}`;
                        ctx.fillText(stamp, 30, 725);

                        const base64 = canvas.toDataURL('image/jpeg', 0.7);
                        SiteIntel.state.photos.push({ src: base64, time: new Date().toLocaleString() });
                        this.render();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            },
            render() {
                const grid = document.getElementById('photoGrid');
                const btn = grid.firstElementChild;
                grid.innerHTML = ""; grid.appendChild(btn);
                SiteIntel.state.photos.forEach((p, i) => {
                    grid.innerHTML += `<div class="photo-slot" onclick="Evidence.remove(${i})"><img src="${p.src}" class="w-full h-full object-cover"><div class="stamp-overlay">${p.time}</div></div>`;
                });
            },
            remove(idx) { if(confirm("Discard Evidence?")) { SiteIntel.state.photos.splice(idx,1); this.render(); } }
        };

        window.AuditEngine = {
            async submit() {
                const name = document.getElementById('siteName').value;
                if(!name || !SiteIntel.state.location) return alert("❌ Missing Site Name or GPS.");
                
                const btn = document.getElementById('sBtn'); btn.innerText = "Transmitting Audit...";
                const payload = {
                    ...SiteIntel.state,
                    siteName: name,
                    status: document.getElementById('siteStatus').value,
                    notes: document.getElementById('siteNotes').value,
                    timestamp: Date.now()
                };

                try {
                    await rtdb.ref('site_audits').push(payload);
                    alert("🚀 Audit Successfully Vaulted.");
                    location.href = "/field/dashboard.html";
                } catch(e) { alert("Error: " + e.message); btn.innerText = "🚀 Synchronize Audit Node"; }
            }
        };
    </script>
</body>
</html>

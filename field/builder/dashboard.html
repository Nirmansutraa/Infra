<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Builder Hub | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/builder_logic.js"></script>

    <style>
        :root { --bg: #f8fafc; --accent: #3b82f6; --primary: #020617; --orange: #ff7a00; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 60px; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 40px; padding: 30px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; color: #0f172a; font-weight: 700; outline: none; margin-bottom: 12px; font-size: 14px; }
        .label-text { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; display: block; padding-left: 10px; }
        .chip { background: #f1f5f9; padding: 12px 18px; border-radius: 18px; font-size: 10px; font-weight: 800; color: #475569; cursor: pointer; text-transform: uppercase; border: 2px solid transparent; }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .detail-label { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; }
        .detail-value { font-size: 11px; font-weight: 700; color: #1e293b; text-align: right; }
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 25px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.85); color: white; font-size: 8px; padding: 8px; text-align: center; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <main id="app" class="max-w-2xl mx-auto hidden px-4">
        <div id="headerAnchor"></div>

        <div id="dashView" class="hidden">
            <div class="card border-t-8 border-blue-500">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="builderFirm" class="text-2xl font-black italic uppercase leading-none">---</h2>
                        <p id="vBadge" class="inline-block px-3 py-1 mt-2 rounded-lg text-[8px] font-black uppercase tracking-widest bg-slate-100 text-slate-400">Review Pending</p>
                    </div>
                    <button onclick="UI.showAddProject()" class="bg-orange-500 text-white p-4 rounded-[22px] shadow-lg active:scale-95"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>

                <div class="space-y-1 mb-8">
                    <div class="detail-row"><span class="detail-label">Firm GST</span><span id="disp_gst" class="detail-value">---</span></div>
                    <div class="detail-row"><span class="detail-label">Auth Person</span><span id="disp_owner" class="detail-value">---</span></div>
                    <div class="detail-row border-none"><span class="detail-label">Primary Contact</span><span id="disp_contact" class="detail-value">---</span></div>
                </div>

                <div class="bg-slate-900 text-white p-8 rounded-[35px] text-center">
                    <p class="text-[9px] font-black uppercase tracking-[4px] text-blue-400 mb-2">Build Capacity</p>
                    <h3 id="heroTitle" class="text-lg font-black italic uppercase"><span id="siteCount">0</span> Active Sites</h3>
                </div>
            </div>

            <div id="projectList"></div>
        </div>

        <div id="bizRegView" class="hidden">
            <h2 class="text-3xl font-black italic uppercase mb-6">Hub Registry</h2>
            <div class="card">
                <span class="label-text">Identity</span>
                <input id="regFirmName" placeholder="Real Estate Firm Name *" class="u-input">
                <input id="regGST" placeholder="Firm GST Number *" class="u-input">
                <input id="regOwner" placeholder="Authorized Person Name *" class="u-input">
                <input id="regMob" type="tel" placeholder="Mobile Number *" class="u-input" oninput="Validation.copyWA(this.value, 'regWa')">
                <input id="regWa" type="tel" placeholder="WhatsApp Number *" class="u-input">
                <span class="label-text">Office GPS Lock</span>
                <div id="officeMap" class="h-48 rounded-3xl mb-4 overflow-hidden border"></div>
                <button onclick="GeoEngine.lock('regAddr', 'office')" class="u-input bg-slate-900 text-white font-black uppercase text-xs">Lock Office GPS</button>
                <textarea id="regAddr" class="u-input text-xs italic h-20" readonly placeholder="Address..."></textarea>
            </div>
            <button onclick="RegistryAction.saveBiz()" class="w-full bg-blue-500 text-white p-6 rounded-3xl font-black uppercase shadow-xl">🚀 Initialize Hub</button>
        </div>

        <div id="addProjectView" class="hidden">
            <h2 class="text-2xl font-black mb-6 italic uppercase">New <span class="text-blue-500">Site Node</span></h2>
            <div class="card">
                <span class="label-text">Project Details</span>
                <input id="projName" placeholder="Project Name *" class="u-input">
                <select id="projStage" class="u-input">
                    <option value="Land / Leveling">1. Land / Leveling</option>
                    <option value="Foundation">2. Foundation</option>
                    <option value="Structure">3. Slab / Structure</option>
                    <option value="Brickwork">4. Brickwork</option>
                </select>
                <span class="label-text">Site GPS Lock (1m Target)</span>
                <div id="siteMap" class="h-48 rounded-3xl mb-4 border overflow-hidden"></div>
                <button onclick="GeoEngine.lock('projAddr', 'site')" class="u-input bg-slate-900 text-white font-black uppercase text-xs">Capture Site GPS</button>
                <textarea id="projAddr" class="u-input text-xs italic h-20" readonly></textarea>
            </div>

            <div class="card">
                <span class="label-text">Immediate Material Requirement</span>
                <div id="matSelector" class="grid grid-cols-2 gap-3 mb-6"></div>
                <div id="varietyGrid" class="flex flex-wrap gap-2 mb-4 hidden"></div>
                <div id="brandGrid" class="flex flex-wrap gap-2 hidden"></div>
            </div>

            <div class="card">
                <span class="label-text">Site Progress Evidence</span>
                <div class="grid grid-cols-3 gap-3" id="photoGrid">
                    <button onclick="document.getElementById('camInput').click()" class="photo-slot text-slate-300 text-3xl">+</button>
                </div>
                <input type="file" id="camInput" accept="image/*" capture="environment" hidden onchange="EvidenceEngine.handle(this)">
            </div>

            <button onclick="RegistryAction.saveProject()" class="w-full bg-blue-600 text-white p-6 rounded-3xl font-black uppercase shadow-xl mb-10">🚀 Activate Site Node</button>
        </div>
    </main>

    <script>
        lucide.createIcons();

        auth.onAuthStateChanged(user => {
            if (user) { NS_UI.showLoader(); NS_Builder.init(user.uid); }
            else { window.location.href = "/"; }
        });

        window.UI = {
            showAddProject() { 
                document.getElementById('dashView').classList.add('hidden');
                document.getElementById('addProjectView').classList.remove('hidden');
                NS_Geo.init('siteMap');
                // Sync materials via logic brain
                NS_Builder.state.regData && document.getElementById('matSelector').innerHTML === "" ? 
                    document.getElementById('matSelector').innerHTML = Object.keys(NS_Builder.state.regData).map(m => `<div class="chip" onclick="NS_Builder.pickMat('${m}')">${m}</div>`).join('') : null;
            }
        };

        window.Validation = { copyWA(v, t) { document.getElementById(t).value = v; } };
        
        window.GeoEngine = { 
            async lock(id, type) { 
                const res = await NS_Geo.captureLock(id); 
                NS_Builder.state.location = res.location; 
            } 
        };

        window.EvidenceEngine = { handle(i) { NS_Builder.processPhoto(i); } };

        window.RegistryAction = {
            async saveBiz() {
                const firm = document.getElementById('regFirmName').value;
                const owner = document.getElementById('regOwner').value;
                if(!firm || !owner || !NS_Builder.state.location) return alert("Fill all details");
                await rtdb.ref('builder_onboarding/' + auth.currentUser.uid).set({ 
                    firm, ownerName: owner, ownerPhone: document.getElementById('regMob').value, 
                    ownerWa: document.getElementById('regWa').value, gst: document.getElementById('regGST').value, 
                    location: NS_Builder.state.location, address: document.getElementById('regAddr').value, status: 'pending' 
                });
                location.reload();
            },
            async saveProject() {
                const name = document.getElementById('projName').value;
                if(!name || !NS_Builder.state.location) return alert("Name & GPS Required");
                await rtdb.ref('projects').push({
                    builderUid: auth.currentUser.uid, name, stage: document.getElementById('projStage').value,
                    address: document.getElementById('projAddr').value, location: NS_Builder.state.location,
                    photos: NS_Builder.state.photos, timestamp: Date.now()
                });
                location.reload();
            }
        };
    </script>
</body>
</html>

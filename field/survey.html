<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Global Field Intel</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f2f4f7; --card: #ffffff; --accent: #ff7a00; --primary: #0f1b2d; --text-dim: #64748b; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 160px; -webkit-font-smoothing: antialiased; }
        
        /* Premium Card System */
        .card { background: var(--card); border-radius: 24px; padding: 26px; margin-bottom: 20px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); transition: 0.3s ease; }
        .card:focus-within { border-color: var(--accent); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

        .section-label { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; display: block; }
        
        /* Digital Tracking Box */
        .id-box { background: var(--primary); color: #10b981; text-align: center; padding: 30px; border-radius: 18px; font-size: 28px; font-weight: 900; font-family: monospace; letter-spacing: 2px; border: 2px solid #1e293b; }

        /* Apple Style Inputs */
        input, select, textarea { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 14px; font-size: 14px; margin-top: 8px; outline: none; transition: 0.2s; -webkit-appearance: none; }
        input:focus, select:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.1); }
        label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-top: 14px; display: block; padding-left: 4px; }

        /* Material Selection UI */
        .mat-item { background: var(--primary); color: white; padding: 20px 24px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .mat-item.active { border-color: var(--accent); transform: scale(1.02); }
        .glow-dot { width: 10px; height: 10px; border-radius: 50%; background: #334155; transition: 0.3s; }
        .mat-item.active .glow-dot { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* Brand Grid Selection */
        .brand-chip { background: white; border: 1px solid #e2e8f0; padding: 12px 20px; border-radius: 14px; font-size: 11px; font-weight: 800; color: #475569; cursor: pointer; transition: 0.2s; }
        .brand-chip.active { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 4px 12px rgba(255,122,0,0.2); }

        /* Fleet Grid Counter */
        .fleet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .fleet-unit { background: #f8fafc; padding: 18px; border-radius: 18px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .circle-btn { width: 34px; height: 34px; border-radius: 12px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }

        /* Photo Metadata Stamping */
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 16px; border: 1px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .photo-img { width: 100%; height: 100%; object-fit: cover; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.75); color: white; font-size: 7px; padding: 6px; font-weight: bold; line-height: 1.4; border-top: 1px solid rgba(255,255,255,0.1); }

        /* Action Buttons */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(25px); padding: 24px; display: flex; gap: 16px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .btn { flex: 1; padding: 20px; border-radius: 18px; font-weight: 800; font-size: 13px; text-transform: uppercase; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-slate { background: #64748b; color: white; }
        .btn-green { background: #10b981; color: white; box-shadow: 0 10px 25px rgba(16,185,129,0.25); }
    </style>
</head>
<body>

<nav class="bg-white p-6 flex justify-between items-center rounded-b-[40px] border-b mb-10 shadow-sm">
    <div class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">Terminal Active: <span class="text-orange-500" id="staffTag">FS-LOGGING...</span></div>
    <button onclick="auth.signOut()" class="text-red-500 text-[10px] font-black uppercase tracking-widest bg-red-50 px-4 py-2 rounded-full">Logout</button>
</nav>

<div class="max-w-md mx-auto px-6">
    <div class="card">
        <span class="section-label">01. Session Intelligence ID</span>
        <div id="trackId" class="id-box">RJ-UDR-ID---</div>
    </div>

    <div class="card">
        <span class="section-label">02. Entity & Contact Matrix</span>
        
        <label>Supplier Classification</label>
        <select id="supplierType" onchange="Survey.refreshID()">
            <option value="Retailer">Retailer (R)</option>
            <option value="Wholesaler">Wholesaler (W)</option>
        </select>

        <input id="firmName" placeholder="Enter Full Registered Firm Name" class="mt-6">
        
        <div class="mt-10 pt-6 border-t border-slate-100">
            <p class="text-[11px] font-black text-orange-500 uppercase mb-4">Primary Owner Details</p>
            <input id="ownerName" placeholder="Owner Legal Name">
            <div class="grid grid-cols-2 gap-4 mt-2">
                <div><label>Phone (+91)</label><input id="ownerPhone" type="tel" placeholder="Mobile" oninput="Validation.phone(this, 'ownerWa')"></div>
                <div><div class="flex items-center gap-2"><label>Sync WA</label><input type="checkbox" id="syncOwner" class="w-3 h-3 accent-orange-500" onchange="Validation.syncWA('ownerPhone', 'ownerWa', this.checked)"></div><input id="ownerWa" type="tel" placeholder="WhatsApp"></div>
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-100">
            <p class="text-[11px] font-black text-blue-500 uppercase mb-4">Operational Manager</p>
            <input id="mgrName" placeholder="Manager Name">
            <div class="grid grid-cols-2 gap-4 mt-2">
                <div><label>Phone (+91)</label><input id="mgrPhone" type="tel" placeholder="Mobile" oninput="Validation.phone(this, 'mgrWa')"></div>
                <div><div class="flex items-center gap-2"><label>Sync WA</label><input type="checkbox" id="syncMgr" class="w-3 h-3 accent-blue-500" onchange="Validation.syncWA('mgrPhone', 'mgrWa', this.checked)"></div><input id="mgrWa" type="tel" placeholder="WhatsApp"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">03. GPS & Spatial Evidence</span>
        <div id="map" class="h-56 rounded-[32px] mb-6 border border-slate-200 shadow-inner"></div>
        <button onclick="Geo.capture()" class="bg-primary text-white w-full py-5 rounded-2xl font-black text-[12px] uppercase tracking-widest mb-6">📍 Capture Verified Location</button>
        <textarea id="address" class="h-24 text-[11px] text-slate-500 bg-transparent p-0 border-none leading-relaxed" placeholder="Physical address will populate upon GPS capture..." readonly></textarea>
        
        <div class="mt-8">
            <label>Field Proofs (Max 10 with Stamps)</label>
            <div class="grid grid-cols-4 gap-4 mt-4" id="photoGrid">
                <button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-4xl">+</button>
            </div>
            <input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="Evidence.handle(this)">
        </div>
    </div>

    <div class="card">
        <span class="section-label">04. Material Intelligence (Admin Synced)</span>
        <div id="matSelector" class="space-y-3">
            <p class="text-xs text-slate-400 animate-pulse">Establishing Registry Link...</p>
        </div>
        
        <div id="varietyPanel" class="mt-10 hidden bg-slate-50 p-8 rounded-[30px] border border-slate-200">
            <label class="section-label" style="color:#64748b">Step 2: Define Variety</label>
            <select id="varSelect" onchange="Survey.updateState('variety', this.value)"></select>
            
            <label class="section-label mt-10" style="color:#64748b">Step 3: Available Brands</label>
            <div id="brandGrid" class="flex flex-wrap gap-3 mt-3"></div>
        </div>

        <label class="section-label mt-10" style="color:#64748b">Step 4: Market Price (₹)</label>
        <input type="number" id="price" placeholder="Enter rate per unit" oninput="Survey.updateState('price', this.value)">
    </div>

    <div class="card">
        <span class="section-label">05. Transportation Fleet Capacity</span>
        <div id="fleetGrid" class="grid grid-cols-2 gap-5"></div>
    </div>
</div>

<div class="action-bar">
    <button onclick="Draft.save()" class="btn btn-slate">💾 Local Save</button>
    <button onclick="Survey.sync()" id="sBtn" class="btn btn-green">🚀 Cloud Submit</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // --- SMART ID GENERATOR LOGIC (Integrated to prevent 404) ---
    function generateSmartID(supplierType, activeMaterial, currentCount) {
        const state = "RJ", dist = "UDR";
        const typeCode = supplierType === "Wholesaler" ? "W" : "R";
        let matCode = "X", matSearch = (activeMaterial || "").toLowerCase();

        if (matSearch.includes("cement")) matCode = "C";
        else if (matSearch.includes("tmt") || matSearch.includes("steel")) matCode = "T";
        else if (matSearch.includes("sand")) matCode = "S";
        else if (matSearch.includes("aggregate")) matCode = "A";
        else if (matSearch.includes("stone")) matCode = "O";
        else if (matSearch.includes("brick")) matCode = "B";

        const serial = String(currentCount + 1).padStart(3, '0');
        return `${state}-${dist}-${typeCode}${matCode}-${serial}`;
    }

    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        storageBucket: "infradepo.firebasestorage.app",
        messagingSenderId: "733942710671",
        appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    const auth = firebase.auth();

    window.Survey = {
        state: { location: null, mat: null, variety: null, brands: [], fleet: {}, photos: [], price: null, trackingId: "" },
        updateState(key, val) { this.state[key] = val; this.refreshID(); },
        async refreshID() {
            const sType = document.getElementById('supplierType').value;
            const snap = await rtdb.ref('surveys').once('value');
            const smartId = generateSmartID(sType, this.state.mat || "Mixed", snap.numChildren());
            document.getElementById('trackId').innerText = smartId;
            this.state.trackingId = smartId;
        },
        async sync() {
            const firm = document.getElementById('firmName').value;
            if(!this.state.location || !firm) return alert("❌ Firm Name and GPS Geotag required.");
            const btn = document.getElementById('sBtn'); btn.innerText = "SYNCING...";
            const payload = { ...this.state, firm: firm, agent: auth.currentUser.email, timestamp: Date.now() };
            await rtdb.ref('surveys').push(payload);
            alert("✅ Successfully Synced."); location.reload();
        }
    };

    window.Validation = {
        phone(input, waId) {
            let val = input.value.trim().replace(/\D/g, '');
            if(val.length > 10) val = val.slice(-10);
            if(val.length === 10) input.value = "+91 " + val;
            const syncID = input.id === 'ownerPhone' ? 'syncOwner' : 'syncMgr';
            if(document.getElementById(syncID).checked) document.getElementById(waId).value = input.value;
        },
        syncWA(phoneId, waId, isChecked) {
            const phone = document.getElementById(phoneId);
            const wa = document.getElementById(waId);
            if(isChecked) { wa.value = phone.value; wa.readOnly = true; } else { wa.readOnly = false; }
        }
    };

    window.Geo = {
        map: null, marker: null,
        init() {
            this.map = L.map('map', { zoomControl: false }).setView([20.59, 78.96], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
        },
        capture() {
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude, longitude } = p.coords;
                Survey.state.location = { lat: latitude, lng: longitude };
                this.map.setView([latitude, longitude], 16);
                if(this.marker) this.map.removeLayer(this.marker);
                this.marker = L.marker([latitude, longitude]).addTo(this.map);
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                document.getElementById('address').value = data.display_name;
            }, () => alert("Enable GPS"), { enableHighAccuracy: true });
        }
    };

    window.Evidence = {
        handle(input) {
            if(!Survey.state.location) return alert("📍 Capture GPS first.");
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                Survey.state.photos.push({ src: e.target.result, time: new Date().toLocaleString(), lat: Survey.state.location.lat.toFixed(5) });
                this.render();
            };
            reader.readAsDataURL(file);
        },
        render() {
            const grid = document.getElementById('photoGrid'); const b = grid.firstElementChild;
            grid.innerHTML = ""; grid.appendChild(b);
            Survey.state.photos.forEach(p => {
                grid.innerHTML += `<div class="photo-slot"><img src="${p.src}" class="photo-img"><div class="stamp-overlay">${p.time}<br>LAT: ${p.lat}</div></div>`;
            });
        }
    };

    window.syncRegistry = function() {
        rtdb.ref('registry/materials').on('value', snap => {
            const cont = document.getElementById('matSelector'); cont.innerHTML = "";
            window.registryData = snap.val() || {};
            Object.keys(window.registryData).forEach(cat => {
                if(window.registryData[cat].status === 'archived') return;
                cont.innerHTML += `<div class="mat-item" id="mat-${cat}" onclick="selectMat('${cat}')"><span>${cat}</span><div class="glow-dot"></div></div>`;
            });
            Survey.refreshID();
        });
    };

    window.selectMat = function(m) {
        document.querySelectorAll('.mat-item').forEach(r => r.classList.remove('active'));
        document.getElementById('mat-'+m).classList.add('active');
        Survey.state.mat = m; Survey.refreshID();
        document.getElementById('varietyPanel').classList.remove('hidden');
        const vs = document.getElementById('varSelect'); vs.innerHTML = "<option value=''>Choose Variety...</option>";
        const cd = window.registryData[m];
        if(cd.varieties) cd.varieties.forEach(v => vs.innerHTML += `<option value="${v}">${v}</option>`);
        const bg = document.getElementById('brandGrid'); bg.innerHTML = "";
        if(cd.brands) cd.brands.forEach(b => bg.innerHTML += `<div class="brand-chip" onclick="toggleBrand('${b}', this)">${b}</div>`);
    };

    window.toggleBrand = function(b, el) {
        el.classList.toggle('active');
        const idx = Survey.state.brands.indexOf(b);
        idx > -1 ? Survey.state.brands.splice(idx, 1) : Survey.state.brands.push(b);
    };

    window.fleetStep = function(t, v) {
        Survey.state.fleet[t] = Math.max(0, (Survey.state.fleet[t] || 0) + v);
        document.getElementById(`fval-${t}`).innerText = Survey.state.fleet[t];
    };

    window.Draft = { save() { localStorage.setItem('ns_v15_draft', JSON.stringify(Survey.state)); alert("💾 Secured."); } };

    window.onload = () => {
        Geo.init(); syncRegistry();
        const fTypes = ['Tractor', 'Mini Truck', 'Truck', 'Mini Dumper', 'Dumper', 'Trailer'];
        document.getElementById('fleetGrid').innerHTML = fTypes.map(t => `<div class="fleet-unit"><span>${t}</span><div class="flex items-center gap-4"><div class="circle-btn" onclick="fleetStep('${t}', -1)">-</div><span id="fval-${t}">0</span><div class="circle-btn" onclick="fleetStep('${t}', 1)">+</div></div></div>`).join('');
        auth.onAuthStateChanged(u => { if(!u) location.href = "../index.html"; document.getElementById('staffTag').innerText = "FS Instance: " + u.email; });
    };
</script>

<br><br><br><br><br><br><br><br><br><br><br><br>

</body>
</html>

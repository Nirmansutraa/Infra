<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Global Field Intel</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f2f4f7; --card: #ffffff; --accent: #ff7a00; --primary: #0f1b2d; --text-dim: #64748b; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 120px; -webkit-font-smoothing: antialiased; }
        
        /* Premium Card System */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); transition: 0.3s ease; }
        .card:focus-within { border-color: var(--accent); }

        .section-label { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: block; }
        .id-box { background: var(--primary); color: #10b981; text-align: center; padding: 24px; border-radius: 14px; font-size: 28px; font-weight: 900; font-family: monospace; letter-spacing: 2px; }

        /* Inputs - Apple Style */
        input, select, textarea { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 14px; border-radius: 12px; font-size: 14px; margin-top: 6px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); background: #fff; }
        label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-top: 10px; display: block; padding-left: 4px; }

        /* Validation States */
        .input-invalid { border-color: #ef4444 !important; background-color: #fef2f2; }
        .validation-msg { font-size: 9px; color: #ef4444; font-weight: 700; margin-top: 4px; display: none; }

        /* Material UI */
        .mat-item { background: var(--primary); color: white; padding: 16px 20px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 2px solid transparent; }
        .mat-item.active { border-color: var(--accent); }

        /* Fleet Grid */
        .fleet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fleet-unit { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .circle-btn { width: 28px; height: 28px; border-radius: 8px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        /* Photo Interface */
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 12px; border: 1px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .photo-img { width: 100%; height: 100%; object-fit: cover; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: white; font-size: 6px; padding: 4px; font-weight: bold; line-height: 1.2; }

        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); padding: 20px; display: flex; gap: 12px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .btn { flex: 1; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
        .btn-slate { background: #64748b; color: white; }
        .btn-green { background: #10b981; color: white; }
    </style>
</head>
<body>

<nav class="bg-white p-4 flex justify-between items-center rounded-b-3xl border-b mb-6 shadow-sm">
    <div class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">Field Agent: <span class="text-orange-500" id="staffTag">FS-XXXX</span></div>
    <button onclick="auth.signOut()" class="text-red-500 text-[10px] font-black uppercase tracking-widest">Logout</button>
</nav>

<div class="max-w-md mx-auto px-4">
    <div class="card">
        <span class="section-label">1. Session Tracking ID</span>
        <div id="trackId" class="id-box">ID---</div>
    </div>

    <div class="card">
        <span class="section-label">2. Entity & Contacts intelligence</span>
        <label>Firm Name</label>
        <input id="firm" placeholder="Enter Firm Name">
        
        <div class="mt-6 pt-4 border-t border-slate-100">
            <p class="text-[10px] font-black text-orange-500 uppercase mb-2">Owner Intelligence</p>
            <input id="ownerName" placeholder="Owner Full Name">
            <div class="grid grid-cols-2 gap-3 mt-1">
                <div>
                    <label>Phone (+91)</label>
                    <input id="ownerPhone" type="tel" placeholder="Mobile" oninput="Validation.phone(this, 'ownerWa')">
                    <div id="msg-ownerPhone" class="validation-msg">Invalid Number</div>
                </div>
                <div>
                    <div class="flex items-center gap-1"><label>WhatsApp</label><input type="checkbox" id="syncOwner" class="accent-orange-500" onchange="Validation.syncWA('ownerPhone', 'ownerWa', this.checked)"></div>
                    <input id="ownerWa" type="tel" placeholder="WA Number">
                </div>
            </div>
        </div>

        <div class="mt-6 pt-4 border-t border-slate-100">
            <p class="text-[10px] font-black text-blue-500 uppercase mb-2">Manager Intelligence</p>
            <input id="mgrName" placeholder="Manager Name">
            <div class="grid grid-cols-2 gap-3 mt-1">
                <div>
                    <label>Phone (+91)</label>
                    <input id="mgrPhone" type="tel" placeholder="Mobile" oninput="Validation.phone(this, 'mgrWa')">
                    <div id="msg-mgrPhone" class="validation-msg">Invalid Number</div>
                </div>
                <div>
                    <div class="flex items-center gap-1"><label>WhatsApp</label><input type="checkbox" id="syncMgr" class="accent-orange-500" onchange="Validation.syncWA('mgrPhone', 'mgrWa', this.checked)"></div>
                    <input id="mgrWa" type="tel" placeholder="WA Number">
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">3. GPS & Spatial Evidence</span>
        <div id="map" class="h-44 rounded-2xl mb-4 border border-slate-200"></div>
        <button onclick="Geo.capture()" class="bg-primary text-white w-full py-4 rounded-xl font-black text-[11px] uppercase tracking-widest mb-4">📍 Capture GPS & Address</button>
        <textarea id="address" class="h-16 text-[11px] text-slate-500 bg-transparent p-0 border-none" placeholder="Verified address will auto-populate..." readonly></textarea>
        
        <div class="mt-4">
            <label>Site Proofs (Max 10 Photos with GPS Stamp)</label>
            <div class="grid grid-cols-4 gap-2 mt-2" id="photoGrid">
                <button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-2xl">+</button>
            </div>
            <input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="Evidence.handle(this)">
        </div>
    </div>

    <div class="card">
        <span class="section-label">4. Material Intelligence (Dynamic Registry)</span>
        <div id="matSelector" class="space-y-2">
            <p class="text-xs text-slate-400 animate-pulse">Syncing with Admin Registry...</p>
        </div>
        
        <div id="varietyPanel" class="mt-6 hidden bg-slate-50 p-4 rounded-2xl border border-slate-200">
            <label>Select Variety</label>
            <select id="varSelect" onchange="Survey.updateState('variety', this.value)"></select>
            <label class="mt-4">Available Brands</label>
            <div id="brandGrid" class="flex flex-wrap gap-2 mt-2"></div>
        </div>

        <label class="mt-6">Market Price (₹)</label>
        <input type="number" id="price" placeholder="Current Rate" oninput="Survey.updateState('price', this.value)">
    </div>

    <div class="card">
        <span class="section-label">5. Transportation Fleet Capacity</span>
        <div id="fleetGrid" class="fleet-grid"></div>
    </div>
</div>

<div class="action-bar">
    <button onclick="Draft.save()" class="btn btn-slate">💾 Save Local</button>
    <button onclick="Survey.sync()" id="sBtn" class="btn btn-green">🚀 Submit Sync</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        storageBucket: "infradepo.firebasestorage.app",
        messagingSenderId: "733942710671",
        appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    const auth = firebase.auth();

    const Survey = {
        state: { location: null, mat: null, variety: null, brands: [], fleet: {}, photos: [], price: null },
        updateState(key, val) { this.state[key] = val; this.refreshID(); },
        refreshID() {
            const code = this.state.mat ? this.state.mat.slice(0,3).toUpperCase() : 'GEN';
            document.getElementById('trackId').innerText = `ID-${code}-${Date.now().toString().slice(-4)}`;
        },
        async sync() {
            if(!this.state.location || !document.getElementById('firm').value) return alert("📍 Capture GPS and Firm Name First!");
            const btn = document.getElementById('sBtn'); btn.innerText = "TRANSMITTING...";
            const payload = { ...this.state, firm: document.getElementById('firm').value, agent: auth.currentUser.email, timestamp: Date.now() };
            await rtdb.ref('surveys').push(payload);
            alert("✅ INTEL SYNCED TO SINGAPORE CLOUD");
            localStorage.removeItem('nirmansutra_draft');
            location.reload();
        }
    };

    const Validation = {
        phone(input, waId) {
            let val = input.value.trim().replace(/\D/g, '');
            const msgEl = document.getElementById(`msg-${input.id}`);
            
            // Indian Context: auto-prefix +91 if starts with 6-9
            if (/^[6-9]\d{9}$/.test(val)) { val = "91" + val; }
            if (val.length > 0 && !val.startsWith('91')) { 
                input.classList.add('input-invalid');
                msgEl.style.display = 'block';
                msgEl.innerText = "Start with 6-9";
            } else if (val.length === 12) {
                input.classList.remove('input-invalid');
                msgEl.style.display = 'none';
                input.value = "+" + val;
            }
        },
        syncWA(phoneId, waId, isChecked) {
            const phone = document.getElementById(phoneId);
            const wa = document.getElementById(waId);
            if(isChecked) { wa.value = phone.value; wa.readOnly = true; } 
            else { wa.readOnly = false; }
        }
    };

    const Geo = {
        map: null,
        init() {
            this.map = L.map('map', { zoomControl: false }).setView([20.59, 78.96], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
        },
        capture() {
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude, longitude } = p.coords;
                Survey.state.location = { lat: latitude, lng: longitude };
                this.map.setView([latitude, longitude], 16);
                L.marker([latitude, longitude]).addTo(this.map);
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                document.getElementById('address').value = data.display_name;
            });
        }
    };

    const Evidence = {
        handle(input) {
            if(!Survey.state.location) return alert("📍 Capture GPS first for photo timestamping");
            if(Survey.state.photos.length >= 10) return alert("Limit: 10 Photos");
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                const pData = { src: e.target.result, time: new Date().toLocaleString(), lat: Survey.state.location.lat.toFixed(4) };
                Survey.state.photos.push(pData);
                this.render();
            };
            reader.readAsDataURL(file);
        },
        render() {
            const grid = document.getElementById('photoGrid');
            const addBtn = grid.firstElementChild;
            grid.innerHTML = ""; grid.appendChild(addBtn);
            Survey.state.photos.forEach(p => {
                grid.innerHTML += `<div class="photo-slot"><img src="${p.src}" class="photo-img"><div class="stamp-overlay">${p.time}<br>LAT: ${p.lat}</div></div>`;
            });
        }
    };

    const Draft = {
        save() {
            localStorage.setItem('nirmansutra_draft', JSON.stringify(Survey.state));
            alert("💾 LOCAL DRAFT SECURED");
        },
        load() {
            const saved = localStorage.getItem('nirmansutra_draft');
            if(saved && confirm("Found a local draft. Recover data?")) {
                Object.assign(Survey.state, JSON.parse(saved));
                this.syncUI();
            }
        },
        syncUI() {
            Evidence.render();
            Survey.refreshID();
        }
    };

    // --- DYNAMIC REGISTRY LISTENER ---
    function syncRegistry() {
        rtdb.ref('registry/materials').on('value', snap => {
            const cont = document.getElementById('matSelector');
            cont.innerHTML = "";
            const data = snap.val();
            if(!data) return cont.innerHTML = "<p class='text-xs text-red-500'>Registry Empty. Update Admin Dashboard.</p>";

            Object.keys(data).forEach(cat => {
                if(data[cat].status === 'archived') return;
                cont.innerHTML += `
                    <div class="mat-item" id="mat-${cat}" onclick="selectMat('${cat}')">
                        <span class="text-xs font-black uppercase tracking-widest">${cat}</span>
                        <div class="w-4 h-4 rounded-full border border-white/30" id="dot-${cat}"></div>
                    </div>`;
            });
            window.registryData = data;
        });
    }

    function selectMat(m) {
        document.querySelectorAll('.mat-item').forEach(r => r.classList.remove('active'));
        document.getElementById('mat-'+m).classList.add('active');
        Survey.state.mat = m;
        Survey.refreshID();

        const panel = document.getElementById('varietyPanel'); panel.classList.remove('hidden');
        const vSelect = document.getElementById('varSelect'); vSelect.innerHTML = "<option>Choose Variety...</option>";
        
        const catData = window.registryData[m];
        if(catData.varieties) {
            catData.varieties.forEach(v => vSelect.innerHTML += `<option value="${v}">${v}</option>`);
        }

        const bGrid = document.getElementById('brandGrid'); bGrid.innerHTML = "";
        if(catData.brands) {
            catData.brands.forEach(b => {
                bGrid.innerHTML += `<div class="bg-white px-3 py-2 rounded-lg border border-slate-200 text-[9px] font-bold cursor-pointer" onclick="toggleBrand('${b}', this)">${b}</div>`;
            });
        }
    }

    function toggleBrand(b, el) {
        el.classList.toggle('border-orange-500'); el.classList.toggle('text-orange-500'); el.classList.toggle('bg-orange-50');
        const idx = Survey.state.brands.indexOf(b);
        idx > -1 ? Survey.state.brands.splice(idx, 1) : Survey.state.brands.push(b);
    }

    function fleetStep(t, v) {
        Survey.state.fleet[t] = Math.max(0, (Survey.state.fleet[t] || 0) + v);
        document.getElementById(`fval-${t}`).innerText = Survey.state.fleet[t];
    }

    window.onload = () => {
        Geo.init(); syncRegistry(); Draft.load();
        const fTypes = ['Tractor', 'Mini Truck', 'Truck', 'Mini Dumper', 'Dumper', 'Trailer'];
        document.getElementById('fleetGrid').innerHTML = fTypes.map(t => `
            <div class="fleet-unit">
                <span class="text-[9px] font-bold text-slate-500 uppercase">${t}</span>
                <div class="flex items-center gap-3">
                    <div class="circle-btn" onclick="fleetStep('${t}', -1)">-</div>
                    <span id="fval-${t}" class="font-black text-sm">0</span>
                    <div class="circle-btn" onclick="fleetStep('${t}', 1)">+</div>
                </div>
            </div>`).join('');
            
        auth.onAuthStateChanged(u => {
            if(!u) location.href = "../index.html";
            document.getElementById('staffTag').innerText = "FS-" + u.uid.slice(-6).toUpperCase();
        });
    };
</script>
</body>
</html>

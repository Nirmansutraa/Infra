<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Global Field Intel</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #f2f4f7; 
            --card: #ffffff; 
            --accent: #ff7a00; 
            --primary: #0f1b2d; 
            --text-dim: #64748b; 
        }
        
        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--primary); 
            padding-bottom: 250px; 
            -webkit-font-smoothing: antialiased; 
        }
        
        /* High-End Card Architecture */
        .card { 
            background: var(--card); 
            border-radius: 40px; 
            padding: 45px; 
            margin-bottom: 35px; 
            border: 1px solid #e5e7eb; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .card:focus-within { 
            border-color: var(--accent); 
            box-shadow: 0 30px 60px -15px rgba(255, 122, 0, 0.15); 
        }

        .section-label { 
            font-size: 12px; 
            font-weight: 900; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 25px; 
            display: block; 
        }

        /* Digital Identity Box */
        .id-box { 
            background: var(--primary); 
            color: #10b981; 
            text-align: center; 
            padding: 55px; 
            border-radius: 32px; 
            font-size: 36px; 
            font-weight: 900; 
            font-family: monospace; 
            letter-spacing: 6px; 
            border: 2px solid #1e293b; 
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.4);
            text-shadow: 0 0 20px rgba(16,185,129,0.4);
        }

        /* Standardized Form Inputs */
        input, select, textarea { 
            width: 100%; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            padding: 24px; 
            border-radius: 22px; 
            font-size: 16px; 
            font-weight: 600;
            margin-top: 15px; 
            outline: none; 
            transition: 0.3s ease; 
            -webkit-appearance: none; 
        }
        
        input:focus, select:focus { 
            border-color: var(--accent); 
            background: #fff; 
            box-shadow: 0 0 0 8px rgba(255, 122, 0, 0.08);
        }
        
        label { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            margin-top: 30px; 
            display: block; 
            padding-left: 12px; 
        }

        /* Material Category Selectors */
        .mat-item { 
            background: var(--primary); 
            color: white; 
            padding: 30px 40px; 
            border-radius: 32px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: 0.4s ease; 
        }
        
        .mat-item.active { 
            border-color: var(--accent); 
            transform: scale(1.03); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        
        .glow-dot { 
            width: 18px; 
            height: 18px; 
            border-radius: 50%; 
            background: #334155; 
            transition: 0.4s; 
        }
        
        .mat-item.active .glow-dot { 
            background: var(--accent); 
            box-shadow: 0 0 30px var(--accent); 
        }

        /* BRAND CHIP GRID ARCHITECTURE */
        .tab-grid { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px; 
            margin-top: 25px; 
        }
        
        .chip { 
            background: white; 
            border: 1px solid #e2e8f0; 
            padding: 22px 18px; 
            border-radius: 24px; 
            font-size: 13px; 
            font-weight: 800; 
            color: #475569; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-align: center; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 85px;
            line-height: 1.4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        
        .chip.active { 
            background: var(--accent); 
            color: white; 
            border-color: var(--accent); 
            transform: translateY(-6px); 
            box-shadow: 0 15px 30px rgba(255,122,0,0.3); 
        }

        /* 6-VEHICLE LOGISTICS DASHBOARD */
        .fleet-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 28px; 
        }
        
        .fleet-unit { 
            background: #f8fafc; 
            padding: 30px; 
            border-radius: 32px; 
            border: 1px solid #e2e8f0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .circle-btn { 
            width: 52px; 
            height: 52px; 
            border-radius: 20px; 
            background: var(--primary); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
            font-size: 22px;
        }

        /* EVIDENCE CAPTURE WITH META-STAMPS */
        .photo-slot { 
            aspect-ratio: 1; 
            background: #f1f5f9; 
            border-radius: 24px; 
            border: 2px dashed #cbd5e1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
        }
        
        .stamp-overlay { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(0,0,0,0.85); 
            color: white; 
            font-size: 8px; 
            padding: 15px; 
            font-weight: 800; 
            line-height: 1.8; 
        }

        /* ACTION BAR */
        .action-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(255,255,255,0.98); 
            backdrop-filter: blur(60px); 
            padding: 35px; 
            display: flex; 
            gap: 28px; 
            border-top: 1px solid #e2e8f0; 
            z-index: 1000; 
        }
        
        .btn { 
            flex: 1; 
            padding: 28px; 
            border-radius: 26px; 
            font-weight: 900; 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.4s ease; 
        }
        
        .btn-slate { background: #64748b; color: white; }
        .btn-green { 
            background: #10b981; 
            color: white; 
            box-shadow: 0 20px 45px rgba(16,185,129,0.35); 
        }
    </style>
</head>
<body>

<nav class="bg-white p-10 flex justify-between items-center rounded-b-[70px] border-b mb-20 shadow-sm">
    <h1 class="text-3xl font-black tracking-tighter">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
    <button onclick="auth.signOut()" class="text-red-500 text-[14px] font-black uppercase bg-red-50 px-9 py-5 rounded-full">Logout</button>
</nav>

<div class="max-w-md mx-auto px-10">
    <div class="card"><span class="section-label">01. Session Tracking Identity</span><div id="trackId" class="id-box">RJ-UDR-ID---</div></div>

    <div class="card">
        <span class="section-label">02. Entity Matrix</span>
        <select id="supplierType" onchange="Survey.refreshID()"><option value="Retailer">Retailer (R)</option><option value="Wholesaler">Wholesaler (W)</option></select>
        <input id="firmName" placeholder="Registered Firm Name" class="mt-12">
        <div class="mt-16 pt-12 border-t border-slate-100">
            <input id="ownerName" placeholder="Owner Legal Name">
            <div class="grid grid-cols-2 gap-8 mt-2">
                <input id="ownerPhone" type="tel" placeholder="Mobile" oninput="Validation.phone(this, 'ownerWa')">
                <div class="flex items-center gap-4"><label>Sync WA</label><input type="checkbox" id="syncOwner" class="w-6 h-6" onchange="Validation.syncWA('ownerPhone', 'ownerWa', this.checked)"></div>
                <input id="ownerWa" type="tel" placeholder="WhatsApp">
            </div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">03. GPS proofing</span>
        <div id="map" class="h-80 rounded-[50px] mb-12 border shadow-inner"></div>
        <button onclick="Geo.capture()" class="bg-primary text-white w-full py-9 rounded-2xl font-black uppercase tracking-[3px] mb-12 shadow-2xl">📍 Capture Geotagged Location</button>
        <textarea id="address" class="h-44 text-[15px] text-slate-500 bg-transparent p-0 border-none leading-relaxed" placeholder="Geotag address..." readonly></textarea>
        <div class="mt-16"><label>Evidence Grid (Max 10)</label><div class="grid grid-cols-4 gap-8 mt-10" id="photoGrid"><button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-7xl">+</button></div><input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="Evidence.handle(this)"></div>
    </div>

    <div class="card">
        <span class="section-label">04. Material intelligence (Direct)</span>
        <div id="matSelector" class="space-y-8"></div>

        <div id="brandSection" class="mt-20 hidden bg-slate-50 p-14 rounded-[50px] border shadow-inner">
            <label class="section-label" style="color:#64748b">Step 2: Select Brand Tabs</label>
            <div id="brandGrid" class="tab-grid"></div>
        </div>

        <label class="section-label mt-20" style="color:#64748b">Step 3: Market Price Quote (₹)</label>
        <input type="number" id="price" placeholder="Rate per standard unit" oninput="Survey.updateState('price', this.value)">
    </div>

    <div class="card"><span class="section-label">05. Fleet matrix</span><div id="fleetGrid" class="grid grid-cols-2 gap-12"></div></div>
</div>

<div class="action-bar"><button onclick="Draft.save()" class="btn btn-slate">💾 Save Draft</button><button onclick="Survey.sync()" id="sBtn" class="btn btn-green">🚀 Submit Sync</button></div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    /**
     * REGIONAL SMART ID ENGINE
     * Implements Rajasthan-Udaipur Logic based on supplier telemetry
     */
    function generateSmartID(supplierType, activeMaterial, currentCount) {
        const state = "RJ", dist = "UDR";
        const typeCode = (supplierType === "Wholesaler") ? "W" : "R";
        let matCode = "X";
        let matSearch = (activeMaterial || "").toLowerCase();
        if (matSearch.includes("cement")) matCode = "C";
        else if (matSearch.includes("steel")) matCode = "T";
        else if (matSearch.includes("sand")) matCode = "S";
        return `${state}-${dist}-${typeCode}${matCode}-${String(currentCount + 1).padStart(3, '0')}`;
    }

    const firebaseConfig = { apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8", authDomain: "infradepo.firebaseapp.com", projectId: "infradepo", databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database(), auth = firebase.auth();

    window.Survey = {
        state: { location: null, mat: null, brands: [], fleet: {}, photos: [], price: null, trackingId: "" },
        updateState(k, v) { this.state[k] = v; this.refreshID(); },
        async refreshID() {
            const snap = await rtdb.ref('surveys').once('value');
            const smartId = generateSmartID(document.getElementById('supplierType').value, this.state.mat || "Mixed", snap.numChildren());
            document.getElementById('trackId').innerText = smartId;
            this.state.trackingId = smartId;
        },
        async sync() {
            const firm = document.getElementById('firmName').value;
            if(!this.state.location || !firm) return alert("❌ Protocols Incomplete.");
            const btn = document.getElementById('sBtn'); btn.innerText = "TRANSMITTING...";
            await rtdb.ref('surveys').push({ ...this.state, firm, agent: auth.currentUser.email, timestamp: Date.now() });
            alert("✅ Synced."); location.reload();
        }
    };

    window.Validation = {
        phone(i, wa) { let v = i.value.trim().replace(/\D/g, ''); if(v.length === 10) i.value = "+91 " + v; },
        syncWA(p, w, chk) { if(chk) document.getElementById(w).value = document.getElementById(p).value; }
    };

    window.Geo = {
        map: null, marker: null,
        init() { this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([24.58, 73.71], 5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map); },
        capture() { navigator.geolocation.getCurrentPosition(async p => {
            const { latitude, longitude } = p.coords;
            Survey.state.location = { lat: latitude, lng: longitude };
            this.map.setView([latitude, longitude], 16);
            if(this.marker) this.map.removeLayer(this.marker);
            this.marker = L.marker([latitude, longitude]).addTo(this.map);
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
            const data = await res.json();
            document.getElementById('address').value = data.display_name || "GPS Verified";
        }, null, { enableHighAccuracy: true }); }
    };

    window.Evidence = {
        handle(i) {
            const reader = new FileReader();
            reader.onload = e => { Survey.state.photos.push({ src: e.target.result, time: new Date().toLocaleString(), lat: Survey.state.location.lat.toFixed(5) }); this.render(); };
            reader.readAsDataURL(i.files[0]);
        },
        render() {
            const grid = document.getElementById('photoGrid'); const b = grid.firstElementChild;
            grid.innerHTML = ""; grid.appendChild(b);
            Survey.state.photos.forEach(p => { grid.innerHTML += `<div class="photo-slot"><img src="${p.src}" class="w-full h-full object-cover"><div class="stamp-overlay">${p.time}<br>GPS: ${p.lat}</div></div>`; });
        }
    };

    function syncRegistry() {
        rtdb.ref('registry/materials').on('value', snap => {
            const cont = document.getElementById('matSelector'); cont.innerHTML = "";
            window.registryData = snap.val() || {};
            Object.keys(window.registryData).forEach(cat => {
                if (window.registryData[cat].status === 'archived') return;
                cont.innerHTML += `<div class="mat-item" onclick="selectMat('${cat}')"><span>${cat}</span><div class="glow-dot"></div></div>`;
            });
        });
    }

    /**
     * STREAMLINED BRAND ENGINE
     * Bypasses Varieties and aggregates all Brands immediately
     */
    window.selectMat = function(m) {
        document.querySelectorAll('.mat-item').forEach(r => r.classList.remove('active'));
        Survey.state.mat = m; Survey.state.brands = []; Survey.refreshID();
        
        const bg = document.getElementById('brandGrid'); bg.innerHTML = "";
        document.getElementById('brandSection').classList.remove('hidden');

        const uniqueBrands = new Set();
        const catData = window.registryData[m];
        if (catData) {
            Object.keys(catData).forEach(vKey => {
                if (vKey !== 'status' && catData[vKey].brands) {
                    catData[vKey].brands.forEach(b => uniqueBrands.add(b));
                }
            });
        }
        
        uniqueBrands.forEach(b => {
            bg.innerHTML += `<div class="chip" onclick="toggleBrandSelection('${b}', this)">${b}</div>`;
        });
        document.getElementById('brandSection').scrollIntoView({ behavior: 'smooth' });
    };

    window.toggleBrandSelection = function(b, el) {
        el.classList.toggle('active');
        const idx = Survey.state.brands.indexOf(b);
        idx > -1 ? Survey.state.brands.splice(idx, 1) : Survey.state.brands.push(b);
    };

    window.fleetStep = function(t, v) {
        if (!Survey.state.fleet[t]) Survey.state.fleet[t] = 0;
        Survey.state.fleet[t] = Math.max(0, Survey.state.fleet[t] + v);
        document.getElementById(`fval-${t}`).innerText = Survey.state.fleet[t];
    };

    window.Draft = { save() { localStorage.setItem('ns_v34_draft', JSON.stringify(Survey.state)); alert("💾 Draft Secured."); } };

    window.onload = () => {
        Geo.init(); syncRegistry();
        // RESTORED: Full 6-Vehicle Matrix
        const fTypes = ['Tractor', 'Mini Truck', 'Truck', 'Mini Dumper', 'Dumper', 'Trailer'];
        const fGrid = document.getElementById('fleetGrid');
        fGrid.innerHTML = fTypes.map(t => `<div class="fleet-unit"><span class="text-[12px] font-black text-slate-500 uppercase">${t}</span><div class="flex items-center gap-6"><div class="circle-btn" onclick="fleetStep('${t}', -1)">-</div><span id="fval-${t}" class="font-black text-xl">0</span><div class="circle-btn" onclick="fleetStep('${t}', 1)">+</div></div></div>`).join('');
        auth.onAuthStateChanged(u => { if (!u) location.href = "../index.html"; else document.getElementById('staffTag').innerText = "FS-" + u.uid.slice(-8).toUpperCase(); });
    };
</script>

<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

</body>
</html>

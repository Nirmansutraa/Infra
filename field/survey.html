<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Global Field Intel</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f2f4f7; --card: #ffffff; --accent: #ff7a00; --primary: #0f1b2d; --text-dim: #64748b; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 220px; -webkit-font-smoothing: antialiased; }
        
        /* Premium Card Architecture */
        .card { background: var(--card); border-radius: 35px; padding: 30px; margin-bottom: 25px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:focus-within { border-color: var(--accent); box-shadow: 0 20px 40px -15px rgba(255, 122, 0, 0.12); }
        .section-label { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 18px; display: block; }

        /* Digital Identity Box */
        .id-box { background: var(--primary); color: #10b981; text-align: center; padding: 40px; border-radius: 28px; font-size: 32px; font-weight: 900; font-family: monospace; letter-spacing: 4px; border: 2px solid #1e293b; box-shadow: inset 0 4px 15px rgba(0,0,0,0.3); }

        /* Mobile-Friendly Input Controls */
        input, select, textarea { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 18px; font-size: 15px; font-weight: 600; margin-top: 10px; outline: none; transition: 0.25s ease; }
        input:focus { border-color: var(--accent); background: #fff; }
        label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-top: 20px; display: block; padding-left: 8px; }

        /* Selection Interface Items */
        .mat-item { background: var(--primary); color: white; padding: 22px 28px; border-radius: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .mat-item.active { border-color: var(--accent); transform: scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .glow-dot { width: 14px; height: 14px; border-radius: 50%; background: #334155; }
        .mat-item.active .glow-dot { background: var(--accent); box-shadow: 0 0 20px var(--accent); }

        /* MOBILE-FIRST TAB GRID (Fixes Clumping) */
        .tab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
        .chip { background: white; border: 1px solid #e2e8f0; padding: 16px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; color: #475569; cursor: pointer; transition: 0.25s; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 65px; line-height: 1.3; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 15px rgba(255,122,0,0.2); }

        /* Full 6-Vehicle Logistics Dashboard */
        .fleet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .fleet-unit { background: #f8fafc; padding: 20px; border-radius: 24px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .circle-btn { width: 40px; height: 40px; border-radius: 14px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }

        /* Evidence Metadata UI */
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 20px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: white; font-size: 8px; padding: 10px; font-weight: 800; }

        /* Mobile Action Bar */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(40px); padding: 25px; display: flex; gap: 15px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .btn { flex: 1; padding: 22px; border-radius: 22px; font-weight: 900; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        .btn-slate { background: #64748b; color: white; }
        .btn-green { background: #10b981; color: white; box-shadow: 0 15px 30px rgba(16,185,129,0.3); }
    </style>
</head>
<body>

<nav class="bg-white p-8 flex justify-between items-center rounded-b-[45px] border-b mb-12 shadow-sm">
    <h1 class="text-2xl font-black">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
    <button onclick="auth.signOut()" class="text-red-500 text-[11px] font-black uppercase">Logout</button>
</nav>

<div class="max-w-md mx-auto px-8">
    <div class="card"><span class="section-label">01. Session Tracking ID</span><div id="trackId" class="id-box">RJ-UDR-ID---</div></div>

    <div class="card">
        <span class="section-label">02. Contacts Matrix</span>
        <select id="supplierType" onchange="Survey.refreshID()"><option value="Retailer">Retailer (R)</option><option value="Wholesaler">Wholesaler (W)</option></select>
        <input id="firmName" placeholder="Full Registered Firm Name" class="mt-8">
        <div class="mt-12 pt-8 border-t border-slate-100">
            <input id="ownerName" placeholder="Owner Legal Name">
            <div class="grid grid-cols-2 gap-5 mt-2"><input id="ownerPhone" type="tel" placeholder="Phone" oninput="Validation.phone(this, 'ownerWa')"><input id="ownerWa" type="tel" placeholder="WhatsApp"></div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">03. GPS & Spatial Proofs</span>
        <div id="map" class="h-64 rounded-[40px] mb-8 border border-slate-200"></div>
        <button onclick="Geo.capture()" class="bg-primary text-white w-full py-7 rounded-2xl font-black uppercase tracking-[2px] active:scale-95 transition-transform shadow-lg">📍 Capture Verified Location</button>
        <textarea id="address" class="h-32 text-[12px] text-slate-500 bg-transparent p-0 border-none mt-4" placeholder="Geotag address..." readonly></textarea>
        <div class="grid grid-cols-4 gap-4 mt-8" id="photoGrid"><button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-6xl">+</button></div>
        <input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="Evidence.handle(this)">
    </div>

    <div class="card">
        <span class="section-label">04. Material Intelligence Hub</span>
        <div id="matSelector" class="space-y-4"></div>
        <div id="varietyPanel" class="mt-12 hidden bg-slate-50 p-10 rounded-[40px] border shadow-inner">
            <label class="section-label" style="color:#64748b">Step 2: Select Variety Tabs</label>
            <div id="varietyGrid" class="tab-grid">
                </div>
            <div id="brandSection" class="hidden mt-12">
                <label class="section-label" style="color:#64748b">Step 3: Select Brand Tabs</label>
                <div id="brandGrid" class="tab-grid"></div>
            </div>
        </div>
        <input type="number" id="price" placeholder="Rate per unit" class="mt-12" oninput="Survey.updateState('price', this.value)">
    </div>

    <div class="card">
        <span class="section-label">05. Fleet Logistics Capacity</span>
        <div id="fleetGrid" class="grid grid-cols-2 gap-8"></div>
    </div>
</div>

<div class="action-bar"><button onclick="Draft.save()" class="btn btn-slate">💾 Save Local</button><button onclick="Survey.sync()" id="sBtn" class="btn btn-green">🚀 Submit Sync</button></div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    function generateSmartID(sType, mat, count) {
        const matCode = mat.toLowerCase().includes("cement") ? "C" : mat.toLowerCase().includes("steel") ? "T" : "X";
        return `RJ-UDR-${sType === "Wholesaler" ? "W" : "R"}${matCode}-${String(count + 1).padStart(3, '0')}`;
    }

    const firebaseConfig = { apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8", authDomain: "infradepo.firebaseapp.com", projectId: "infradepo", databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database(), auth = firebase.auth();

    window.Survey = {
        state: { location: null, mat: null, varieties: [], brands: [], fleet: {}, photos: [], price: null },
        updateState(k, v) { this.state[k] = v; this.refreshID(); },
        async refreshID() {
            const snap = await rtdb.ref('surveys').once('value');
            document.getElementById('trackId').innerText = generateSmartID(document.getElementById('supplierType').value, this.state.mat || "Mixed", snap.numChildren());
        },
        async sync() {
            const firm = document.getElementById('firmName').value;
            if(!this.state.location || !firm) return alert("❌ Firm & GPS Geotag Required.");
            await rtdb.ref('surveys').push({ ...this.state, firm, agent: auth.currentUser.email, timestamp: Date.now() });
            alert("✅ Synced Successfully."); location.reload();
        }
    };

    window.Validation = {
        phone(i, wa) { let v = i.value.trim().replace(/\D/g, ''); if(v.length === 10) i.value = "+91 " + v; },
        syncWA(p, w, chk) { if(chk) document.getElementById(w).value = document.getElementById(p).value; }
    };

    window.Geo = {
        map: null, marker: null,
        init() { this.map = L.map('map', { zoomControl: false }).setView([24.58, 73.71], 5); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map); },
        capture() { navigator.geolocation.getCurrentPosition(async p => {
            const { latitude, longitude } = p.coords;
            Survey.state.location = { lat: latitude, lng: longitude };
            this.map.setView([latitude, longitude], 16);
            if(this.marker) this.map.removeLayer(this.marker);
            this.marker = L.marker([latitude, longitude]).addTo(this.map);
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
            const data = await res.json();
            document.getElementById('address').value = data.display_name || "Spatial Lock Verified";
        }, null, { enableHighAccuracy: true }); }
    };

    window.Evidence = {
        handle(i) {
            const reader = new FileReader();
            reader.onload = e => { Survey.state.photos.push({ src: e.target.result, time: new Date().toLocaleString(), lat: Survey.state.location.lat.toFixed(5) }); this.render(); };
            reader.readAsDataURL(i.files[0]);
        },
        render() {
            const grid = document.getElementById('photoGrid'); const b = grid.firstElementChild;
            grid.innerHTML = ""; grid.appendChild(b);
            Survey.state.photos.forEach(p => { grid.innerHTML += `<div class="photo-slot"><img src="${p.src}" class="w-full h-full object-cover"><div class="stamp-overlay">${p.time}<br>GPS: ${p.lat}</div></div>`; });
        }
    };

    function syncRegistry() {
        rtdb.ref('registry/materials').on('value', snap => {
            const cont = document.getElementById('matSelector'); cont.innerHTML = "";
            window.registryData = snap.val() || {};
            Object.keys(window.registryData).forEach(cat => {
                cont.innerHTML += `<div class="mat-item" id="mat-${cat}" onclick="selectMat('${cat}')"><span>${cat}</span><div class="glow-dot"></div></div>`;
            });
        });
    }

    window.selectMat = function(m) {
        document.querySelectorAll('.mat-item').forEach(r => r.classList.remove('active'));
        document.getElementById('mat-'+m).classList.add('active');
        Survey.state.mat = m; Survey.state.varieties = []; Survey.state.brands = [];
        const vg = document.getElementById('varietyGrid'); vg.innerHTML = "";
        document.getElementById('varietyPanel').classList.remove('hidden');
        document.getElementById('brandSection').classList.add('hidden');
        Object.keys(window.registryData[m]).forEach(v => {
            if(v !== 'status' && typeof window.registryData[m][v] === 'object') {
                vg.innerHTML += `<div class="chip" onclick="toggleVariety('${v}', this)">${v}</div>`;
            }
        });
    };

    window.toggleVariety = function(v, el) {
        el.classList.toggle('active');
        const idx = Survey.state.varieties.indexOf(v);
        idx > -1 ? Survey.state.varieties.splice(idx, 1) : Survey.state.varieties.push(v);
        const bg = document.getElementById('brandGrid'); bg.innerHTML = "";
        if(Survey.state.varieties.length > 0) {
            document.getElementById('brandSection').classList.remove('hidden');
            const uniqueBrands = new Set();
            Survey.state.varieties.forEach(vKey => { (window.registryData[Survey.state.mat][vKey].brands || []).forEach(b => uniqueBrands.add(b)); });
            uniqueBrands.forEach(b => { bg.innerHTML += `<div class="chip" onclick="toggleBrand('${b}', this)">${b}</div>`; });
        } else { document.getElementById('brandSection').classList.add('hidden'); }
    };

    window.toggleBrand = function(b, el) {
        el.classList.toggle('active');
        const idx = Survey.state.brands.indexOf(b);
        idx > -1 ? Survey.state.brands.splice(idx, 1) : Survey.state.brands.push(b);
    };

    window.fleetStep = function(t, v) {
        if (!Survey.state.fleet[t]) Survey.state.fleet[t] = 0;
        Survey.state.fleet[t] = Math.max(0, Survey.state.fleet[t] + v);
        document.getElementById(`fval-${t}`).innerText = Survey.state.fleet[t];
    };

    window.Draft = { save() { localStorage.setItem('ns_v30_draft', JSON.stringify(Survey.state)); alert("💾 Draft Secured Locally."); } };

    window.onload = () => {
        Geo.init(); syncRegistry();
        const fTypes = ['Tractor', 'Mini Truck', 'Truck', 'Mini Dumper', 'Dumper', 'Trailer'];
        const fGrid = document.getElementById('fleetGrid');
        fGrid.innerHTML = fTypes.map(t => `<div class="fleet-unit"><span>${t}</span><div class="flex items-center gap-6"><div class="circle-btn" onclick="fleetStep('${t}', -1)">-</div><span id="fval-${t}" class="font-black text-xl min-w-[30px] text-center">0</span><div class="circle-btn" onclick="fleetStep('${t}', 1)">+</div></div></div>`).join('');
        auth.onAuthStateChanged(u => { if (!u) location.href = "../index.html"; else document.getElementById('staffTag').innerText = "FS-" + u.uid.slice(-8).toUpperCase(); });
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Field Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; color: #f8fafc; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 15px; }
        select, input { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 14px; border-radius: 12px; color: white; margin-top: 8px; outline: none; }
        .btn-sync { background: #10b981; width: 100%; padding: 18px; border-radius: 14px; font-weight: 800; text-transform: uppercase; margin-top: 10px; box-shadow: 0 10px 20px -10px #10b981; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="mb-8">
        <h1 class="text-xl font-black uppercase tracking-tighter text-white text-center">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest text-center">Field Data Terminal</p>
    </div>

    <div class="card"><p class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Site Verification</p><input id="firm" placeholder="Firm/Site Name"></div>
    <div class="card">
        <p class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Material Intel</p>
        <select id="cat" onchange="loadVar()"><option>Loading Materials...</option></select>
        <select id="var" class="mt-4"><option>Select Category First</option></select>
    </div>
    <div class="text-[9px] text-center text-slate-500 uppercase font-bold mb-4">Auto-Geotagging Active</div>
    <button onclick="sync()" id="sBtn" class="btn-sync text-white">🚀 Push to Cloud</button>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        storageBucket: "infradepo.firebasestorage.app",
        messagingSenderId: "733942710671",
        appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    let registry = {}, coords = null;

    navigator.geolocation.getCurrentPosition(p => coords = { lat: p.coords.latitude, lng: p.coords.longitude });

    rtdb.ref('registry/materials').on('value', snap => {
        registry = snap.val() || {};
        const sel = document.getElementById('cat'); sel.innerHTML = "<option>Select Material</option>";
        Object.keys(registry).forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    });

    function loadVar() {
        const c = document.getElementById('cat').value;
        const sel = document.getElementById('var'); sel.innerHTML = "";
        if(registry[c]) Object.keys(registry[c]).forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
    }

    async function sync() {
        const btn = document.getElementById('sBtn');
        const data = { 
            firm: document.getElementById('firm').value, 
            cat: document.getElementById('cat').value, 
            var: document.getElementById('var').value, 
            location: coords, 
            timestamp: Date.now() 
        };
        if(!data.firm || !data.cat || !coords) return alert("Missing Site Name or GPS Signal");
        btn.innerText = "Transmitting...";
        await rtdb.ref('surveys').push(data);
        alert("Transmission Complete!"); location.reload();
    }
</script>
</body>
</html>

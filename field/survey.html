<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Global Field Intel</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f2f4f7; --card: #ffffff; --accent: #ff7a00; --primary: #0f1b2d; --text-dim: #64748b; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 140px; -webkit-font-smoothing: antialiased; }
        
        .card { background: var(--card); border-radius: 20px; padding: 22px; margin-bottom: 16px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); transition: 0.3s ease; }
        .section-label { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; display: block; }
        
        /* Digital Tracking Box */
        .id-box { background: var(--primary); color: #10b981; text-align: center; padding: 26px; border-radius: 16px; font-size: 26px; font-weight: 900; font-family: monospace; letter-spacing: 2px; border: 2px solid #1e293b; }

        input, select, textarea { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 14px; font-size: 14px; margin-top: 8px; outline: none; transition: 0.2s; -webkit-appearance: none; }
        input:focus, select:focus { border-color: var(--accent); background: #fff; }
        label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-top: 12px; display: block; padding-left: 4px; }

        /* Material UI */
        .mat-item { background: var(--primary); color: white; padding: 18px 22px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s ease; }
        .mat-item.active { border-color: var(--accent); transform: scale(1.02); }
        .glow-dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; transition: 0.3s; }
        .mat-item.active .glow-dot { background: var(--accent); box-shadow: 0 0 12px var(--accent); }

        .brand-chip { background: white; border: 1px solid #e2e8f0; padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; color: #475569; cursor: pointer; transition: 0.2s; }
        .brand-chip.active { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px); }

        .fleet-unit { background: #f8fafc; padding: 14px; border-radius: 14px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .circle-btn { width: 30px; height: 30px; border-radius: 10px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 14px; border: 1px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); color: white; font-size: 6px; padding: 5px; font-weight: bold; line-height: 1.3; }

        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); padding: 24px; display: flex; gap: 14px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .btn { flex: 1; padding: 18px; border-radius: 16px; font-weight: 800; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .btn-slate { background: #64748b; color: white; }
        .btn-green { background: #10b981; color: white; }
    </style>
</head>
<body>

<nav class="bg-white p-5 flex justify-between items-center rounded-b-[32px] border-b mb-8 shadow-sm">
    <div class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">Field Intelligence: <span class="text-orange-500" id="staffTag">FS-XXXX</span></div>
    <button onclick="auth.signOut()" class="text-red-500 text-[10px] font-black uppercase tracking-widest">Logout</button>
</nav>

<div class="max-w-md mx-auto px-5">
    <div class="card">
        <span class="section-label">1. Smart Tracking ID</span>
        <div id="trackId" class="id-box">ID---</div>
    </div>

    <div class="card">
        <span class="section-label">2. Entity & Contacts intelligence</span>
        
        <label>Supplier Classification</label>
        <select id="supplierType" onchange="Survey.refreshID()">
            <option value="Retailer">Retailer (R)</option>
            <option value="Wholesaler">Wholesaler (W)</option>
        </select>

        <input id="firmName" placeholder="Enter Registered Firm Name" class="mt-4">
        
        <div class="mt-8 pt-5 border-t border-slate-100">
            <p class="text-[11px] font-black text-orange-500 uppercase mb-3">Owner Details</p>
            <input id="ownerName" placeholder="Owner Full Name">
            <div class="grid grid-cols-2 gap-3 mt-1">
                <div><label>Phone (+91)</label><input id="ownerPhone" type="tel" placeholder="Mobile" oninput="Validation.phone(this, 'ownerWa')"></div>
                <div><div class="flex items-center gap-1"><label>WhatsApp</label><input type="checkbox" id="syncOwner" class="accent-orange-500" onchange="Validation.syncWA('ownerPhone', 'ownerWa', this.checked)"></div><input id="ownerWa" type="tel" placeholder="WA Number"></div>
            </div>
        </div>

        <div class="mt-8 pt-5 border-t border-slate-100">
            <p class="text-[11px] font-black text-blue-500 uppercase mb-3">Manager Details</p>
            <input id="mgrName" placeholder="Manager Name">
            <div class="grid grid-cols-2 gap-3 mt-1">
                <div><label>Phone (+91)</label><input id="mgrPhone" type="tel" placeholder="Mobile" oninput="Validation.phone(this, 'mgrWa')"></div>
                <div><div class="flex items-center gap-1"><label>WhatsApp</label><input type="checkbox" id="syncMgr" class="accent-orange-500" onchange="Validation.syncWA('mgrPhone', 'mgrWa', this.checked)"></div><input id="mgrWa" type="tel" placeholder="WA Number"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">3. GPS & Spatial Evidence</span>
        <div id="map" class="h-48 rounded-3xl mb-5 border border-slate-200"></div>
        <button onclick="Geo.capture()" class="bg-primary text-white w-full py-5 rounded-2xl font-black text-[12px] uppercase tracking-widest mb-4">📍 Capture GPS & Address</button>
        <textarea id="address" class="h-20 text-[11px] text-slate-500 bg-transparent p-0 border-none" placeholder="Address will populate here..." readonly></textarea>
        
        <div class="mt-6">
            <label>Evidence Photos (Max 10)</label>
            <div class="grid grid-cols-4 gap-3 mt-3" id="photoGrid">
                <button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-3xl">+</button>
            </div>
            <input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="Evidence.handle(this)">
        </div>
    </div>

    <div class="card">
        <span class="section-label">4. Material Intelligence (Dynamic Registry)</span>
        <div id="matSelector" class="space-y-2"></div>
        
        <div id="varietyPanel" class="mt-8 hidden bg-slate-50 p-6 rounded-[24px] border border-slate-200">
            <label class="section-label" style="color:#64748b">Step 2: Select Variety</label>
            <select id="varSelect" onchange="Survey.updateState('variety', this.value)"></select>
            
            <label class="section-label mt-8" style="color:#64748b">Step 3: Brands Available</label>
            <div id="brandGrid" class="flex flex-wrap gap-2.5 mt-2.5"></div>
        </div>

        <label class="section-label mt-8" style="color:#64748b">Step 4: Market Price (₹)</label>
        <input type="number" id="price" placeholder="Rate per unit" oninput="Survey.updateState('price', this.value)">
    </div>

    <div class="card">
        <span class="section-label">5. Transportation Fleet Capacity</span>
        <div id="fleetGrid" class="grid grid-cols-2 gap-4"></div>
    </div>
</div>

<div class="action-bar">
    <button onclick="Draft.save()" class="btn btn-slate">💾 Save Local</button>
    <button onclick="Survey.sync()" id="sBtn" class="btn btn-green">🚀 Submit Sync</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    // IMPORT SMART ID LOGIC
    import { generateSmartID } from "./js/id-generator.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        storageBucket: "infradepo.firebasestorage.app",
        messagingSenderId: "733942710671",
        appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();
    const auth = firebase.auth();

    window.Survey = {
        state: { location: null, mat: null, variety: null, brands: [], fleet: {}, photos: [], price: null, count: 0 },
        updateState(key, val) { this.state[key] = val; this.refreshID(); },
        
        // INTEGRATED SMART ID GENERATOR
        async refreshID() {
            const supplierType = document.getElementById('supplierType').value;
            const activeMat = this.state.mat || "Mixed";
            
            // Fetch current total count from database for correct serial
            const snap = await rtdb.ref('surveys').once('value');
            const currentCount = snap.numChildren();
            
            const smartId = generateSmartID(supplierType, activeMat, currentCount);
            document.getElementById('trackId').innerText = smartId;
            this.state.trackingId = smartId;
        },

        async sync() {
            if(!this.state.location || !document.getElementById('firmName').value) return alert("📍 Capture GPS and Firm Name First!");
            const btn = document.getElementById('sBtn'); btn.innerText = "TRANSMITTING...";
            const payload = { ...this.state, firm: document.getElementById('firmName').value, agent: auth.currentUser.email, timestamp: Date.now() };
            await rtdb.ref('surveys').push(payload);
            alert("✅ INTEL SYNCED");
            location.reload();
        }
    };

    window.Validation = {
        phone(input, waId) {
            let val = input.value.trim().replace(/\D/g, '');
            if (val.length > 10) val = val.slice(-10);
            if (val.length === 10) { input.value = "+91 " + val; }
        },
        syncWA(phoneId, waId, isChecked) {
            const phone = document.getElementById(phoneId);
            const wa = document.getElementById(waId);
            if(isChecked) { wa.value = phone.value; wa.readOnly = true; } 
            else { wa.readOnly = false; }
        }
    };

    window.Geo = {
        map: null,
        init() {
            this.map = L.map('map', { zoomControl: false }).setView([20.59, 78.96], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
        },
        capture() {
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude, longitude } = p.coords;
                Survey.state.location = { lat: latitude, lng: longitude };
                this.map.setView([latitude, longitude], 16);
                L.marker([latitude, longitude]).addTo(this.map);
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                const data = await res.json();
                document.getElementById('address').value = data.display_name;
            });
        }
    };

    window.Evidence = {
        handle(input) {
            if(!Survey.state.location) return alert("📍 Capture GPS first for photo timestamping");
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                Survey.state.photos.push({ src: e.target.result, time: new Date().toLocaleString(), lat: Survey.state.location.lat.toFixed(4) });
                this.render();
            };
            reader.readAsDataURL(file);
        },
        render() {
            const grid = document.getElementById('photoGrid');
            const addBtn = grid.firstElementChild;
            grid.innerHTML = ""; grid.appendChild(addBtn);
            Survey.state.photos.forEach(p => {
                grid.innerHTML += `<div class="photo-slot"><img src="${p.src}" class="photo-img"><div class="stamp-overlay">${p.time}<br>LAT: ${p.lat}</div></div>`;
            });
        }
    };

    function syncRegistry() {
        rtdb.ref('registry/materials').on('value', snap => {
            const cont = document.getElementById('matSelector');
            cont.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            Object.keys(data).forEach(cat => {
                if(data[cat].status === 'archived') return;
                cont.innerHTML += `
                    <div class="mat-item" id="mat-${cat}" onclick="selectMat('${cat}')">
                        <span class="text-xs font-black uppercase tracking-widest">${cat}</span>
                        <div class="glow-dot"></div>
                    </div>`;
            });
            window.registryData = data;
        });
    }

    window.selectMat = function(m) {
        document.querySelectorAll('.mat-item').forEach(r => r.classList.remove('active'));
        document.getElementById('mat-'+m).classList.add('active');
        Survey.updateState('mat', m);

        const panel = document.getElementById('varietyPanel');
        panel.classList.remove('hidden');
        
        const vSelect = document.getElementById('varSelect');
        vSelect.innerHTML = "<option value=''>Choose Variety...</option>";
        const catData = window.registryData[m];
        
        if(catData.varieties) {
            catData.varieties.forEach(v => vSelect.innerHTML += `<option value="${v}">${v}</option>`);
        }

        const bGrid = document.getElementById('brandGrid');
        bGrid.innerHTML = "";
        if(catData.brands) {
            catData.brands.forEach(b => {
                bGrid.innerHTML += `<div class="brand-chip" onclick="toggleBrand('${b}', this)">${b}</div>`;
            });
        }
    };

    window.toggleBrand = function(b, el) {
        el.classList.toggle('active');
        const idx = Survey.state.brands.indexOf(b);
        idx > -1 ? Survey.state.brands.splice(idx, 1) : Survey.state.brands.push(b);
    };

    window.fleetStep = function(t, v) {
        Survey.state.fleet[t] = Math.max(0, (Survey.state.fleet[t] || 0) + v);
        document.getElementById(`fval-${t}`).innerText = Survey.state.fleet[t];
    };

    window.onload = () => {
        Geo.init(); syncRegistry(); Survey.refreshID();
        const fTypes = ['Tractor', 'Mini Truck', 'Truck', 'Mini Dumper', 'Dumper', 'Trailer'];
        document.getElementById('fleetGrid').innerHTML = fTypes.map(t => `
            <div class="fleet-unit">
                <span class="text-[9px] font-bold text-slate-500 uppercase">${t}</span>
                <div class="flex items-center gap-4">
                    <div class="circle-btn" onclick="fleetStep('${t}', -1)">-</div>
                    <span id="fval-${t}" class="font-black text-sm">0</span>
                    <div class="circle-btn" onclick="fleetStep('${t}', 1)">+</div>
                </div>
            </div>`).join('');
            
        auth.onAuthStateChanged(u => {
            if(!u) location.href = "../index.html";
            document.getElementById('staffTag').innerText = "FS-" + u.uid.slice(-6).toUpperCase();
        });
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supplier Matrix | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/config.js"></script>
    <script src="js/ui-utils.js"></script>
    <script src="js/geo-engine.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #0f172a; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 120px; }
        .card { background: white; border-radius: 35px; padding: 30px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .section-label { font-size: 11px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; display: block; }
        
        input, select, textarea { width: 100%; background: #f1f5f9; padding: 18px; border-radius: 18px; font-weight: 600; outline: none; margin-top: 8px; }
        input:focus { border-color: var(--accent); background: white; }
        
        /* Material Chip Styling */
        .chip { background: #f1f5f9; padding: 15px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; text-align: center; transition: 0.3s; border: 2px solid transparent; }
        .chip.active { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-3px); }
        
        .fleet-unit { background: #f8fafc; padding: 15px; border-radius: 18px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .circle-btn { width: 35px; height: 35px; border-radius: 10px; background: var(--navy); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 20px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .stamp { position: absolute; bottom: 0; background: rgba(0,0,0,0.8); color: white; font-size: 8px; width: 100%; padding: 6px; font-weight: 800; }
        
        .btn-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 25px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        #map { height: 250px; border-radius: 25px; margin-bottom: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="max-w-2xl mx-auto px-6 py-8">
    <header class="mb-8">
        <h1 class="text-3xl font-black italic">SUPPLIER <span class="text-orange-500">MATRIX</span></h1>
        <p id="agentID" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Nirmansutra LLP • Field Node</p>
    </header>

    <div class="card">
        <span class="section-label">01. Entity Hub</span>
        <input id="firmName" placeholder="Full Firm Name">
        <div class="grid grid-cols-2 gap-4">
            <input id="owner" placeholder="Owner Name">
            <input id="phone" type="tel" placeholder="Mobile">
        </div>
    </div>

    <div class="card">
        <span class="section-label">02. Spatial Lock</span>
        <div id="map"></div>
        <button onclick="capturePos()" class="w-full py-4 bg-navy text-white rounded-xl font-bold text-xs mb-3">📍 Lock Shop GPS</button>
        <textarea id="address" class="text-[11px] text-slate-500 bg-transparent border-none" readonly placeholder="Waiting for GPS..."></textarea>
    </div>

    <div class="card">
        <span class="section-label">03. Material Intelligence</span>
        <div id="matSelector" class="grid grid-cols-2 gap-3 mb-6">
            </div>
        
        <div id="varietySection" class="hidden">
            <label class="text-[10px] font-black text-slate-400 uppercase mb-3 block">Select Varieties</label>
            <div id="varietyGrid" class="grid grid-cols-2 gap-3"></div>
        </div>
    </div>

    <div class="card">
        <span class="section-label">04. Dispatch Capacity</span>
        <div id="fleetGrid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </div>

    <div class="card">
        <span class="section-label">05. Audit Photos</span>
        <div id="photoGrid" class="grid grid-cols-2 md:grid-cols-5 gap-3">
            <button onclick="document.getElementById('cam').click()" class="photo-slot text-slate-300 text-5xl">+</button>
        </div>
        <input type="file" id="cam" accept="image/*" capture="environment" hidden onchange="handlePhoto(this)">
    </div>
</div>

<div class="btn-bottom">
    <button onclick="syncSurvey()" id="sBtn" class="w-full py-5 bg-orange-500 text-white rounded-2xl font-black uppercase shadow-lg">🚀 Finalize Node Sync</button>
</div>

<script>
    let state = { location: null, photos: [], mat: null, varieties: [], fleet: {} };
    let registryData = {};

    window.onload = () => {
        NS_Geo.init('map');
        loadFleet();
        loadRegistry();
        auth.onAuthStateChanged(u => {
            if(!u) window.location.href = "../index.html";
            document.getElementById('agentID').innerText = "AGENT: " + u.email.toUpperCase();
        });
    };

    function loadRegistry() {
        rtdb.ref('registry/materials').on('value', snap => {
            const cont = document.getElementById('matSelector');
            registryData = snap.val() || {};
            cont.innerHTML = Object.keys(registryData).map(cat => `
                <div class="chip" id="cat-${cat}" onclick="selectCat('${cat}')">${cat}</div>
            `).join('');
        });
    }

    function selectCat(cat) {
        state.mat = cat; state.varieties = [];
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        document.getElementById(`cat-${cat}`).classList.add('active');
        
        const vSec = document.getElementById('varietySection');
        const vGrid = document.getElementById('varietyGrid');
        vSec.classList.remove('hidden');
        
        const vars = registryData[cat];
        vGrid.innerHTML = Object.keys(vars).map(v => `
            <div class="chip" id="var-${v}" onclick="toggleVar('${v}')">${v}</div>
        `).join('');
    }

    function toggleVar(v) {
        const el = document.getElementById(`var-${v}`);
        el.classList.toggle('active');
        const i = state.varieties.indexOf(v);
        i > -1 ? state.varieties.splice(i, 1) : state.varieties.push(v);
    }

    function loadFleet() {
        const types = ['Tractor', 'Truck', 'Dumper', 'Trailer'];
        document.getElementById('fleetGrid').innerHTML = types.map(t => `
            <div class="fleet-unit">
                <span class="font-black text-[10px] uppercase">${t}</span>
                <div class="flex items-center gap-4">
                    <div class="circle-btn" onclick="updateFleet('${t}', -1)">-</div>
                    <span id="f-${t}" class="font-black text-sm w-4 text-center">0</span>
                    <div class="circle-btn" onclick="updateFleet('${t}', 1)">+</div>
                </div>
            </div>`).join('');
    }

    function updateFleet(t, v) {
        state.fleet[t] = Math.max(0, (state.fleet[t] || 0) + v);
        document.getElementById(`f-${t}`).innerText = state.fleet[t];
    }

    async function capturePos() {
        const res = await NS_Geo.captureLocation('address');
        state.location = { lat: res.lat, lng: res.lng };
    }

    function handlePhoto(input) {
        if(state.photos.length >= 10) return NS_UI.notify("Max 10 photos");
        const reader = new FileReader();
        reader.onload = (e) => {
            state.photos.push({ src: e.target.result, time: new Date().toLocaleString() });
            renderPhotos();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function renderPhotos() {
        const grid = document.getElementById('photoGrid');
        const btn = grid.firstElementChild;
        grid.innerHTML = ""; grid.appendChild(btn);
        state.photos.forEach(p => {
            grid.innerHTML += `<div class="photo-slot"><img src="${p.src}" class="w-full h-full object-cover"><div class="stamp">${p.time}</div></div>`;
        });
    }

    async function syncSurvey() {
        const firm = document.getElementById('firmName').value;
        if(!firm || !state.location || !state.mat) return NS_UI.notify("Firm, GPS, and Materials are mandatory.");
        
        const btn = document.getElementById('sBtn');
        btn.innerText = "TRANSMITTING..."; btn.disabled = true;

        const payload = {
            ...state,
            firm: firm,
            owner: document.getElementById('owner').value,
            phone: document.getElementById('phone').value,
            agent: auth.currentUser.email,
            timestamp: Date.now(),
            status: 'live'
        };

        try {
            await rtdb.ref('surveys').push(payload);
            NS_UI.notify("Supplier Node Online!");
            window.location.reload();
        } catch(e) { NS_UI.notify("Error: " + e.message); btn.innerText = "Finalize Node Sync"; btn.disabled = false; }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra V2 | Field Terminal</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; color: #f8fafc; padding-bottom: 40px; }
        .card { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #334155; }
        .title { font-size: 10px; color: #ff7a00; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Map UI */
        #map { height: 200px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 10px; }

        /* Dynamic Material Buttons */
        .material-btn { 
            background: #334155; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            font-weight: 700;
            transition: all 0.2s;
        }
        .material-btn.active { background: #ff7a00; color: white; }
        
        .variety-box { display: none; padding: 10px; background: #0f172a; border-radius: 12px; margin-bottom: 10px; }
        .brand-box { display: none; padding: 10px; margin-left: 15px; border-left: 2px solid #334155; }

        input, select, textarea { 
            width: 100%; background: #0f172a; border: 1px solid #334155; 
            padding: 12px; border-radius: 10px; color: white; outline: none; margin-top: 8px;
        }
        input:focus { border-color: #ff7a00; }

        .btn-sync { 
            background: #10b981; color: white; width: 100%; padding: 16px; 
            border-radius: 12px; font-weight: 800; text-transform: uppercase;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

<div class="p-4 max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black tracking-tighter">INFRA<span class="text-orange-500">V2</span></h1>
        <div id="userBadge" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full border border-slate-700 font-bold">Connecting...</div>
    </div>

    <div class="card">
        <div class="title">Project Entity</div>
        <input id="firmName" placeholder="Firm Name">
        <select id="supplierType">
            <option value="Retailer">Retailer</option>
            <option value="Wholesaler">Wholesaler</option>
        </select>
    </div>

    <div class="card">
        <div class="title">Material Intelligence Board</div>
        <div id="materialsContainer">
            <p class="text-center text-slate-500 text-xs py-4 animate-pulse">Syncing Registry...</p>
        </div>
    </div>

    <div class="card">
        <div class="title">Geospatial Verification</div>
        <div id="map"></div>
        <button onclick="getLocation()" class="text-xs font-bold text-orange-500 bg-orange-500/10 w-full py-2 rounded-lg">Update GPS Coordinates</button>
    </div>

    <button class="btn-sync" onclick="syncToCloud()">🚀 Push to Enterprise Cloud</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    // 1. Firebase Configuration (Reuse your V1 keys)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    // 2. Load Materials from Admin Registry
    function loadMaterialBoard() {
        rtdb.ref('registry/materials').on('value', (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('materialsContainer');
            container.innerHTML = ""; 

            if (!data) {
                container.innerHTML = "<p class='text-slate-500 text-center text-xs'>Registry Empty. Update via Admin Panel.</p>";
                return;
            }

            for (let cat in data) {
                const safeCat = cat.replace(/\s/g, '');
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="material-btn" onclick="toggleBox('var_${safeCat}')">
                        <span>${cat}</span><span>▼</span>
                    </div>
                    <div id="var_${safeCat}" class="variety-box"></div>
                `;
                container.appendChild(div);

                const vBox = document.getElementById(`var_${safeCat}`);
                for (let variety in data[cat]) {
                    const safeVar = (safeCat + variety).replace(/\s/g, '');
                    vBox.innerHTML += `
                        <div class="py-2 border-b border-slate-800 last:border-0">
                            <label class="flex items-center gap-3 text-sm font-bold" onclick="toggleBox('brand_${safeVar}')">
                                <input type="checkbox" class="w-4 h-4 accent-orange-500" value="${variety}">
                                ${variety.replace(/_/g, ' ')}
                            </label>
                            <div id="brand_${safeVar}" class="brand-box text-xs text-slate-400 mt-2 space-y-2">
                                ${data[cat][variety].brands.map(b => `
                                    <label class="flex items-center gap-2">
                                        <input type="checkbox" class="w-3 h-3 accent-emerald-500" value="${b}"> ${b}
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            }
        });
    }

    function toggleBox(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    window.onload = loadMaterialBoard;
</script>

</body>
</html>

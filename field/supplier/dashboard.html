<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supplier Dashboard | NirmanSutra</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="../../js/config.js"></script>
    <script src="../../js/ui-utils.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; margin: 0; }
        
        .top-bar { 
            background: var(--navy); color: white; padding: 40px 20px 70px; 
            border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .biz-card { 
            background: white; padding: 25px; border-radius: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); 
            margin: -45px 20px 20px; position: relative; z-index: 10;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .badge { 
            background: #fff7ed; color: #ea580c; padding: 6px 12px; 
            border-radius: 12px; font-size: 10px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        .tag { 
            background: #f1f5f9; color: #475569; padding: 7px 14px; 
            border-radius: 12px; font-size: 10px; font-weight: 800; 
            margin: 4px; display: inline-block; text-transform: uppercase;
        }

        .action-card {
            background: white; padding: 20px; border-radius: 25px;
            text-align: center; border: 1px solid #f1f5f9;
            transition: transform 0.2s;
        }
        .action-card:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="flex justify-between items-center px-2">
            <div>
                <p class="text-orange-500 font-black text-[10px] uppercase tracking-[5px] mb-1">Building Bharat</p>
                <h1 id="userName" class="text-2xl font-black">Syncing...</h1>
            </div>
            <button onclick="auth.signOut().then(()=>window.location.href='../../index.html')" class="bg-white/10 p-4 rounded-2xl">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            </button>
        </div>
    </header>

    <main>
        <section class="biz-card">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400">Material Intelligence</h3>
                <span class="badge">Live Registry</span>
            </div>

            <div class="space-y-6">
                <div>
                    <p id="shopTitle" class="text-xl font-black text-slate-900 leading-tight">Mapping Business...</p>
                    <p id="shopAddress" class="text-xs text-slate-400 font-medium mt-1 leading-relaxed">Locating Node...</p>
                </div>

                <div>
                    <p class="text-[9px] font-black uppercase text-slate-400 mb-3 tracking-widest">Inventory Categories</p>
                    <div id="catList" class="flex flex-wrap min-h-[40px]">
                        <span class="text-slate-200 text-[10px] font-bold">Waiting for sync...</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-6 border-t border-slate-50">
                    <div>
                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1">Primary Brands</p>
                        <p id="brandText" class="font-black text-sm text-slate-800">---</p>
                    </div>
                    <div>
                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1">Coverage</p>
                        <p id="radiusText" class="font-black text-sm text-slate-800">---</p>
                    </div>
                </div>
            </div>
        </section>

        <div class="px-6 grid grid-cols-2 gap-4 mt-4 pb-10">
            <div class="action-card shadow-sm">
                <div class="text-3xl mb-2">📦</div>
                <p class="text-[10px] font-black uppercase tracking-widest">Inventory</p>
            </div>
            <div class="action-card shadow-sm">
                <div class="text-3xl mb-2">📈</div>
                <p class="text-[10px] font-black uppercase tracking-widest">Demand</p>
            </div>
        </div>
    </main>

    <script>
        // AUTH WATCHER
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("Supplier Identity Verified:", user.uid);
                startLiveSync(user.uid);
            } else {
                // If not logged in, boot back to root index
                window.location.href = "../../index.html";
            }
        });

        function startLiveSync(uid) {
            // .on() keeps the dashboard updated if you edit the DB manually
            rtdb.ref(`users/${uid}`).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // 1. Basic Profile
                document.getElementById('userName').innerText = data.name || "Partner";

                // 2. Business Intelligence
                document.getElementById('shopTitle').innerText = data.shopName || "Register Shop Name";
                document.getElementById('shopAddress').innerText = data.address || "Address Registry Pending";
                document.getElementById('brandText').innerText = data.brands || "All Brands";
                document.getElementById('radiusText').innerText = data.deliveryRadius ? data.deliveryRadius + " KM" : "Local Only";

                // 3. Categories
                const list = document.getElementById('catList');
                list.innerHTML = "";
                if (data.categories && Array.isArray(data.categories)) {
                    data.categories.forEach(cat => {
                        const span = document.createElement('span');
                        span.className = "tag";
                        span.innerText = cat;
                        list.appendChild(span);
                    });
                } else {
                    list.innerHTML = "<span class='text-slate-300 text-[10px] font-bold'>NO CATEGORIES MAPPED</span>";
                }
            });
        }
    </script>
</body>
</html>

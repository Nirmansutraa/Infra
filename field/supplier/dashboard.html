<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/supplier_logic.js"></script> <style>
        :root { --bg: #f8fafc; --primary: #020617; --orange: #ff7a00; --emerald: #10b981; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 60px; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 40px; padding: 35px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 22px; color: #0f172a; font-weight: 700; outline: none; margin-bottom: 12px; font-size: 14px; }
        .label-text { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; display: block; padding-left: 10px; }
        .chip { background: #f1f5f9; padding: 15px 20px; border-radius: 20px; font-size: 11px; font-weight: 800; color: #475569; cursor: pointer; text-align: center; text-transform: uppercase; border: 2px solid transparent; transition: 0.2s; }
        .chip.active { background: var(--orange); color: white; border-color: var(--orange); box-shadow: 0 8px 20px rgba(255,122,0,0.2); }
        .circle-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; font-size: 20px; }
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 25px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.85); color: white; font-size: 8px; padding: 8px; text-align: center; font-weight: 800; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .detail-label { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; }
        .detail-value { font-size: 11px; font-weight: 700; color: #1e293b; text-align: right; }
        .badge-bronze { background: #cd7f32; color: white; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <main id="app" class="max-w-2xl mx-auto hidden">
        <div id="headerAnchor"></div>

        <div id="regView" class="hidden px-2">
            <h2 id="regTitle" class="text-3xl font-black italic tracking-tighter uppercase mb-6 text-slate-900">Supplier Profile</h2>
            <div class="card">
                <span class="label-text">01. Identity</span>
                <input id="firmName" placeholder="Firm Name *" class="u-input">
                <input id="gstNum" placeholder="GST Number *" class="u-input">
                <input id="ownerName" placeholder="Owner Name *" class="u-input">
                <input id="ownerMob" type="tel" placeholder="Owner Mobile *" class="u-input" oninput="Validation.copyWA(this.value, 'ownerWa')">
                <input id="ownerWa" type="tel" placeholder="Owner WhatsApp *" class="u-input">
                <span class="label-text">03. Manager</span>
                <input id="mgrName" placeholder="Manager Name" class="u-input">
                <input id="mgrMob" type="tel" placeholder="Manager Mobile" class="u-input" oninput="Validation.copyWA(this.value, 'mgrWa')">
                <input id="mgrWa" type="tel" placeholder="Manager WhatsApp" class="u-input">
            </div>

            <div class="card">
                <span class="label-text">04. GPS Lock & Evidence</span>
                <div id="map" class="h-64 rounded-3xl border border-slate-200 mb-4 overflow-hidden z-0"></div>
                <button onclick="GeoEngine.lock()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase mb-4 active:scale-95 transition-all">Capture GPS Lock</button>
                <textarea id="address" class="u-input h-20 text-[11px] text-slate-400 italic bg-slate-50" readonly placeholder="Address will auto-fill..."></textarea>
                <div class="grid grid-cols-3 gap-4" id="photoGrid">
                    <button onclick="document.getElementById('camInput').click()" class="photo-slot text-slate-300 text-5xl hover:bg-slate-100">+</button>
                </div>
                <input type="file" id="camInput" accept="image/*" capture="environment" hidden onchange="EvidenceEngine.handle(this)">
            </div>

            <div class="card">
                <span class="label-text">05. Material Intelligence</span>
                <div id="matSelector" class="grid grid-cols-2 gap-4"></div>
                <div id="varietyGrid" class="flex flex-wrap gap-3 mt-6 hidden"></div>
            </div>

            <div class="card">
                <span class="label-text">06. Fleet Capacity</span>
                <div id="fleetGrid"></div>
            </div>

            <button onclick="RegistryAction.transmit()" id="sBtn" class="w-full bg-emerald-500 text-white p-6 rounded-3xl font-black uppercase shadow-xl mb-4">🚀 Submit Profile</button>
            <button onclick="InventoryUI.cancelEdit()" id="cancelBtn" class="hidden w-full text-slate-400 font-bold uppercase text-[10px] mb-10">Cancel Update</button>
        </div>

        <div id="dashView" class="hidden px-2">
            <h2 class="text-3xl font-black italic tracking-tighter uppercase mb-6 text-slate-900">Dashboard</h2>
            
            <div class="card border-t-8 border-orange-500">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="bizName" class="text-2xl font-black italic uppercase leading-none text-slate-900">---</h2>
                        <p id="vBadge" class="inline-block px-3 py-1 mt-2 rounded-lg text-[8px] font-black uppercase tracking-widest bg-slate-100 text-slate-400">Verification Pending</p>
                    </div>
                    <button onclick="InventoryUI.toggleEdit()" class="bg-slate-900 text-white p-3 rounded-2xl active:scale-95 transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                </div>
                <div id="levelBadge" class="hidden w-full p-4 rounded-2xl text-center font-black uppercase italic tracking-widest text-xs mb-8">---</div>
                <div class="space-y-1 mb-8">
                    <div class="detail-row"><span class="detail-label">GST No</span><span id="disp_gst" class="detail-value">---</span></div>
                    <div class="detail-row"><span class="detail-label">Owner</span><span id="disp_owner" class="detail-value">---</span></div>
                    <div class="detail-row"><span class="detail-label">Contact</span><span id="disp_ownerCont" class="detail-value">---</span></div>
                    <div class="detail-row"><span class="detail-label">Manager</span><span id="disp_mgrCont" class="detail-value">---</span></div>
                    <div class="detail-row border-none"><span class="detail-label">GPS</span><span id="disp_gps" class="detail-value text-orange-500">---</span></div>
                </div>
                <div id="statusHero" class="bg-slate-900 text-white p-10 rounded-[40px] text-center border-t-4 border-slate-700">
                    <p class="text-[10px] font-black uppercase tracking-[5px] text-orange-500 mb-3">Building Bharat</p>
                    <h3 id="heroTitle" class="text-xl font-black italic uppercase">Profile Verification Pending</h3>
                </div>
            </div>

            <div class="card">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black italic uppercase tracking-tighter">Material Stock</h3>
                    <button onclick="InventoryUI.openModal()" class="bg-orange-500 text-white p-3 rounded-xl shadow-lg active:scale-95"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>
                <div id="inventoryList" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <div id="inventoryModal" class="hidden fixed inset-0 bg-black/60 z-[9999] p-4 flex items-end justify-center">
        <div class="bg-white w-full max-w-lg rounded-[40px] p-8 shadow-2xl">
            <h3 class="text-xl font-black italic uppercase mb-6">Add Material</h3>
            <div id="catSelect" class="grid grid-cols-2 gap-2 mb-4"></div>
            <div id="varSelect" class="flex flex-wrap gap-2 mb-6"></div>
            <input id="invPrice" type="number" placeholder="Price per unit (₹) *" class="u-input">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="InventoryUI.closeModal()" class="bg-slate-100 text-slate-600 p-5 rounded-2xl font-black uppercase text-xs">Cancel</button>
                <button onclick="InventoryUI.saveStock()" class="bg-orange-500 text-white p-5 rounded-2xl font-black uppercase text-xs">Save</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let state = { photos: [], location: null, mat: null, varieties: [], brands: [], fleet: {}, regData: {}, currentData: null };

        auth.onAuthStateChanged(user => {
            if (user) { NS_UI.showLoader(); checkOnboarding(user.uid); }
            else { window.location.href = "/"; }
        });

        // --- PRESERVED ORIGINAL LOGIC (DO NOT CHANGE) ---
        function checkOnboarding(uid) {
            rtdb.ref('registry/materials').once('value', snap => { state.regData = snap.val() || {}; });
            rtdb.ref('supplier_onboarding/' + uid).on('value', snap => {
                const data = snap.val(); state.currentData = data;
                NS_UI.injectHeader('headerAnchor', 'Supplier'); NS_UI.hideLoader();
                document.getElementById('app').classList.remove('hidden');
                if (data) {
                    document.getElementById('dashView').classList.remove('hidden');
                    document.getElementById('regView').classList.add('hidden');
                    document.getElementById('bizName').innerText = data.firm;
                    document.getElementById('disp_gst').innerText = data.gst || 'N/A';
                    document.getElementById('disp_owner').innerText = data.ownerName;
                    document.getElementById('disp_ownerCont').innerText = `${data.ownerPhone} / ${data.ownerWa || data.ownerPhone}`;
                    document.getElementById('disp_mgrCont').innerText = data.mgrPhone ? `${data.mgrPhone} / ${data.mgrWa}` : 'N/A';
                    document.getElementById('disp_gps').innerText = data.location ? `${data.location.lat.toFixed(5)}, ${data.location.lng.toFixed(5)}` : 'No Lock';
                    const vBadge = document.getElementById('vBadge');
                    if(data.status === 'approved') {
                        vBadge.innerText = "Verified Profile"; vBadge.className = "px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest bg-emerald-100 text-emerald-600";
                        document.getElementById('heroTitle').innerText = "Verified NirmanSutra Supplier";
                        document.getElementById('statusHero').classList.add('border-orange-500');
                    }
                    InventoryUI.loadInventory(uid);
                } else {
                    document.getElementById('regView').classList.remove('hidden');
                    if(window.NS_Geo) setTimeout(() => NS_Geo.init('map'), 500);
                    syncRegistry(); initFleet();
                }
            });
        }

        window.Validation = { copyWA(val, targetId) { document.getElementById(targetId).value = val; } };
        window.GeoEngine = { async lock() { if(!window.NS_Geo) return alert("Mapping library missing."); try { const result = await NS_Geo.captureLock('address'); state.location = result.location; } catch(e) { alert("Location Error: " + e.message); } } };
        window.EvidenceEngine = {
            handle(input) {
                if(!state.location) return alert("❌ GPS Lock Required.");
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        canvas.width = 800; canvas.height = 600; ctx.drawImage(img, 0, 0, 800, 600);
                        ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 530, 800, 70);
                        ctx.fillStyle = "#ff7a00"; ctx.font = "bold 14px monospace";
                        const stamp = `NS_ID: ${auth.currentUser.uid.slice(0,6)} | TS: ${new Date().toLocaleString()} | LAT: ${state.location.lat.toFixed(5)} | LNG: ${state.location.lng.toFixed(5)}`;
                        ctx.fillText(stamp, 20, 570);
                        state.photos.push({ src: canvas.toDataURL('image/jpeg', 0.6), time: new Date().toLocaleString() }); this.render();
                    }; img.src = e.target.result;
                }; reader.readAsDataURL(input.files[0]);
            },
            render() { const grid = document.getElementById('photoGrid'); grid.innerHTML = `<button onclick="document.getElementById('camInput').click()" class="photo-slot text-slate-300 text-5xl hover:bg-slate-100">+</button>`; state.photos.forEach((p, i) => { grid.innerHTML += `<div class="photo-slot" onclick="EvidenceEngine.remove(${i})"><img src="${p.src}" class="w-full h-full object-cover"><div class="stamp-overlay">DISCARD</div></div>`; }); },
            remove(idx) { if(confirm("Discard photo?")) { state.photos.splice(idx,1); this.render(); } }
        };
        function syncRegistry() { rtdb.ref('registry/materials').on('value', snap => { const cont = document.getElementById('matSelector'); window.regData = snap.val() || {}; cont.innerHTML = Object.keys(window.regData).map(cat => `<div class="chip" onclick="RegistryUI.selectMat('${cat}')">${cat}</div>`).join(''); }); }
        window.RegistryUI = { selectMat(cat) { state.mat = cat; state.varieties = []; document.querySelectorAll('#matSelector .chip').forEach(c => c.classList.remove('active')); document.getElementById('varietyGrid').classList.remove('hidden'); document.getElementById('varietyGrid').innerHTML = Object.keys(window.regData[cat]).map(v => `<div class="chip" onclick="RegistryUI.toggleVariety('${cat}', '${v}', this)">${v}</div>`).join(''); }, toggleVariety(cat, v, el) { el.classList.toggle('active'); const idx = state.varieties.indexOf(v); idx > -1 ? state.varieties.splice(idx, 1) : state.varieties.push(v); } };
        function initFleet() { const types = ['Tractor', 'Mini Truck', 'Truck', 'Dumper', 'Trailer']; document.getElementById('fleetGrid').innerHTML = types.map(t => `<div class="fleet-unit flex justify-between items-center p-5 bg-slate-50 rounded-2xl mb-2 border border-slate-100"><span class="text-[11px] font-black uppercase text-slate-500 tracking-wider">${t}</span><div class="flex items-center gap-6"><div class="circle-btn" onclick="fleetStep('${t}', -1)">-</div><span id="fval-${t}" class="font-black text-sm w-[20px] text-center">0</span><div class="circle-btn" onclick="fleetStep('${t}', 1)">+</div></div></div>`).join(''); }
        window.fleetStep = (t, v) => { state.fleet[t] = Math.max(0, (state.fleet[t] || 0) + v); document.getElementById(`fval-${t}`).innerText = state.fleet[t]; };
        window.RegistryAction = { async transmit() { const firm = document.getElementById('firmName').value.trim(); const owner = document.getElementById('ownerName').value.trim(); if(!firm || !owner || !state.location) return alert("❌ Firm, Owner, and GPS Lock are mandatory."); document.getElementById('sBtn').innerText = "TRANSMITTING DATA..."; await rtdb.ref('supplier_onboarding/' + auth.currentUser.uid).update({ firm, ownerName: owner, ownerPhone: document.getElementById('ownerMob').value, ownerWa: document.getElementById('ownerWa').value, mgrName: document.getElementById('mgrName').value, mgrPhone: document.getElementById('mgrMob').value, mgrWa: document.getElementById('mgrWa').value, address: document.getElementById('address').value, location: state.location, photos: state.photos, mat: state.mat, varieties: state.varieties, fleet: state.fleet, timestamp: Date.now(), status: 'pending', level: 'Bronze' }); alert("🚀 Profile Sync Successful!"); location.reload(); } };
    </script>
</body>
</html>

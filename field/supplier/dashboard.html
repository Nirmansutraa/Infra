<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | NirmanSutra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="../../js/config.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; margin: 0; }
        .top-bar { background: var(--navy); color: white; padding: 40px 20px 60px; border-radius: 0 0 40px 40px; }
        .biz-card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); margin-top: -40px; position: relative; }
        .badge { background: #fff7ed; color: #ea580c; padding: 5px 12px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .tag { background: #f1f5f9; color: #64748b; padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; margin: 3px; display: inline-block; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="flex justify-between items-center px-4">
            <div>
                <p class="text-orange-500 font-black text-[10px] uppercase tracking-[4px] mb-1">Partner Portal</p>
                <h1 id="userName" class="text-2xl font-black">Syncing...</h1>
            </div>
            <button onclick="auth.signOut().then(()=>window.location.href='../../index.html')" class="bg-white/10 p-4 rounded-2xl">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9"/></svg>
            </button>
        </div>
    </header>

    <main class="px-6">
        <section class="biz-card mb-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400">Material Intelligence</h3>
                <span class="badge">Verified Profile</span>
            </div>
            <div class="space-y-6">
                <div>
                    <p id="shopTitle" class="text-xl font-black text-slate-900 leading-tight">Fetching Data...</p>
                    <p id="shopAddress" class="text-xs text-slate-400 font-medium mt-1">Address N/A</p>
                </div>
                <div>
                    <p class="text-[9px] font-black uppercase text-slate-400 mb-3">Inventory Categories</p>
                    <div id="catList" class="flex flex-wrap"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        auth.onAuthStateChanged(user => {
            if (user) sync(user.uid);
            else window.location.href = "../../index.html"; // Move up to root
        });

        function sync(uid) {
            rtdb.ref(`users/${uid}`).on('value', snap => {
                const d = snap.val();
                if(!d) return;
                document.getElementById('userName').innerText = d.name || "Partner";
                document.getElementById('shopTitle').innerText = d.shopName || "Enterprise Registry Pending";
                document.getElementById('shopAddress').innerText = d.address || "No Address Provided";
                
                const list = document.getElementById('catList');
                list.innerHTML = "";
                if(d.categories) {
                    d.categories.forEach(cat => {
                        const s = document.createElement('span'); s.className = "tag"; s.innerText = cat;
                        list.appendChild(s);
                    });
                }
            });
        }
    </script>
</body>
</html>

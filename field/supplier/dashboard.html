<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/ui.js"></script> <style>
        :root { --bg: #f8fafc; --orange: #ff7a00; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 50px; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 40px; padding: 35px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 22px; font-weight: 700; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="loader" class="flex flex-col items-center justify-center min-h-screen">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500 mb-4"></div>
        <p class="font-black text-slate-400 uppercase tracking-[5px] text-[10px]">Syncing NirmanSutra...</p>
    </div>

    <main id="app" class="max-w-2xl mx-auto hidden">
        <div id="headerAnchor"></div>

        <div id="dashView" class="hidden px-2">
            <div class="card bg-[#020617] text-white p-10 text-center">
                <p class="text-[10px] font-black uppercase tracking-[5px] text-orange-500 mb-2">Building Bharat</p>
                <h3 id="bizName" class="text-2xl font-black italic uppercase">---</h3>
                <p id="bizAddr" class="text-[10px] text-slate-400 mt-4 uppercase">---</p>
            </div>
        </div>

        <div id="regView" class="hidden px-2">
            </div>
    </main>

    <script>
        lucide.createIcons();

        auth.onAuthStateChanged(user => {
            if (user) {
                // Check if user has a profile
                rtdb.ref('supplier_onboarding/' + user.uid).on('value', snap => {
                    const data = snap.val();
                    
                    // FIX: We now call the function from our ui.js file
                    NS_UI.injectHeader('headerAnchor', 'Supplier');
                    NS_UI.hideLoader();
                    
                    document.getElementById('app').classList.remove('hidden');
                    
                    if (data) {
                        document.getElementById('dashView').classList.remove('hidden');
                        document.getElementById('bizName').innerText = data.firm;
                        document.getElementById('bizAddr').innerText = data.address;
                    } else {
                        document.getElementById('regView').classList.remove('hidden');
                    }
                });
            } else {
                window.location.href = "/";
            }
        });
    </script>
</body>
</html>

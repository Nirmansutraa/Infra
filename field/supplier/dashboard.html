<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supplier Node | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --accent: #10b981; --primary: #0f172a; 
            --text-dim: #64748b; 
        }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 120px; }
        
        /* Layout Modules */
        .card { background: var(--card); border-radius: 40px; padding: 35px; margin-bottom: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .id-box { background: var(--primary); color: #10b981; text-align: center; padding: 30px; border-radius: 20px; font-weight: 900; font-family: monospace; letter-spacing: 4px; border: 1px solid #1e293b; }
        
        .mat-item { background: var(--primary); color: white; padding: 25px 35px; border-radius: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .mat-item.active { border-color: var(--accent); transform: scale(1.02); }
        .chip { background: #f1f5f9; padding: 15px; border-radius: 18px; font-size: 11px; font-weight: 800; color: #475569; cursor: pointer; text-align: center; text-transform: uppercase; border: 2px solid transparent; }
        .chip.active { background: var(--accent); color: white; }
        
        .photo-slot { aspect-ratio: 1; background: #f1f5f9; border-radius: 20px; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .stamp-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); color: white; font-size: 8px; padding: 8px; font-weight: 800; }

        .hidden { display: none !important; }
        .btn-rapido { width: 100%; padding: 20px; border-radius: 22px; font-weight: 900; text-transform: uppercase; transition: 0.3s; cursor: pointer; }
    </style>
</head>
<body>

<header class="bg-[#0f172a] text-white p-8 rounded-b-[40px] mb-10">
    <p class="text-orange-500 font-black text-[10px] uppercase tracking-[5px] mb-1">Building Bharat</p>
    <h1 id="userGreeting" class="text-2xl font-black italic">Supplier Node</h1>
</header>

<main class="max-w-2xl mx-auto px-6">
    <div id="registryView" class="hidden">
        <div class="card">
            <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest block mb-4">01. Identity Sync</span>
            <div id="trackId" class="id-box">NS-PRT-PENDING</div>
        </div>

        <div class="card">
            <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest block mb-6">02. Firm Details</span>
            <input id="firmName" placeholder="Legal Firm Name" class="w-full bg-slate-100 p-5 rounded-2xl mb-4 font-bold outline-none border-2 border-transparent focus:border-emerald-500">
            <input id="gstNumber" placeholder="GSTIN Number" class="w-full bg-slate-100 p-5 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-emerald-500">
        </div>

        <div class="card">
            <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest block mb-6">03. GPS Spatial Lock</span>
            <div id="map" class="h-[250px] rounded-3xl mb-4 border border-slate-200"></div>
            <button onclick="Geo.capture()" class="btn-rapido bg-[#0f172a] text-white">📍 Lock Warehouse GPS</button>
            <textarea id="address" class="w-full mt-4 text-[10px] text-slate-400 font-bold border-none bg-transparent outline-none" readonly></textarea>
        </div>

        <button onclick="RegistrationEngine.submit()" id="sBtn" class="btn-rapido bg-emerald-500 text-white shadow-xl">🚀 Finalize Registry</button>
    </div>

    <div id="dashboardView" class="hidden">
        <div class="card">
            <div class="flex justify-between items-start">
                <div>
                    <h2 id="displayFirm" class="text-2xl font-black text-slate-900">---</h2>
                    <p id="displayAddr" class="text-xs text-slate-400 mt-2 italic">---</p>
                </div>
                <button onclick="toggleView('registry')" class="text-emerald-500 text-[10px] font-black uppercase underline">Edit Profile</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-8 rounded-[35px] text-center border border-slate-100 shadow-sm">
                <i data-lucide="package" class="mx-auto mb-2 text-emerald-500"></i>
                <p class="text-[10px] font-black uppercase">Live Leads</p>
            </div>
            <div class="bg-white p-8 rounded-[35px] text-center border border-slate-100 shadow-sm">
                <i data-lucide="indian-rupee" class="mx-auto mb-2 text-emerald-500"></i>
                <p class="text-[10px] font-black uppercase">Payments</p>
            </div>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="/js/config.js"></script>

<script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Firebase Initialization Check
    if (typeof firebaseConfig !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
    }
    const rtdb = firebase.database(), auth = firebase.auth();

    // Session Management
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('userGreeting').innerText = user.displayName || "Partner Node";
            syncStatus(user.uid);
        } else {
            window.location.href = "/index.html";
        }
    });

    function syncStatus(uid) {
        rtdb.ref('supplier_onboarding/' + uid).on('value', snap => {
            const data = snap.val();
            if (data && data.status === 'active') {
                showDashboard(data);
            } else {
                toggleView('registry');
                Geo.init();
            }
        });
    }

    function toggleView(v) {
        document.getElementById('registryView').classList.toggle('hidden', v !== 'registry');
        document.getElementById('dashboardView').classList.toggle('hidden', v !== 'dash');
    }

    function showDashboard(data) {
        toggleView('dash');
        document.getElementById('displayFirm').innerText = data.firm || "Unnamed Firm";
        document.getElementById('displayAddr').innerText = data.address || "No address on file";
    }

    // Geo Module
    window.Geo = {
        map: null, marker: null,
        init() {
            if(this.map) return;
            this.map = L.map('map', { zoomControl: false }).setView([24.58, 73.71], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
        },
        capture() {
            navigator.geolocation.getCurrentPosition(async p => {
                const { latitude, longitude } = p.coords;
                this.map.setView([latitude, longitude], 17);
                if (this.marker) this.map.removeLayer(this.marker);
                this.marker = L.marker([latitude, longitude]).addTo(this.map);
                
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await res.json();
                    document.getElementById('address').value = data.display_name;
                    document.getElementById('trackId').innerText = "NS-GPS-LOCKED";
                } catch(e) {
                    document.getElementById('address').value = latitude.toFixed(6) + ", " + longitude.toFixed(6);
                }
            });
        }
    };

    // Submission Module
    window.RegistrationEngine = {
        async submit() {
            const user = auth.currentUser;
            const firm = document.getElementById('firmName').value;
            const addr = document.getElementById('address').value;

            if(!firm || !addr) return alert("Firm name and GPS lock are required!");

            const btn = document.getElementById('sBtn');
            btn.innerText = "SYNCING NODE...";
            btn.disabled = true;

            const payload = { 
                firm: firm, 
                address: addr, 
                gst: document.getElementById('gstNumber').value,
                timestamp: Date.now(), 
                status: 'active' 
            };

            try {
                await rtdb.ref('supplier_onboarding/' + user.uid).set(payload);
                alert("SUCCESS: Enterprise Registry Node Online.");
            } catch(e) {
                alert("Sync Error: " + e.message);
                btn.innerText = "🚀 Finalize Registry";
                btn.disabled = false;
            }
        }
    };
</script>
</body>
</html>

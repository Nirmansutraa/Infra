<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/config.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/map.js"></script>
    <script src="/js/supplier_logic.js"></script>

    <style>
        :root { --bg: #f8fafc; --primary: #020617; --orange: #ff7a00; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); padding-bottom: 60px; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 40px; padding: 35px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 22px; font-weight: 700; outline: none; margin-bottom: 12px; font-size: 14px; }
        .label-text { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; display: block; padding-left: 10px; }
        .chip { background: #f1f5f9; padding: 15px 20px; border-radius: 20px; font-size: 11px; font-weight: 800; color: #475569; cursor: pointer; text-transform: uppercase; }
        .chip.active { background: var(--orange); color: white; }
        .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .detail-label { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; }
        .detail-value { font-size: 11px; font-weight: 700; color: #1e293b; }
        .badge-bronze { background: #cd7f32; color: white; }
    </style>
</head>
<body>

    <div id="loader"></div>

    <main id="app" class="max-w-2xl mx-auto hidden">
        <div id="headerAnchor"></div>

        <div id="dashView" class="hidden px-2">
            <div class="card border-t-8 border-orange-500">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="bizName" class="text-2xl font-black italic uppercase leading-none text-slate-900">---</h2>
                        <p id="vBadge" class="inline-block px-3 py-1 mt-2 rounded-lg text-[8px] font-black uppercase tracking-widest bg-slate-100 text-slate-400">Verification Pending</p>
                    </div>
                    <button onclick="NS_Supplier.toggleEdit()" class="bg-slate-900 text-white p-3 rounded-2xl active:scale-95"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                </div>
                <div id="levelBadge" class="hidden w-full p-4 rounded-2xl text-center font-black uppercase tracking-widest text-xs mb-8">---</div>
                <div class="space-y-1 mb-8">
                    <div class="detail-row"><span class="detail-label">GST No</span><span id="disp_gst" class="detail-value">---</span></div>
                    <div class="detail-row"><span class="detail-label">Owner</span><span id="disp_owner" class="detail-value">---</span></div>
                    <div class="detail-row"><span class="detail-label">Contact</span><span id="disp_ownerCont" class="detail-value">---</span></div>
                    <div class="detail-row border-none"><span class="detail-label">GPS</span><span id="disp_gps" class="detail-value text-orange-500">---</span></div>
                </div>
                <div id="statusHero" class="bg-slate-900 text-white p-10 rounded-[40px] text-center border-t-4 border-slate-700">
                    <p class="text-[10px] font-black uppercase tracking-[5px] text-orange-500 mb-3">Building Bharat</p>
                    <h3 id="heroTitle" class="text-xl font-black italic uppercase">Profile Verification Pending</h3>
                </div>
            </div>

            <div class="card">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-black italic uppercase tracking-tighter">Material Stock</h3>
                    <button onclick="document.getElementById('inventoryModal').classList.remove('hidden')" class="bg-orange-500 text-white p-3 rounded-xl shadow-lg"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>
                <div id="inventoryList"></div>
            </div>
        </div>

        <div id="regView" class="hidden px-2">
            <h2 class="text-3xl font-black italic tracking-tighter uppercase mb-6">Supplier Profile</h2>
            <div class="card">
                <span class="label-text">Business</span>
                <input id="firmName" placeholder="Firm Name *" class="u-input">
                <input id="gstNum" placeholder="GST Number" class="u-input">
                <input id="ownerName" placeholder="Owner Name *" class="u-input">
                <input id="ownerMob" type="tel" placeholder="Mobile *" class="u-input">
                <span class="label-text">Location</span>
                <div id="map" class="h-60 rounded-3xl border border-slate-200 mb-4 overflow-hidden"></div>
                <button onclick="GeoEngine.lock()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black uppercase mb-4">Capture GPS Lock</button>
                <textarea id="address" class="u-input h-20 text-[11px] text-slate-400 italic bg-slate-50" readonly></textarea>
            </div>
            <button onclick="RegistryAction.transmit()" class="w-full bg-emerald-500 text-white p-6 rounded-3xl font-black uppercase shadow-xl">🚀 Sync with NirmanSutra</button>
        </div>
    </main>

    <div id="inventoryModal" class="hidden fixed inset-0 bg-black/60 z-[9999] p-4 flex items-end justify-center">
        <div class="bg-white w-full max-w-lg rounded-[40px] p-8 shadow-2xl">
            <h3 class="text-xl font-black italic uppercase mb-6">Add Material</h3>
            <div id="catSelect" class="grid grid-cols-2 gap-2 mb-4"></div>
            <div id="varSelect" class="flex flex-wrap gap-2 mb-6"></div>
            <input id="invPrice" type="number" placeholder="Price *" class="u-input">
            <button onclick="NS_Supplier.saveStock()" class="w-full bg-orange-500 text-white p-5 rounded-2xl font-black uppercase text-xs">Save</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        auth.onAuthStateChanged(user => { 
            if(user) NS_Supplier.init(user.uid); 
            else window.location.href = "/";
        });
    </script>
</body>
</html>

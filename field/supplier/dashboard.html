<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supplier Node | NirmanSutra</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="/js/config.js"></script>

    <style>
        :root { --bg: #f8fafc; --accent: #10b981; --primary: #0f172a; --orange: #ff7a00; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); }
        .hidden { display: none !important; }
        
        /* Glass Design System */
        .card { background: white; border-radius: 40px; padding: 35px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .id-box { background: var(--primary); color: var(--accent); text-align: center; padding: 50px; border-radius: 30px; font-size: 32px; font-weight: 900; font-family: monospace; letter-spacing: 6px; box-shadow: inset 0 10px 30px rgba(0,0,0,0.4); }
        
        .mat-item { background: var(--primary); color: white; padding: 25px 35px; border-radius: 25px; cursor: pointer; border: 2px solid transparent; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .mat-item.active { border-color: var(--accent); transform: scale(1.02); }
        
        .btn-rapido { width: 100%; padding: 20px; border-radius: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
    </style>
</head>
<body class="p-6">

    <div id="loader" class="flex flex-col items-center justify-center min-h-screen">
        <p class="font-black text-slate-400 animate-pulse uppercase tracking-[5px]">Syncing Node...</p>
    </div>

    <main id="app" class="max-w-2xl mx-auto hidden">
        <div id="regView" class="hidden">
            <header class="mb-10">
                <h1 class="text-4xl font-black italic tracking-tighter uppercase">Partner<span class="text-emerald-500">Node</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[4px] mt-2">Initialize Strategic Registry</p>
            </header>

            <div class="card">
                <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest block mb-4">01. Identity Signature</span>
                <div id="trackId" class="id-box">NS-PRT-NODE---</div>
            </div>

            <div class="card">
                <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest block mb-6">02. Entity Details</span>
                <input id="firmName" placeholder="Legal Firm Name" class="w-full bg-slate-100 p-5 rounded-2xl font-bold mb-4 outline-none border-2 border-transparent focus:border-emerald-500">
                <div id="map" class="h-64 rounded-3xl border mb-4"></div>
                <button onclick="Geo.capture()" class="btn-rapido bg-slate-900 text-white flex items-center justify-center gap-3 mb-4">
                    <i data-lucide="map-pin"></i> Lock GPS
                </button>
                <textarea id="finalAddr" class="w-full bg-transparent text-xs text-slate-400 italic border-none mb-6" readonly placeholder="Spatial lock required..."></textarea>
                
                <p class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Select Intelligence Class</p>
                <div id="matSelector"></div>
                
                <button onclick="submitRegistry()" id="sBtn" class="btn-rapido bg-emerald-500 text-white mt-10 shadow-xl">🚀 Finalize Global Sync</button>
            </div>
        </div>

        <div id="dashView" class="hidden">
            <header class="flex justify-between items-start mb-10">
                <div>
                    <h2 id="bizName" class="text-3xl font-black italic tracking-tighter">---</h2>
                    <p id="bizAddr" class="text-xs text-slate-400 mt-2 italic">---</p>
                </div>
                <button onclick="auth.signOut().then(()=>window.location.href='/')" class="bg-slate-200 p-3 rounded-2xl">
                    <i data-lucide="log-out"></i>
                </button>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <div class="card text-center flex flex-col items-center">
                    <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="package-search"></i>
                    </div>
                    <p class="font-black uppercase text-[10px] tracking-widest">Live Leads</p>
                </div>
                <div class="card text-center flex flex-col items-center">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="truck"></i>
                    </div>
                    <p class="font-black uppercase text-[10px] tracking-widest">Fleet</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        auth.onAuthStateChanged(user => {
            if (user) sync(user.uid);
            else window.location.href = "/";
        });

        function sync(uid) {
            // Derived from backup sync logic
            rtdb.ref('supplier_onboarding/' + uid).on('value', snap => {
                const data = snap.val();
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                
                if (data) {
                    showDash(data);
                } else {
                    showReg();
                }
            });
        }

        function showDash(data) {
            document.getElementById('dashView').classList.remove('hidden');
            document.getElementById('regView').classList.add('hidden');
            document.getElementById('bizName').innerText = data.firm || "Partner Node";
            document.getElementById('bizAddr').innerText = data.address || "Coordinates Verified";
            lucide.createIcons();
        }

        function showReg() {
            document.getElementById('regView').classList.remove('hidden');
            document.getElementById('dashView').classList.add('hidden');
            Geo.init(); 
            syncRegistry();
            lucide.createIcons();
        }

        // Module derived from backup Spatial Intel
        window.Geo = {
            map: null, marker: null,
            init() { 
                if(!this.map) this.map = L.map('map', {zoomControl:false, attributionControl:false}).setView([24.58, 73.71], 12);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
            },
            capture() {
                navigator.geolocation.getCurrentPosition(async p => {
                    const { latitude, longitude } = p.coords;
                    this.map.setView([latitude, longitude], 17);
                    if(this.marker) this.map.removeLayer(this.marker);
                    this.marker = L.marker([latitude, longitude]).addTo(this.map);
                    
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const addr = await res.json();
                    document.getElementById('address').innerText = addr.display_name;
                    // Refresh ID logic
                    Survey.refreshID();
                });
            }
        };

        function syncRegistry() {
            rtdb.ref('registry/materials').on('value', snap => {
                const cont = document.getElementById('matSelector');
                cont.innerHTML = Object.keys(snap.val() || {}).map(cat => 
                    `<div class="mat-item" onclick="this.classList.toggle('active')"><span>${cat}</span><div class="w-4 h-4 rounded-full bg-slate-800"></div></div>`).join('');
            });
        }

        async function submitRegistry() {
            const firm = document.getElementById('firmName').value;
            const addr = document.getElementById('finalAddr').value;
            if(!firm || !addr) return alert("❌ Spatial Lock & Firm Identity required.");
            
            const btn = document.getElementById('sBtn'); btn.innerText = "Transmitting...";
            await rtdb.ref('supplier_onboarding/' + auth.currentUser.uid).set({ 
                firm, address: addr, timestamp: Date.now(), status: 'active' 
            });
            alert("🚀 Node Online!");
        }
    </script>
</body>
</html>

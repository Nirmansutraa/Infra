<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra Partner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="/js/config.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; margin: 0; }
        .top-header { background: var(--navy); color: white; padding: 40px 20px 80px; border-radius: 0 0 40px 40px; }
        .white-card { background: white; padding: 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.06); margin: -50px 20px 20px; position: relative; }
        .btn-orange { background: var(--accent); color: white; padding: 18px; border-radius: 20px; width: 100%; font-weight: 900; text-transform: uppercase; display: block; text-align: center; margin-top: 15px; cursor: pointer; }
        .tag-gray { background: #f1f5f9; color: #475569; padding: 8px 15px; border-radius: 12px; font-size: 10px; font-weight: 800; margin: 4px; display: inline-block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="top-header flex justify-between items-start">
        <div>
            <p class="text-orange-500 font-black text-[10px] uppercase tracking-[4px] mb-1">Building Bharat</p>
            <h1 id="userName" class="text-2xl font-black italic">Welcome...</h1>
        </div>
        <button onclick="auth.signOut().then(()=>window.location.href='/index.html')" class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Logout</button>
    </header>

    <main>
        <section class="white-card">
            <h3 class="font-black text-[10px] uppercase tracking-widest text-slate-400 mb-6">Business Profile</h3>

            <div id="fullProfile" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <p id="shopTitle" class="text-xl font-black text-slate-900">Shop Name</p>
                    <a href="/field/supplier/registration.html" class="text-orange-500 text-[10px] font-black underline">Edit Profile</a>
                </div>
                <p id="shopAddress" class="text-xs text-slate-400 font-bold mb-6 italic">Address Pending</p>
                <div id="catList" class="flex flex-wrap mb-6"></div>
            </div>

            <div id="emptyProfile" class="py-4 text-center">
                <div class="text-4xl mb-4">🏪</div>
                <h4 class="font-black text-slate-900">Your Shop is Offline!</h4>
                <p class="text-[11px] text-slate-400 font-bold px-4 mt-2">Finish your business registry to start getting leads in Udaipur.</p>
                <a href="/field/supplier/registration.html" class="btn-orange mt-6">Start My Registry</a>
            </div>
        </section>

        <div class="px-6 grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[30px] shadow-sm text-center">
                <div class="text-2xl mb-2">📥</div>
                <p class="text-[9px] font-black uppercase">Orders</p>
            </div>
            <div class="bg-white p-6 rounded-[30px] shadow-sm text-center">
                <div class="text-2xl mb-2">🏗️</div>
                <p class="text-[9px] font-black uppercase">Inventory</p>
            </div>
        </div>
    </main>

    <script>
        auth.onAuthStateChanged(user => {
            if (user) {
                rtdb.ref(`users/${user.uid}`).on('value', snap => {
                    const d = snap.val();
                    if(!d) return;
                    document.getElementById('userName').innerText = d.name || "Partner";
                    if (d.onboardingComplete) {
                        document.getElementById('fullProfile').classList.remove('hidden');
                        document.getElementById('emptyProfile').classList.add('hidden');
                        document.getElementById('shopTitle').innerText = d.shopName;
                        document.getElementById('shopAddress').innerText = d.address;
                        const box = document.getElementById('catList');
                        box.innerHTML = "";
                        if(d.categories) {
                            d.categories.forEach(c => {
                                let s = document.createElement('span'); s.className = "tag-gray"; s.innerText = c;
                                box.appendChild(s);
                            });
                        }
                    } else {
                        document.getElementById('fullProfile').classList.add('hidden');
                        document.getElementById('emptyProfile').classList.remove('hidden');
                    }
                });
            } else {
                window.location.href = "/index.html";
            }
        });
    </script>
</body>
</html>

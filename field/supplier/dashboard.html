<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmanSutra Partner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="/js/config.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; margin: 0; }
        .top-bar { background: var(--navy); color: white; padding: 45px 25px 90px; border-radius: 0 0 45px 45px; }
        .white-card { background: white; padding: 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.06); margin: -60px 20px 20px; position: relative; z-index: 10; border: 1px solid rgba(255,255,255,0.8); }
        .btn-orange { background: var(--accent); color: white; padding: 20px; border-radius: 24px; width: 100%; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .icon-circle { width: 56px; height: 56px; background: #fff7ed; color: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="top-bar flex justify-between items-start">
        <div>
            <p class="text-orange-500 font-black text-[10px] uppercase tracking-[4px] mb-1">Building Bharat</p>
            <h1 id="userName" class="text-2xl font-black italic tracking-tight">Partner</h1>
        </div>
        <button onclick="auth.signOut().then(()=>window.location.href='/index.html')" class="bg-white/10 p-4 rounded-2xl text-white">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
    </header>

    <main>
        <section class="white-card">
            <div id="fullProfile" class="hidden">
                <div class="flex justify-between items-start mb-4">
                    <p id="shopTitle" class="text-xl font-black text-slate-900">Shop Name</p>
                    <a href="/field/supplier/registration.html" class="text-orange-500 text-[10px] font-black uppercase underline">Edit</a>
                </div>
                <p id="shopAddress" class="text-xs text-slate-400 font-bold mb-6 italic">Address Pending</p>
                <div id="catList" class="flex flex-wrap"></div>
            </div>

            <div id="emptyProfile" class="py-6 text-center">
                <div class="icon-circle mx-auto mb-4"><i data-lucide="store" class="w-8 h-8"></i></div>
                <h4 class="font-black text-slate-900">Registry Incomplete</h4>
                <p class="text-[11px] text-slate-400 font-bold px-4 mt-2 mb-6">Complete your profile to unlock orders and MIS reports.</p>
                
                <a href="/field/supplier/registration.html" class="btn-orange">
                    <i data-lucide="zap" class="w-5 h-5"></i> Complete Registry
                </a>
            </div>
        </section>

        <div class="px-5 grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white p-6 rounded-[30px] shadow-sm text-center">
                <div class="icon-circle mx-auto mb-3"><i data-lucide="package-search" class="w-6 h-6"></i></div>
                <p class="text-[10px] font-black uppercase">Live Leads</p>
            </div>
            <div class="bg-white p-6 rounded-[30px] shadow-sm text-center">
                <div class="icon-circle mx-auto mb-3"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></div>
                <p class="text-[10px] font-black uppercase">Reports</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        auth.onAuthStateChanged(user => {
            if (user) {
                rtdb.ref(`users/${user.uid}`).on('value', snap => {
                    const d = snap.val();
                    if(!d) return;
                    document.getElementById('userName').innerText = d.name || "Partner";
                    if (d.onboardingComplete) {
                        document.getElementById('fullProfile').classList.remove('hidden');
                        document.getElementById('emptyProfile').classList.add('hidden');
                        document.getElementById('shopTitle').innerText = d.shopName;
                        document.getElementById('shopAddress').innerText = d.address;
                        const box = document.getElementById('catList'); box.innerHTML = "";
                        if(d.categories) d.categories.forEach(c => {
                            let s = document.createElement('span'); s.className = "bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[9px] font-bold mr-2 mb-2"; s.innerText = c;
                            box.appendChild(s);
                        });
                    } else {
                        document.getElementById('fullProfile').classList.add('hidden');
                        document.getElementById('emptyProfile').classList.remove('hidden');
                    }
                });
            } else {
                window.location.href = "/index.html";
            }
        });
    </script>
</body>
</html>

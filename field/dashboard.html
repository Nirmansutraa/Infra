<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Partner Portal | NirmanSutra</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="/js/config.js"></script>

    <style>
        :root { --accent: #ff7a00; --navy: #020617; }
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; margin: 0; }
        .top-bar { background: var(--navy); color: white; padding: 45px 25px 90px; border-radius: 0 0 45px 45px; }
        .white-card { background: white; padding: 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.06); margin: -60px 20px 20px; position: relative; z-index: 10; }
        
        .u-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 18px; margin-bottom: 10px; outline: none; font-weight: 600; }
        .chip { display: inline-block; padding: 8px 15px; background: #f1f5f9; border-radius: 12px; font-size: 10px; font-weight: 800; margin: 4px; cursor: pointer; text-transform: uppercase; }
        .chip.active { background: var(--accent); color: white; }
        
        .btn-rapido { background: var(--accent); color: white; padding: 18px; border-radius: 22px; width: 100%; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; cursor: pointer; }
        .icon-circle { width: 50px; height: 50px; background: #fff7ed; color: var(--accent); border-radius: 18px; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="top-bar flex justify-between items-start">
        <div>
            <p class="text-orange-500 font-black text-[10px] uppercase tracking-[4px] mb-1">Building Bharat</p>
            <h1 id="userName" class="text-2xl font-black italic tracking-tight">Partner</h1>
        </div>
        <button onclick="auth.signOut().then(()=>window.location.href='/index.html')" class="bg-white/10 p-4 rounded-2xl text-white">
            <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
    </header>

    <main>
        <section id="registrationLayer" class="white-card hidden">
            <div class="text-center mb-6">
                <div class="icon-circle mx-auto mb-2"><i data-lucide="store" class="w-6 h-6"></i></div>
                <h3 class="font-black text-lg">Business Registry</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Material Intelligence</p>
            </div>

            <div id="catBox" class="flex flex-wrap justify-center mb-6"></div>
            
            <input type="text" id="regShopName" class="u-input" placeholder="Shop Name">
            <input type="text" id="regBrands" class="u-input" placeholder="Main Brands (UltraTech, Tata, etc.)">
            <textarea id="regAddress" class="u-input h-20" placeholder="Full Address"></textarea>
            
            <button onclick="saveBusinessInfo()" id="saveBtn" class="btn-rapido mt-4">
                <i data-lucide="check-circle" class="w-5 h-5"></i> Complete Profile
            </button>
        </section>

        <section id="dashboardLayer" class="white-card hidden">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p id="shopTitle" class="text-xl font-black text-slate-900 leading-none">---</p>
                    <p id="shopAddress" class="text-xs text-slate-400 font-bold mt-1 italic">---</p>
                </div>
                <button onclick="openRegistration()" class="text-orange-500 text-[10px] font-black uppercase underline">Edit</button>
            </div>
            
            <p class="text-[9px] font-black text-slate-400 uppercase mb-3">Categories</p>
            <div id="displayCats" class="flex flex-wrap mb-4"></div>

            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-50">
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Brands</p><p id="brandText" class="font-black text-sm text-slate-800">---</p></div>
                <div><p class="text-[9px] font-black text-slate-400 uppercase">Radius</p><p class="font-black text-sm text-slate-800">30 KM</p></div>
            </div>
        </section>

        <div class="px-5 grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white p-6 rounded-[30px] shadow-sm text-center">
                <div class="icon-circle mx-auto mb-3"><i data-lucide="package-search" class="w-6 h-6"></i></div>
                <p class="text-[10px] font-black uppercase">Live Leads</p>
            </div>
            <div class="bg-white p-6 rounded-[30px] shadow-sm text-center">
                <div class="icon-circle mx-auto mb-3"><i data-lucide="indian-rupee" class="w-6 h-6"></i></div>
                <p class="text-[10px] font-black uppercase">Payments</p>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const materials = ["Cement", "Steel", "Bricks", "Sand", "Plumbing", "Electrical"];
        let selected = [];

        // Build Chips
        const box = document.getElementById('catBox');
        materials.forEach(m => {
            const s = document.createElement('span'); s.className = 'chip'; s.innerText = m;
            s.onclick = () => { s.classList.toggle('active'); if(selected.includes(m)) selected = selected.filter(i=>i!==m); else selected.push(m); };
            box.appendChild(s);
        });

        auth.onAuthStateChanged(user => {
            if (user) sync(user.uid);
            else window.location.href = "/index.html";
        });

        function sync(uid) {
            rtdb.ref(`users/${uid}`).on('value', snap => {
                const d = snap.val();
                if(!d) return;
                document.getElementById('userName').innerText = d.name || "Partner";
                
                if (d.onboardingComplete) {
                    showDashboard(d);
                } else {
                    openRegistration();
                }
            });
        }

        function openRegistration() {
            document.getElementById('registrationLayer').classList.remove('hidden');
            document.getElementById('dashboardLayer').classList.add('hidden');
        }

        function showDashboard(d) {
            document.getElementById('registrationLayer').classList.add('hidden');
            document.getElementById('dashboardLayer').classList.remove('hidden');
            document.getElementById('shopTitle').innerText = d.shopName;
            document.getElementById('shopAddress').innerText = d.address;
            document.getElementById('brandText').innerText = d.brands || "All Brands";
            const catDiv = document.getElementById('displayCats'); catDiv.innerHTML = "";
            if(d.categories) d.categories.forEach(c => {
                const s = document.createElement('span'); s.className = "bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[9px] font-bold mr-2 mb-2"; s.innerText = c;
                catDiv.appendChild(s);
            });
        }

        async function saveBusinessInfo() {
            const user = auth.currentUser;
            const btn = document.getElementById('saveBtn');
            btn.innerText = "SAVING...";
            
            const payload = {
                shopName: document.getElementById('regShopName').value,
                brands: document.getElementById('regBrands').value,
                address: document.getElementById('regAddress').value,
                categories: selected,
                onboardingComplete: true
            };

            await rtdb.ref(`users/${user.uid}`).update(payload);
            btn.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> Profile Saved!';
            lucide.createIcons();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Initializing Onboarding...</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    
    <style>
        body { 
            background: #020617; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #ff7a00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #ff7a00; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        p { color: #64748b; font-size: 12px; font-weight: 600; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div>
        <div class="loader"></div>
        <h2>Resetting Security</h2>
        <p>Preparing Official Supplier Terminal...</p>
    </div>

    <script>
        // 1. Initialize Firebase (Use your existing config)
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo"
        };
        firebase.initializeApp(firebaseConfig);
        
        /**
         * THE "AIRLOCK" PROTOCOL
         * Clears all traces of 'Staff' login to prevent the redirect loop.
         */
        async function runAirlock() {
            try {
                // Wipe Local Storage (Removes manual flags)
                localStorage.clear();
                
                // Wipe Session Storage (Removes temporary redirects)
                sessionStorage.clear();
                
                // Force Firebase to sign out the current user
                await firebase.auth().signOut();
                
                // Set a short delay to ensure GitHub and Firebase sync the logout
                setTimeout(() => {
                    // Redirect to registration with a version tag to bypass GitHub cache
                    window.location.href = "registration.html?v=" + Date.now();
                }, 1200);
                
            } catch (error) {
                console.error("Airlock Failed:", error);
                // Fallback redirect if something goes wrong
                window.location.href = "registration.html";
            }
        }

        // Execute immediately on page load
        window.onload = runAirlock;
    </script>
</body>
</html>

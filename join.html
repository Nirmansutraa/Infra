<!DOCTYPE html>
<html>
<head>
    <title>Nirmansutra | Initializing...</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
</head>
<body style="background:#020617; color:white; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh;">
    <div style="text-align:center;">
        <div style="border:4px solid #1e293b; border-top:4px solid #ff7a00; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto 20px;"></div>
        <p style="text-transform:uppercase; letter-spacing:2px; font-size:10px; font-weight:900;">Wiping Session Data...</p>
    </div>

    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo"
        };
        firebase.initializeApp(firebaseConfig);
        
        // THE AIRLOCK LOGIC
        async function clearAndRedirect() {
            // 1. Clear Browser Memory
            localStorage.clear();
            sessionStorage.clear();
            
            // 2. Force Firebase Logout
            await firebase.auth().signOut();
            
            // 3. Move to onboarding
            setTimeout(() => {
                window.location.href = "onboarding/index.html";
            }, 1000);
        }
        window.onload = clearAndRedirect;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra | Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff7a00; --primary: #0f172a; }
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-gate { position: fixed; inset: 0; background: var(--primary); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: #1e293b; padding: 50px; border-radius: 30px; width: 100%; max-width: 450px; text-align: center; }
        .step-inactive { opacity: 0.1; pointer-events: none; }
    </style>
</head>
<body>

<div id="authGate" class="auth-gate">
    <div class="gate-card">
        <h1 class="text-white text-3xl font-black italic mb-8">NIRMAN<span class="text-orange-500">SUTRA</span></h1>
        <button onclick="login()" id="gBtn" class="bg-white w-full p-5 rounded-2xl font-bold flex items-center justify-center gap-3">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Verify Google ID
        </button>
        <div id="otpSection" class="hidden mt-8">
            <input type="number" id="otpInput" placeholder="Enter 123456" class="w-full p-4 rounded-xl mb-4">
            <button onclick="verifyOTP()" class="bg-orange-500 text-white w-full p-4 rounded-xl font-bold">Unlock Form</button>
        </div>
    </div>
</div>

<div class="max-w-2xl mx-auto px-8 py-10">
    <div id="mainForm" class="step-inactive">
        <h1 class="text-2xl font-black mb-6">Supplier Registration</h1>
        <input id="firmName" placeholder="Firm Name" class="w-full p-4 border rounded-xl mb-4">
        <button onclick="submit()" class="bg-emerald-600 text-white w-full p-4 rounded-xl font-bold">Submit Registration</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
        authDomain: "infradepo.firebaseapp.com",
        projectId: "infradepo",
        databaseURL: "https://infradepo-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), rtdb = firebase.database();

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    }

    function verifyOTP() {
        if(document.getElementById('otpInput').value === "123456") {
            document.getElementById('authGate').classList.add('hidden');
            document.getElementById('mainForm').classList.remove('step-inactive');
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('gBtn').classList.add('hidden');
            document.getElementById('otpSection').classList.remove('hidden');
        }
    });
</script>
</body>
</html>
